<head>

  <style>

    .wrap{max-width:1680px;margin:0 auto;padding:28px 24px 40px}.hero{border:1px solid var(--border);background:rgba(255,255,255,.03);border-radius:36px;padding:22px;box-shadow:var(--shadow);backdrop-filter:blur(20px);display:flex;gap:24px;justify-content:space-between;align-items:flex-start;flex-wrap:wrap}.badge,.pill,.tab,.chip{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--border);background:rgba(255,255,255,.05);color:var(--muted);border-radius:999px;padding:9px 14px;font-size:13px;line-height:1;cursor:pointer}.badge{background:rgba(88,213,255,.10);border-color:rgba(88,213,255,.2);color:#b9f5ff;cursor:default}.tab.active,.pill.active,.chip.active{background:rgba(88,213,255,.15);border-color:rgba(88,213,255,.4);color:#fff}.titleRow{display:flex;gap:14px;align-items:center;margin-top:14px}.logo{width:44px;height:44px;border-radius:18px;background:linear-gradient(135deg,var(--cyan),var(--violet));display:grid;place-items:center;font-weight:800;color:#00131d;box-shadow:0 12px 30px rgba(88,213,255,.25)}h1{margin:0;font-size:46px;line-height:1.05}.sub{margin-top:10px;color:var(--muted);max-width:900px;line-height:1.7}.app{margin-top:28px}.grid{display:grid;gap:24px}.coach-layout{grid-template-columns:240px minmax(0,1fr)}.sidebar,.card,.device,.pane{border:1px solid var(--border);background:var(--panel);border-radius:var(--radius);box-shadow:0 20px 60px rgba(0,0,0,.20);backdrop-filter:blur(16px)}.sidebar{padding:16px}.brand{display:flex;align-items:center;gap:12px;padding:6px 8px 18px}.navbtn{width:100%;display:flex;justify-content:space-between;align-items:center;gap:12px;border:0;background:transparent;color:var(--muted);padding:14px 14px;border-radius:20px;cursor:pointer;font-size:14px;text-align:left}.navbtn.active{background:linear-gradient(90deg, rgba(88,213,255,.18), rgba(159,124,255,.12));color:#fff}.copilot{margin-top:18px;padding:16px;border-radius:24px;border:1px solid rgba(88,213,255,.2);background:linear-gradient(135deg, rgba(88,213,255,.10), rgba(159,124,255,.10))}.page{display:grid;gap:24px}.page-header{display:flex;justify-content:space-between;gap:18px;align-items:flex-start;flex-wrap:wrap}.page-title{font-size:34px;font-weight:700}.page-sub{color:var(--muted);margin-top:8px}.search{display:flex;align-items:center;gap:10px;border:1px solid var(--border);background:rgba(255,255,255,.05);padding:13px 15px;border-radius:18px;color:var(--muted);min-width:280px}.search input{background:transparent;border:0;outline:none;color:#fff;width:100%}.avatar{width:42px;height:42px;border-radius:16px;background:linear-gradient(135deg,var(--cyan),#4ea3ff);display:grid;place-items:center;color:#00131d;font-weight:700}.header-tools{display:flex;gap:12px;align-items:center;flex-wrap:wrap}.circlebtn{width:48px;height:48px;border-radius:18px;border:1px solid var(--border);background:rgba(255,255,255,.05);color:#fff;display:grid;place-items:center;cursor:pointer}.profile{display:flex;align-items:center;gap:12px;border:1px solid var(--border);background:rgba(255,255,255,.05);padding:8px 10px;border-radius:18px}.metrics{display:grid;gap:16px;grid-template-columns:repeat(4,minmax(0,1fr))}.metric{padding:22px}.metric .k{font-size:34px;font-weight:700;margin-top:8px}.muted{color:var(--muted)}.small{font-size:13px}.tiny{font-size:12px}.card{padding:24px}.section-title{font-size:20px;font-weight:700}.section-sub{font-size:14px;color:var(--muted);margin-top:6px}.list{display:grid;gap:14px;margin-top:18px}.row{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;padding:16px;border-radius:24px;border:1px solid var(--border);background:var(--panel2)}.row.clickable{cursor:pointer}.iconBox{width:42px;height:42px;border-radius:16px;background:rgba(255,255,255,.05);display:grid;place-items:center;color:var(--cyan2);flex:0 0 auto}.whitebtn,.ghost,.darkbtn{border-radius:18px;padding:12px 16px;font-size:14px;font-weight:600;cursor:pointer}.whitebtn{background:#fff;color:#06111d;border:0}.ghost{background:rgb grid-template-columns:repeat(7,minmax(0,1fr));gap:8px}.day{padding:8px;border-radius:20px;border:1px solid var(--border);background:rgba(255,255,255,.05);text-align:center}.day.today{border-color:rgba(88,213,255,.5);background:rgba(88,213,255,.10)}.day.done{border-color:rgba(106,240,178,.25);background:rgba(106,240,178,.10)}.desktopCard{padding:24px}.desktopSection{margin-top:24px}.cards3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}.cards2{display:grid;grid-template-columns:1fr .9fr;gap:16px}.planCard{padding:20px;border-radius:26px;border:1px solid var(--border);background:var(--panel2);cursor:pointer}.modalBack{position:fixed;inset:0;background:rgba(0,0,0,.60);backdrop-filter:blur(8px);z-index:40}.modal{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);width:min(92vw,720px);z-index:50;border:1px solid var(--border);background:#0C1325;border-radius:28px;padding:24px;box-shadow:0 30px 120px rgba(0,0,0,.55)}.modal.sm{width:min(92vw,560px)}.modalHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.xbtn{width:38px;height:38px;border-radius:16px;border:1px solid var(--border);background:rgba(255,255,255,.05);color:#fff;cursor:pointer}input[type=text],input[type=number],select,textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);color:#fff;border-radius:18px;padding:14px 16px;font-size:14px;outline:none}textarea{min-height:120px;resize:vertical}label{display:grid;gap:8px;color:var(--muted);font-size:14px}.formGrid2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.actions{display:flex;justify-content:flex-end;gap:12px;margin-top:20px;flex-wrap:wrap}.toast{position:fixed;right:24px;bottom:24px;z-index:60;display:flex;gap:12px;align-items:center;border:1px solid rgba(88,213,255,.2);background:#0D1528;border-radius:22px;padding:12px 14px;box-shadow:0 16px 40px rgba(0,0,0,.4)}.toastIcon{width:34px;height:34px;border-radius:12px;background:rgba(88,213,255,.15);display:grid;place-items:center;color:var(--cyan)}.settingsGrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:24px}.settingCard{padding:24px}.preview{padding:20px;border-radius:26px;border:1px solid var(--border);background:linear-gradient(135deg, rgba(88,213,255,.10), rgba(159,124,255,.10))}.clickBlock{cursor:pointer}.tagRow{display:flex;gap:10px;flex-wrap:wrap}.tagBtn{width:100%;text-align:left;padding:14px 16px;border-radius:22px;border:1px solid var(--border);background:rgba(255,255,255,.03);color:var(--text);cursor:pointer}@media (max-width:1200px){.coach-layout,.deviceLayout,.twoCol,.split,.cards2{grid-template-columns:1fr}.metrics,.threeCol,.cards3,.settingsGrid{grid-template-columns:repeat(2,minmax(0,1fr))}}@media (max-width:860px){h1{font-size:34px}.metrics,.threeCol,.cards3,.settingsGrid,.formGrid2,.grid2,.grid3{grid-template-columns:1fr}.tableHead,.tableRow{grid-template-columns:1fr}.device{width:min(100%,340px)}.wrap{padding:18px}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div>
        <div class="badge">Producto en operación · SaaS deportivo premium</div>
        <div class="titleRow">
          <div class="logo">⚡</div>
          <div>
            <h1>Pulse Coach OS</h1>

        </div>
      </div>
      <div>
        <div class="tabs" id="roleTabs"></div>

  </div>
  <div id="modal-root"></div>

<script>
const state = {

  athletes: [{"id": 1, "name": "Andrea Ruiz", "level": "Intermedio", "plan": "21K Intermedio", "compliance": 92, "status": "Excelente", "next": "Series · Hoy 6:00 PM", "fatigue": "Baja", "race": "21K Monterrey · 18 abr", "weeklyLoad": "48 km", "note": "Lista para ajuste progresivo de fondo.", "sleep": "7.3h", "lastUpload": "Hace 2 horas", "streak": 6, "monthVolume": 124, "completedToday": false, "adapted": false, "adaptationChoice": "", "sessionTitle": "Series 8 × 400 m", "sessionCopy": "Calentamiento 10 min, 8 repeticiones a ritmo 5K con 90 seg suaves y enfriamiento de 8 min.", "week": [{"day": "L", "type": "Descanso", "done": true}, {"day": "M", "type": "Easy 6K", "done": true}, {"day": "M", "type": "Series", "done": false, "today": true}, {"day": "J", "type": "Fuerza", "done": false}, {"day": "V", "type": "Tempo", "done": false}, {"day": "S", "type": "Long Run", "done": false}, {"day": "D", "type": "Movilidad", "done": false}]}, {"id": 2, "name": "Carlos Mena", "level": "Avanzado", "plan": "10K Sub 50", "compliance": 68, "status": "Riesgo", "next": "Long Run · Mañana 7:00 AM", "fatigue": "Alta", "race": "10K Nocturno · 9 may", "weeklyLoad": "31 km", "note": "Faltó a 2 sesiones y reportó semana pesada en trabajo.", "sleep": "5.9h", "lastUpload": "Hace 1 día", "streak": 2, "monthVolume": 87, "completedToday": false, "adapted": false, "adaptationChoice": "", "sessionTitle": "Long Run 14K", "sessionCopy": "Rodaje largo con cierre controlado. Mantén RPE estable y técnica relajada.", "week": [{"day": "L", "type": "Descanso", "done": true}, {"day": "M", "type": "Easy 6K", "done": true}, {"day": "M", "type": "Series", "done": false, "today": true}, {"day": "J", "type": "Fuerza", "done": false}, {"day": "V", "type": "Tempo", "done": false}, {"day": "S", "type": "Long Run", "done": false}, {"day": "D", "type": "Movilidad", "done": false}]}, {"id": 3, "name": "Fernanda Solís", "level": "Principiante", "plan": "5K Principiante", "compliance": 81, "status": "Atención", "next": "Movilidad · Hoy 8:00 PM", "fatigue": "Media", "race": "5K Fundidora · 2 may", "weeklyLoad": "19 km", "note": "Le ayuda mucho tener indicaciones simples y alternativas indoor.", "sleep": "6.8h", "lastUpload": "Hace 5 horas", "streak": 4, "monthVolume": 53, "completedToday": false, "adapted": false, "adaptationChoice": "", "sessionTitle": "Movilidad y técnica", "sessionCopy": "Sesión ligera enfocada en movilidad, activación y técnica de carrera.", "week": [{"day": "L", "type": "Descanso", "done": true}, {"day": "M", "type": "Easy 6K", "done": true}, {"day": "M", "type": "Series", "done": false, "today": true}, {"day": "J", "type": "Fuerza", "done": false}, {"day": "V", "type": "Tempo", "done": false}, {"day": "S", "type": "Long Run", "done": false}, {"day": "D", "type": "Movilidad", "done": false}]}, {"id": 4, "name": "Luis Garza", "level": "Intermedio", "plan": "Maratón Base", "compliance": 88, "status": "Estable", "next": "Tempo · Viernes 6:30 AM", "fatigue": "Baja", "race": "Maratón CDMX · 24 ago", "weeklyLoad": "62 km", "note": "Sostiene buen volumen. Listo para bloque de umbral.", "sleep": "7.6h", "lastUpload": "Hace 40 min", "streak": 9, "monthVolume": 181, "completedToday": false, "adapted": false, "adaptationChoice": "", "sessionTitle": "Tempo progresivo 12K", "sessionCopy": "Controla la primera mitad y termina los últimos km cerca de umbral.", "week": [{"day": "L", "type": "Descanso", "done": true}, {"day": "M", "type": "Easy 6K", "done": true}, {"day": "M", "type": "Series", "done": false, "today": true}, {"day": "J", "type": "Fuerza", "done": false}, {"day": "V", "type": "Tempo", "done": false}, {"day": "S", "type": "Long Run", "done": false}, {"day": "D", "type": "Movilidad", "done": false}]}], plans: [{"id": 1, "title": "5K desde cero", "price": 149, "tag": "Más vendido", "desc": "8 semanas · 3 días por semana · ideal para principiantes", "sold": 182, "rating": 4.9, "published": true}, {"id": 2, "title": "10K flexible", "price": 229, "tag": "Autoajustable", "desc": "10 semanas · adapta sesiones si fallas entrenos", "sold": 96, "rating": 4.8, "published": true}, {"id": 3, "title": "21K primer medio maratón", "price": 349, "tag": "Premium", "desc": "12 semanas · incluye fuerza, movilidad y progreso semanal", "sold": 58, "rating": 4.9, "published": true}], calendar: [{"day": "Lunes", "sessions": [{"id": 11, "label": "Andrea · Easy 8K"}, {"id": 12, "label": "Luis · Fuerza core"}]}, {"day": "Martes", "sessions": [{"id": 21, "label": "Carlos · Intervalos"}, {"id": 22, "label": "Fernanda · Movilidad"}]}, {"day": "Miércoles", "sessions": [{"id": 31, "label": "Andrea · Tempo"}, {"id": 32, "label": "Fernanda · Fuerza"}, {"id": 33, "label": "Luis · Bike"}]}, {"day": "Jueves", "sessions": [{"id": 41, "label": "Carlos · Easy 7K"}, {"id": 42, "label": "Equipo base · Técnica"}]}, {"day": "Viernes", "sessions": [{"id": 51, "label": "Luis · Tempo"}, {"id": 52, "label": "Andrea · Descanso activo"}]}], billing: [{"id": 1, "label": "Andrea Ruiz · Coaching mensual", "amount": 1499, "status": "Pagado"}, {"id": 2, "label": "Plan 5K desde cero · Marketplace", "amount": 149, "status": "Pagado"}, {"id": 3, "label": "Carlos Mena · Coaching mensual", "amount": 1699, "status": "Pendiente"}, {"id": 4, "label": "Plan 10K flexible · Marketplace", "amount": 229, "status": "Pagado"}, {"id": 5, "label": "Fernanda Solís · Coaching mensual", "amount": 1299, "status": "Pendiente"}], settings: {"brandName": "Marco Coach", "slug": "marco-coach", "strava": true, "apple": false, "payments": true, "reminders": true, "upsell": true, "renewals": false},
  messagesByAthlete: {"1": [{"id": 1, "from": "coach", "text": "Hoy prioriza técnica y no salgas demasiado rápido."}, {"id": 2, "from": "me", "text": "Perfecto, si me siento cansada cambio la última serie."}, {"id": 3, "from": "coach", "text": "Exacto. Lo importante es mantener continuidad."}], "2": [{"id": 4, "from": "coach", "text": "Esta semana vamos a bajar un poco la carga."}], "3": [{"id": 5, "from": "coach", "text": "Recuerda priorizar movilidad si sientes la rodilla tensa."}], "4": [{"id": 6, "from": "coach", "text": "Buen volumen. Esta semana cuidemos recuperación."}]}, athleteViewId: 1, coachSelectedAthleteId: 1,
  toast:null, modal:null
};
const roleTabs=[{id:'coach',label:'Entrenador'},{id:'athlete',label:'Atleta'}];
const coachNav=[{id:'dashboard',label:'Dashboard'},{id:'athletes',label:'Atletas'},{id:'calendar',label:'Calendario'},{id:'marketplace',label:'Marketplace'},{id:'billing',label:'Cobros'},{id:'settings',label:'Ajustes'}];
const athleteNav=[{id:'home',label:'Inicio'},{id:'training',label:'Entreno'},{id:'progress',label:'Progreso'},{id:'store',label:'Tienda'},{id:'messages',label:'Mensajes'}];
let toastTimer=null;
const $ = s => document.querySelector(s);
function esc(s=''){return String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));}
function money(n){return '$'+Number(n).toLocaleString('es-MX')+' MXN';}
function aView(){return state.athletes.find(a=>a.id===state.athleteViewId)||state.athletes[0];}
function cAth(){return state.athletes.find(a=>a.id===state.coachSelectedAthleteId)||state.athletes[0];}
function msgs(id=state.athleteViewId){return state.messagesByAthlete[id]||[];}
function pill(text,active=true){return `<span class="pill ${active?'active':''}">${esc(text)}</span>`;}
function setToast(title,message){state.toast={title,message};if(toastTimer)clearTimeout(toastTimer);toastTimer=setTimeout(()=>{state.toast=null;renderToast();},2800);renderToast();}
function renderToast(){const r=$('#toast-root'); if(!state.toast){r.innerHTML='';return;} r.innerHTML=`<div class="toast"><div class="toastIcon">✓</div><div><div style="font-size:14px;font-weight:700">${esc(state.toast.title)}</div><div style="font-size:12px;color:var(--muted)">${esc(state.toast.message)}</div></div><button class="xbtn" onclick="state.toast=null;renderToast()">×</button></div>`;}
function openModal(html,size=''){state.modal={html,size}; renderModal();}
function closeModal(){state.modal=null; renderModal();}
function renderModal(){const r=$('#modal-root'); if(!state.modal){r.innerHTML='';return;} r.innerHTML=`<div class="modalBack" onclick="closeModal()"></div><div class="modal ${state.modal.size}">${state.modal.html}</div>`;}
function updateAthlete(id,patch){state.athletes=state.athletes.map(a=>a.id===id?{...a,...patch}:a); render();}
function sendCoachMessage(id,text){state.messagesByAthlete[id]=[...(state.messagesByAthlete[id]||[]),{id:Date.now(),from:'coach',text}]; render();}
function sendAthleteMessage(id,text){state.messagesByAthlete[id]=[...(state.messagesByAthlete[id]||[]),{id:Date.now(),from:'me',text}]; render();}
function addSession(day,label){const s={id:Date.now(),label}; state.calendar=state.calendar.map(d=>d.day===day?{...d,sessions:[...d.sessions,s]}:d); render(); return s;}
function createPlan(payload){const p={id:Date.now(),sold:0,rating:5,published:false,...payload}; state.plans=[...state.plans,p]; render(); return p.id;}
function updatePlan(id,patch){state.plans=state.plans.map(p=>p.id===id?{...p,...patch}:p); render();}
function togglePlan(id){state.plans=state.plans.map(p=>p.id===id?{...p,published:!p.published}:p); render();}
function hero(){ $('#roleTabs').innerHTML=roleTabs.map(t=>`<button class="tab ${state.role===t.id?'active':''}" onclick="state.role='${t.id}';render()">${t.label}</button>`).join(''); $('#heroTrail').textContent=state.role==='coach'?'Coach workspace › Vista interactiva':`Athlete experience · ${aView().name} › Vista interactiva`; }
function metric(label,value,sub,click=''){return `<button ${click?`onclick="${click}"`:''} style="width:100%;padding:0;background:transparent;border:0;text-align:left"><div class="card metric"><div class="small muted">${label}</div><div class="k">${value}</div><div class="small" style="color:var(--green);margin-top:8px">${sub}</div></div></button>`}
function coachHeader(title,sub){return `<div class="page-header"><div><div class="page-title">${title}</div><div class="page-sub">${sub}</div></div><div class="header-tools"><div class="search"><span>⌕</span><input placeholder="Buscar atleta, plan o sesión..."></div><button class="circlebtn" onclick="openNotifications()">🔔</button><div class="profile"><div class="avatar">M</div><div><div style="font-size:14px;font-weight:700">Marco Coach</div><div class="tiny muted">48 atletas activos</div></div></div></div></div>`}
function coachSidebar(){return `<div class="sidebar"><div class="brand"><div class="logo">⚡</div><div><div style="font-weight:700">${esc(state.settings.brandName)}</div><div class="tiny muted">Coach workspace</div></div></div>${coachNav.map(n=>`<button class="navbtn ${state.coachPage===n.id?'active':''}" onclick="state.coachPage='${n.id}';render()"><span>${n.label}</span><span>${state.coachPage===n.id?'›':''}</span></button>`).join('')}<div class="copilot"><div style="font-weight:700;color:#d8faff">Coach Copilot</div><div class="small muted" style="margin-top:8px;line-height:1.6">3 atletas requieren atención hoy. 1 pago pendiente y 2 atletas listos para upgrade.</div></div></div>`}
function resolveAlert(id){state.coachSelectedAthleteId=id; state.athleteViewId=id; state.coachPage=id===1?'marketplace':'athletes'; render(); setToast('Seguimiento listo','La vista relevante quedó abierta.');}
function coachDashboard(){const revenue=state.plans.reduce((a,p)=>a+p.price*Math.min(p.sold,12),0); return `<div class="page">${coachHeader('Dashboard del Coach','Tu operación diaria, ventas y seguimiento deportivo en un solo espacio.')}<div class="metrics">${metric('Atletas activos',String(state.athletes.length*12),'+12% este mes')}${metric('Cumplimiento','84%','Promedio semanal')}${metric('Ingresos del mes','$'+Math.round(revenue/1000)+'k','+8% vs. mes anterior')}${metric('Atletas en riesgo',String(state.athletes.filter(a=>a.status==='Riesgo').length+4),'Requieren revisión hoy')}</div><div class="twoCol"><div class="card"><div class="section-title">Alertas por excepción</div><div class="section-sub">El sistema te muestra lo que realmente necesita tu atención</div><div class="list">${[['Carlos Mena lleva 2 sesiones perdidas','Se recomienda simplificar la semana y mover el fondo al sábado.',2],['Fernanda reportó dolor leve en rodilla','Sugerir movilidad + carrera suave o reemplazo por bici.',3],['Andrea está lista para upgrade premium','Cumplimiento >90% y alta interacción. Buen momento para ofrecer coaching 1:1.',1]].map(([t,d,id])=>`<div class="row"><div class="iconBox">✦</div><div style="flex:1"><div style="font-weight:700;font-size:14px">${t}</div><div class="small muted" style="margin-top:6px;line-height:1.6">${d}</div></div><button class="darkbtn" onclick="resolveAlert(${id})">Resolver</button></div>`).join('')}</div></div><div class="card"><div class="section-title">Hoy en el planner</div><div class="section-sub">Sesiones destacadas del día</div><div class="list">${[['Tempo Run','12 km · Z3 / Z4','Andrea Ruiz','6:00 PM','linear-gradient(135deg, rgba(88,213,255,.26), rgba(78,163,255,.20))'],['Fuerza Tren Inferior','45 min · Gym','Fernanda Solís','8:00 PM','linear-gradient(135deg, rgba(159,124,255,.22), rgba(220,99,255,.16))'],['Long Ride','2h 15m · Resistencia','Luis Garza','7:30 AM','linear-gradient(135deg, rgba(106,240,178,.22), rgba(88,213,255,.12))']].map(([t,s,a,time,bg])=>`<button class="row clickable" onclick="state.coachPage='calendar';render();setToast('Planner abierto','Entraste al calendario desde ${t}.')" style="background:${bg};border-color:var(--border)"><div style="flex:1"><div style="font-weight:700;font-size:14px">${t}</div><div class="small muted" style="margin-top:6px">${s}</div><div class="tiny" style="margin-top:10px;color:rgba(255,255,255,.75)">${a}</div></div><div class="pill active">${time}</div></button>`).join('')}</div></div></div><div class="twoCol"><div class="card"><div class="section-title">Atletas activos</div><div class="section-sub">Haz clic sobre un atleta para entrar a su expediente</div><div style="margin-top:18px;border:1px solid var(--border);border-radius:26px;overflow:hidden"><div class="tableHead"><div>Atleta</div><div>Plan</div><div>Cumplimiento</div><div>Próximo</div></div>${state.athletes.map(a=>`<button class="tableRow" style="width:100%;background:transparent;border-left:0;border-right:0;border-bottom:0" onclick="state.coachSelectedAthleteId=${a.id};state.athleteViewId=${a.id};state.coachPage='athletes';render()"><div><div style="font-weight:700;font-size:14px">${a.name}</div><div class="tiny muted" style="margin-top:4px">Estado: ${a.status}</div></div><div class="small muted">${a.plan}</div><div><div class="small muted" style="margin-bottom:8px">${a.compliance}%</div><div class="progress"><div class="bar" style="width:${a.compliance}%"></div></div></div><div class="small muted">${a.next}</div></button>`).join('')}</div></div><div class="card"><div class="section-title">Ventas del marketplace</div><div class="section-sub">Tus planes digitales generan ingresos incluso sin coaching 1:1</div><div class="list">${state.plans.map(p=>`<button class="row clickable" onclick="state.coachPage='marketplace';render();setToast('Plan abierto','Entraste a ${p.title}.')"><div style="flex:1"><div style="font-weight:700;font-size:14px">${p.title}</div><div class="small muted" style="margin-top:6px;line-height:1.6">${p.desc}</div><div style="margin-top:14px"><div style="font-weight:700;color:var(--cyan)">${money(p.price)}</div><div class="tiny muted" style="margin-top:4px">${p.sold} ventas · ${p.rating}★</div></div></div>${pill(p.tag)}</button>`).join('')}</div></div></div></div>`}
function coachAthletesPage(){const a=cAth(); const q=(state._athleteSearch||'').toLowerCase(); const filtered=state.athletes.filter(x=>x.name.toLowerCase().includes(q)||x.plan.toLowerCase().includes(q)); return `<div class="page">${coachHeader('Atletas','Gestiona expedientes, wellness, próximas sesiones y comunicación individual.')}<div class="split"><div class="card"><div class="search" style="margin-bottom:18px"><span>⌕</span><input placeholder="Buscar atleta o plan" value="${esc(state._athleteSearch||'')}" oninput="state._athleteSearch=this.value;render()"></div><div class="section-title">Lista de atletas</div><div class="section-sub">Selecciona uno para revisar su detalle</div><div class="list">${filtered.map(item=>`<button class="row clickable" onclick="state.coachSelectedAthleteId=${item.id};state.athleteViewId=${item.id};render()" style="${a.id===item.id?'border-color:rgba(88,213,255,.3);background:rgba(88,213,255,.10)':''}"><div style="flex:1"><div style="font-weight:700;font-size:14px">${item.name}</div><div class="tiny muted" style="margin-top:4px">${item.plan}</div><div class="tiny muted" style="margin-top:10px">${item.race}</div><div class="progress" style="margin-top:12px"><div class="bar" style="width:${item.compliance}%"></div></div></div><div class="pill ${a.id===item.id?'active':''}">${item.status}</div></button>`).join('')}</div></div><div class="grid"><div class="card"><div style="display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap"><div><div style="font-size:30px;font-weight:700">${a.name}</div><div class="tagRow" style="margin-top:10px">${pill(a.plan)} ${pill(a.level,false)} ${pill(a.race,false)}</div></div><div class="tagRow"><button class="ghost" onclick="openCoachMessageModal()">Enviar mensaje</button><button class="whitebtn" onclick="openEditAthleteModal()">Editar plan</button></div></div><div class="threeCol" style="margin-top:22px;grid-template-columns:repeat(4,minmax(0,1fr))">${[['Cumplimiento',a.compliance+'%'],['Carga semanal',a.weeklyLoad],['Fatiga',a.fatigue],['Próximo',a.next]].map(([l,v])=>`<div class="miniCard"><div class="tiny muted">${l}</div><div style="font-size:20px;font-weight:700;margin-top:10px">${v}</div></div>`).join('')}</div></div><div class="twoCol"><div class="card"><div class="section-title">Notas del coach</div><div class="section-sub">Contexto operativo y deportivo</div><div class="row" style="margin-top:18px;display:block"><div class="small muted" style="line-height:1.8">${a.note}</div></div><div class="list">${[`Última sesión cargada desde Strava ${a.lastUpload}`,`Sueño promedio de la semana: ${a.sleep}`,'Sin incidencias de pago'].map(x=>`<div class="row"><div class="iconBox">✓</div><div class="small muted">${x}</div></div>`).join('')}</div></div><div class="card"><div class="section-title">Próximas sesiones</div><div class="section-sub">Semana visible del atleta</div><div class="list">${['Mié · Series 8 × 400 m · 55 min','Jue · Fuerza tren inferior · 40 min','Vie · Tempo progresivo · 9 km','Sáb · Long run · 14 km'].map(x=>`<button class="tagBtn" onclick="setToast('Sesión abierta','${x}')">${x}</button>`).join('')}</div></div></div></div></div></div>`}
function coachCalendarPage(){const selectedDay=state._selectedDay||state.calendar[2].day; const selectedSessionId=state._selectedSessionId||state.calendar[2].sessions[0].id; const selectedSession=(state.calendar.find(d=>d.day===selectedDay)?.sessions||[]).find(s=>s.id===selectedSessionId)||null; return `<div class="page">${coachHeader('Calendario','Vista operativa de sesiones asignadas, cargas y próximos entrenamientos del día.')}<div class="twoCol" style="grid-template-columns:1.2fr .8fr"><div class="card"><div style="display:flex;justify-content:space-between;gap:16px;align-items:center;flex-wrap:wrap"><div><div class="section-title">Planner semanal</div><div class="section-sub">Haz clic en una sesión para ver detalle</div></div><button class="whitebtn" onclick="openNewSessionModal()">Nueva sesión</button></div><div class="threeCol" style="grid-template-columns:repeat(5,minmax(0,1fr));margin-top:18px">${state.calendar.map(col=>`<div class="miniCard" style="${selectedDay===col.day?'border:1px solid rgba(88,213,255,.3);background:rgba(88,213,255,.10)':''}"><button style="width:100%;display:flex;justify-content:space-between;align-items:center;background:transparent;border:0;color:#fff;cursor:pointer" onclick="state._selectedDay='${col.day}';state._selectedSessionId=${col.sessions[0]?.id||'null'};render()"><span style="font-weight:700">${col.day}</span><span class="muted">📅</span></button><div class="list" style="margin-top:14px">${col.sessions.map(s=>`<button class="tagBtn" onclick="state._selectedDay='${col.day}';state._selectedSessionId=${s.id};render()" style="${selectedSessionId===s.id?'border-color:rgba(88,213,255,.3);background:rgba(255,255,255,.10)':''}">${s.label}</button>`).join('')}</div></div>`).join('')}</div></div><div class="card"><div class="section-title">Detalle de sesión</div><div class="section-sub">Contexto rápido del bloque seleccionado</div><div class="row" style="display:block;margin-top:18px"><div class="tiny muted">Día</div><div style="font-size:24px;font-weight:700;margin-top:6px">${selectedDay}</div><div class="tiny muted" style="margin-top:14px">Sesión</div><div style="font-size:20px;font-weight:700;margin-top:6px">${selectedSession?selectedSession.label:'Selecciona una sesión'}</div><div class="small muted" style="margin-top:14px;line-height:1.7">Aquí el coach revisa la carga, reasigna sesiones y hace ajustes rápidos sin salir del planner.</div></div><div class="list">${['Duplicar al siguiente lunes','Mover a otro día','Asignar a un grupo'].map(x=>`<button class="tagBtn" onclick="setToast('Acción aplicada','${x}')">${x}</button>`).join('')}</div></div></div></div>`}
function coachMarketplacePage(){const selectedPlanId=state._selectedPlanId||state.plans[0].id; const plan=state.plans.find(p=>p.id===selectedPlanId)||state.plans[0]; return `<div class="page">${coachHeader('Marketplace','Publica planes, revisa conversión y convierte atletas self-service a coaching premium.')}<div class="twoCol"><div class="card"><div style="display:flex;justify-content:space-between;gap:16px;align-items:center;flex-wrap:wrap"><div><div class="section-title">Tus planes publicados</div><div class="section-sub">Programas digitales listos para venta</div></div><button class="whitebtn" onclick="openCreatePlanModal()">Crear plan</button></div><div class="threeCol" style="margin-top:18px">${state.plans.map((p,idx)=>`<button class="planCard" onclick="state._selectedPlanId=${p.id};render()" style="${selectedPlanId===p.id?'border-color:rgba(88,213,255,.3)':''}"><div class="preview" style="${idx===0?'background:linear-gradient(135deg, rgba(88,213,255,.15), rgba(78,163,255,.10))':idx===1?'background:linear-gradient(135deg, rgba(159,124,255,.15), rgba(220,99,255,.10))':'background:linear-gradient(135deg, rgba(106,240,178,.15), rgba(88,213,255,.10))'}"><div style="display:flex;justify-content:space-between;align-items:center">${pill(p.tag)}<span class="muted">★</span></div><div style="margin-top:18px;font-size:22px;font-weight:700">${p.title}</div><div class="small muted" style="margin-top:8px;line-height:1.6">${p.desc}</div></div><div style="margin-top:16px;display:flex;justify-content:space-between;align-items:flex-end;gap:10px"><div><div class="tiny muted">Desde</div><div style="font-size:28px;font-weight:700;color:var(--cyan)">${money(p.price)}</div><div class="tiny muted">${p.sold} ventas · ${p.rating}★</div></div><div class="pill ${p.published?'active':''}">${p.published?'Publicado':'Borrador'}</div></div></button>`).join('')}</div></div><div class="card"><div class="section-title">Embudo y edición rápida</div><div class="section-sub">Cambia precio, estado y visibilidad</div><div class="row" style="display:block;margin-top:18px"><div style="font-size:22px;font-weight:700">${plan.title}</div><div class="small muted" style="margin-top:8px;line-height:1.7">${plan.desc}</div><div class="tagRow" style="margin-top:14px">${pill(plan.tag)} ${pill(plan.rating+'★',false)} ${pill(plan.sold+' ventas',false)}</div></div><div class="list">${[['Visitas a ficha','1,284'],['Compras del mes','34'],['Conversión a coach premium','7 atletas'],['Ingreso por marketplace','$11.9k']].map(([l,v])=>`<div class="row"><div class="small muted">${l}</div><div style="font-size:20px;font-weight:700">${v}</div></div>`).join('')}</div><div class="grid2" style="margin-top:16px"><button class="ghost" onclick="togglePlan(${plan.id});setToast('Estado actualizado','${plan.title} cambió de visibilidad.')">${plan.published?'Pasar a borrador':'Publicar plan'}</button><button class="whitebtn" onclick="openEditPlanModal(${plan.id})">Editar ficha</button></div></div></div></div>`}
function coachBillingPage(){const filter=state._billingFilter||'Todos'; const filtered=state.billing.filter(i=>filter==='Todos'||i.status===filter); const pending=state.billing.filter(i=>i.status==='Pendiente').reduce((a,b)=>a+b.amount,0); return `<div class="page">${coachHeader('Cobros','Suscripciones, pagos pendientes y resumen del negocio del coach.')}<div class="metrics" style="grid-template-columns:repeat(3,minmax(0,1fr))">${metric('Cobrado este mes','$28.4k','42 pagos exitosos')}${metric('Pendientes','$'+pending,'Renovaciones próximas')}${metric('MRR estimado','$35.1k','Crecimiento sostenido')}</div><div class="card"><div style="display:flex;justify-content:space-between;gap:16px;align-items:center;flex-wrap:wrap"><div><div class="section-title">Movimientos recientes</div><div class="section-sub">Suscripciones y ventas de planes</div></div><div class="tabs">${['Todos','Pagado','Pendiente'].map(f=>`<button class="tab ${filter===f?'active':''}" onclick="state._billingFilter='${f}';render()">${f}</button>`).join('')}</div></div><div class="list">${filtered.map(item=>`<div class="row"><div><div class="small">${item.label}</div><div class="tiny muted" style="margin-top:4px">${money(item.amount)}</div></div><div class="tagRow"><div class="pill ${item.status==='Pendiente'?'':'active'}" style="${item.status==='Pendiente'?'background:rgba(248,201,106,.15);border-color:rgba(248,201,106,.25);color:#ffe8b1':''}">${item.status}</div>${item.status==='Pendiente'?`<button class="whitebtn" onclick="markPaid(${item.id})">Marcar pagado</button>`:''}</div></div>`).join('')}</div></div></div>`}
function coachSettingsPage(){const tab=state._settingsTab||'brand'; const s=state.settings; return `<div class="page">${coachHeader('Ajustes','Branding, cobros, integraciones y personalización de tu negocio dentro de la plataforma.')}<div class="tabs">${[['brand','Marca'],['integrations','Integraciones'],['automation','Automatizaciones']].map(([id,l])=>`<button class="tab ${tab===id?'active':''}" onclick="state._settingsTab='${id}';render()">${l}</button>`).join('')}</div>${tab==='brand'?`<div class="twoCol"><div class="card"><div class="formGrid2"><label>Nombre comercial<input type="text" value="${esc(s.brandName)}" oninput="state.settings.brandName=this.value;render()"></label><label>URL pública<input type="text" value="${esc(s.slug)}" oninput="state.settings.slug=this.value;render()"></label></div><div class="actions"><button class="whitebtn" onclick="setToast('Ajustes guardados','El branding se aplicó en la plataforma.')">Guardar branding</button></div></div><div class="card"><div class="section-title">Vista previa pública</div><div class="section-sub">Cómo te verían tus atletas y leads</div><div class="preview" style="margin-top:18px"><div style="font-size:28px;font-weight:700">${esc(s.brandName)}</div><div class="small muted" style="margin-top:8px">pulse.app/${esc(s.slug)}</div><div class="tagRow" style="margin-top:14px">${pill('Running')} ${pill('Planes digitales',false)} ${pill('Coaching 1:1',false)}</div></div></div></div>`:''}${tab==='integrations'?`<div class="settingsGrid">${[['Strava','strava'],['Apple Health','apple'],['Pagos automáticos','payments']].map(([label,key])=>`<div class="card settingCard"><div style="font-size:22px;font-weight:700">${label}</div><div class="small muted" style="margin-top:12px;line-height:1.7">Activa o desactiva servicios conectados en la cuenta del coach.</div><button class="${s[key]?'darkbtn':'ghost'}" style="margin-top:18px" onclick="state.settings.${key}=!state.settings.${key};render();setToast('Configuración actualizada function athleteTabs(){return `<div class="tabs">${athleteNav.map(n=>`<button class="tab ${state.athletePage===n.id?'active':''}" onclick="state.athletePage='${n.id}';render()">${n.label}</button>`).join('')}</div>`}
function athleteHomePhone(a){return `<div class="device"><div class="notch"></div><div class="screen"><div class="screenBody"><div class="phoneTop"><div><div class="tiny" style="letter-spacing:.25em;color:#b9f5ff;text-transform:uppercase">Miércoles</div><div class="phoneTitle">Hola, ${a.name}</div></div><button class="circlebtn">🔔</button></div><div class="heroCard"><div style="display:flex;justify-content:space-between;align-items:center">${pill(a.completedToday?'Completado':'Sesión del día')}<div class="tiny muted">6:00 PM</div></div><div class="tiny muted" style="margin-top:10px">Plan activo: ${a.plan}</div><div style="font-size:30px;font-weight:700;margin-top:10px">${a.sessionTitle}</div><div class="small muted" style="margin-top:10px;line-height:1.7">${a.sessionCopy}</div>${a.adapted?`<div class="miniCard" style="margin-top:12px;border-color:rgba(248,201,106,.2);background:rgba(248,201,106,.10);color:#ffe8b1">Ajuste aplicado: ${a.adaptationChoice}</div>`:''}<div class="grid3" style="margin-top:14px"><div class="miniCard"><div class="tiny muted">Objetivo</div><div style="margin-top:8px;font-weight:700">Velocidad</div></div><div class="miniCard"><div class="tiny muted">Duración</div><div style="margin-top:8px;font-weight:700">55 min</div></div><div class="miniCard"><div class="tiny muted">RPE</div><div style="margin-top:8px;font-weight:700">7 / 10</div></div></div><div class="grid2" style="margin-top:14px"><button class="whitebtn" onclick="state.athletePage='training';render()">Iniciar entreno</button><button class="ghost" onclick="openAdaptationModal()">No puedo hoy</button></div></div><div class="grid3" style="margin-top:16px"><div class="miniCard" style="text-align:center"><div>🔥</div><div class="tiny muted" style="margin-top:6px">Racha</div><div style="font-size:24px;font-weight:700;margin-top:6px">${a.streak}</div></div><div class="miniCard" style="text-align:center"><div>🎯</div><div class="tiny muted" style="margin-top:6px">Cumplimiento</div><div style="font-size:24px;font-weight:700;margin-top:6px">${a.compliance}%</div></div><div class="miniCard" style="text-align:center"><div>🏅</div><div class="tiny muted" style="margin-top:6px">Meta</div><div style="font-size:24px;font-weight:700;margin-top:6px">21K</div></div></div><div style="margin-top:18px"><div style="display:flex;justify-content:space-between;align-items:center"><div style="font-size:15px;font-weight:700">Semana actual</div><button class="ghost" style="padding:6px 10px;border-radius:999px;font-size:12px" onclick="state.athletePage='progress';render()">Ver progreso</button></div><div class="week" style="margin-top:10px">${a.week.map(d=>`<div class="day ${d.today?'today':''} ${d.done?'done':''}"><div class="tiny muted">${d.day}</div><div style="margin-top:8px;font-size:11px;line-height:1.3;color:rgba(255,255,255,.72)">${d.type}</div></div>`).join('')}</div></div></div></div><div class="deviceLabel">Athlete App · Inicio real de usuario</div></div>`}
function athleteTrainingPhone(a){return `<div class="device"><div class="notch"></div><div class="screen"><div class="screenBody"><div class="phoneTop"><div class="small muted">Sesión programada</div><div class="small muted">⏱</div></div><div class="phoneTitle" style="font-size:32px">${a.sessionTitle}</div><div class="pill" style="margin-top:10px">9 km · Running · Coach personalizado</div><div class="miniCard" style="margin-top:16px"><div class="small" style="color:var(--cyan)">Objetivo</div><div class="small muted" style="margin-top:8px;line-height:1.7">Trabajar tolerancia al ritmo umbral sin acumular fatiga excesiva.</div></div><div class="list">${['10 min trote suave + movilidad dinámica','3 bloques de 8 min en Z3 con 2 min suaves','5 min soltura + técnica ligera','Enfriamiento 8 min muy suave'].map(x=>`<div class="tagBtn" style="cursor:default">${x}</div>`).join('')}</div><div class="miniCard" style="margin-top:16px;background:linear-gradient(135deg, rgba(159,124,255,.10), rgba(88,213,255,.10));border-color:rgba(159,124,255,.2)"><div style="font-weight:700">Alternativas si no puedes cumplirlo</div><div class="list" style="margin-top:12px">${['Versión corta de 35 min','Caminadora indoor','Sustituir por bici suave 45 min'].map(x=>`<button class="tagBtn" onclick="openAdaptationModal()">${x}</button>`).join('')}</div></div><div class="grid2" style="margin-top:16px"><button class="whitebtn" onclick="openFeedbackModal()">Marcar como hecho</button><button class="ghost" onclick="openAdaptationModal()">Reprogramar</button></div></div></div><div class="deviceLabel">Athlete App · Detalle de entrenamiento</div></div>`}
function athleteProgressPhone(a){return `<div class="device"><div class="notch"></div><div class="screen"><div class="screenBody"><div class="phoneTitle">Tu progreso</div><div class="small muted" style="margin-top:8px">Seguimiento simple y entendible para el atleta.</div><div class="grid2" style="margin-top:16px">${[['Cumplimiento',`${a.compliance}%`],['Volumen mes',`${a.monthVolume} km`],['Ritmo medio','5:27/km'],['Racha',`${a.streak} días`]].map(([l,v])=>`<button class="miniCard" style="text-align:left;cursor:pointer" onclick="openMetricModal('${l}','${v}')"><div class="tiny muted">${l}</div><div style="font-size:28px;font-weight:700;margin-top:10px">${v}</div></button>`).join('')}</div><div class="miniCard" style="margin-top:16px"><div style="display:flex;justify-content:space-between;align-items:center"><div style="font-weight:700">Bloque actual</div>${pill('Semana 5 / 12')}</div><div class="list" style="margin-top:14px">${[['Resistencia',76],['Velocidad',62],['Fuerza',54]].map(([l,v])=>`<button style="display:block;width:100%;background:transparent;border:0;text-align:left;cursor:pointer" onclick="openMetricModal('${l}','${v}%')"><div style="display:flex;justify-content:space-between" class="small muted"><span>${l}</span><span>${v}%</span></div><div class="progress" style="margin-top:8px"><div class="bar" style="width:${v}%"></div></div></button>`).join('')}</div></div></div></div><div class="deviceLabel">Athlete App · Progreso</div></div>`}
function athleteStorePhone(){return `<div class="device"><div class="notch"></div><div class="screen"><div class="screenBody"><div class="phoneTitle">Descubre planes</div><div class="small muted" style="margin-top:8px">Compra planes base o sube a coaching personalizado.</div><div class="tagRow" style="margin-top:14px">${pill('21K')} ${pill('10K',false)} ${pill('Principiante',false)}</div><div class="list">${state.plans.filter(p=>p.published).map(plan=>`<div class="planCard"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px"><div><div style="font-size:14px;font-weight:700">${plan.title}</div><div class="tiny muted" style="margin-top:6px;line-height:1.6">${plan.desc}</div></div>${pill(plan.tag)}</div><div style="margin-top:14px;display:flex;justify-content:space-between;align-items:flex-end"><div><div style="font-size:22px;font-weight:700;color:var(--cyan)">${money(plan.price)}</div><div class="tiny muted">${plan.rating}★ · ${plan.sold} ventas</div></div><button class="whitebtn" onclick="openCheckout(${plan.id})">Comprar</button></div></div>`).join('')}</div></div></div><div class="deviceLabel">Athlete App · Tienda / Marketplace</div></div>`}
function athleteMessagesPhone(){return `<div class="device"><div class="notch"></div><div class="screen"><div class="screenBody"><div class="phoneTitle">Mensajes</div><div class="small muted" style="margin-top:8px">Comunicación clara y directa con tu coach.</div><div class="list">${msgs().map(msg=>`<div style="max-width:88%;${msg.from==='coach'?'':'margin-left:auto'};padding:14px 16px;border-radius:22px;${msg.from==='coach'?'background:rgba(88,213,255,.10);color:#fff':'background:rgba(255,255,255,.05);color:rgba(255,255,255,.75)'}"><div class="tiny muted" style="text-transform:uppercase;letter-spacing:.16em;margin-bottom:6px">${msg.from==='coach'?'Coach':'Tú'}</div><div class="small" style="line-height:1.7">${msg.text}</div></div>`).join('')}</div></div></div><div class="deviceLabel">Athlete App · Mensajes</div></div>`}
function athleteDesktop(a){return `<div class="card desktopCard"><div class="page-header"><div><div class="section-title" style="font-size:32px">${{home:'Panel del atleta',training:'Entrenamiento de hoy',progress:'Resumen de avance',store:'Marketplace',messages:'Mensajes'}[state.athletePage]}</div><div class="section-sub">Experiencia real del usuario atleta dentro de la plataforma.</div></div>${athleteTabs()}</div>${state.athletePage==='home'?`<div class="cards3 desktopSection">${metric('Objetivo','21K','18 de abril',"state.athletePage='progress';render()")}${metric('Cumplimiento',a.compliance+'%','Semana actual',"state.athletePage='progress';render()")}${metric('Estado',a.completedToday?'Hecho':'Listo',a.plan,"state.athletePage='training';render()")}</div>`:''}${state.athletePage==='training'?`<div class="cards2 desktopSection"><div class="miniCard" style="padding:20px"><div style="font-size:22px;font-weight:700">${a.sessionTitle}</div><div class="small muted" style="margin-top:12px;line-height:1.7">Entrenamiento diseñado por tu coach con alternativas si no puedes cumplirlo. Se siente como una app viva, no como una simple tabla.</div><div class="list">${['Objetivo: umbral aeróbico','Duración estimada: 52 min',`Plan activo: ${a.plan}`].map(x=>`<div class="tagBtn" style="cursor:default">${x}</div>`).join('')}</div></div><div class="miniCard" style="padding:20px;background:linear-gradient(135deg, rgba(88,213,255,.10), rgba(159,124,255,.10))"><div style="font-weight:700">Opciones rápidas</div><div class="list">${['Versión corta','Indoor / caminadora','Mover a mañana','Avisar al coach'].map(x=>`<button class="tagBtn" onclick="openAdaptationModal()">${x}</button>`).join('')}</div></div></div>`:''}${state.athletePage==='progress'?`<div class="cards2 desktopSection"><div class="miniCard" style="padding:20px"><div style="font-weight:700">Indicadores del bloque</div><div class="list">${[['Resistencia',76],['Velocidad',62],['Recuperación',81]].map(([l,v])=>`<button style="display:block;width:100%;background:transparent;border:0;text-align:left;cursor:pointer" onclick="openMetricModal('${l}','${v}%')"><div style="display:flex;justify-content:space-between" class="small muted"><span>${l}</span><span>${v}%</span></div><div class="progress" style="margin-top:8px"><div class="bar" style="width:${v}%"></div></div></button>`).join('')}</div><div class="grid3" style="margin-top:18px"><button class="ghost" onclick="state.athletePage='training';render()">Ver entreno</button><button class="ghost" onclick="state.athletePage='messages';render()">Abrir mensajes</button><button class="ghost" onclick="state.athletePage='store';render()">Ver tienda</button></div></div><div class="miniCard" style="padding:20px"><div style="font-weight:700">Últimos hitos</div><div class="list">${[`Nuevo mejor 5K: 26:58`,`${a.streak} días seguidos con actividad`,`Volumen mensual: ${a.monthVolume} km`].map(x=>`<button class="tagBtn" onclick="openMetricModal('Detalle','${x}')">${x}</button>`).join('')}</div></div></div>`:''}${state.athletePage==='store'?`<div class="cards3 desktopSection">${state.plans.filter(p=>p.published).map(plan=>`<div class="planCard"><div style="display:flex;justify-content:space-between;align-items:center">${pill(plan.tag)}<span class="muted">⋯</span></div><div style="font-size:20px;font-weight:700;margin-top:16px">${plan.title}</div><div class="small muted" style="margin-top:8px;line-height:1.7">${plan.desc}</div><div style="margin-top:18px;display:flex;justify-content:space-between;align-items:flex-end"><div style="font-size:26px;font-weight:700;color:var(--cyan)">${money(plan.price)}</div><button class="whitebtn" onclick="openCheckout(${plan.id})">Comprar</button></div></div>`).join('')}</div>`:''}${state.athletePage==='messages'?`<div class="miniCard desktopSection" style="padding:20px"><div class="list">${msgs().map(msg=>`<div style="max-width:85%;${msg.from==='coach'?'':'margin-left:auto'};padding:14px 16px;border-radius:22px;${msg.from==='coach'?'background:rgba(88,213,255,.10);color:#fff':'background:rgba(255,255,255,.05);color:rgba(255,255,255,.75)'}"><div class="tiny muted" style="text-transform:uppercase;letter-spacing:.16em;margin-bottom:6px">${msg.from==='coach'?'Coach':'Tú'}</div><div class="small" style="line-height:1.7">${msg.text}</div></div>`).join('')}</div><div class="grid2" style="grid-template-columns:1fr auto;margin-top:18px"><input type="text" id="athleteMsgInput" placeholder="Escribe un mensaje"><button class="whitebtn" onclick="submitAthleteMsg()">Enviar</button></div></div>`:''}</div>`}
function athleteView(){const a=aView(); return `<div class="page"><div class="page-header"><div><div class="page-title">Vista del atleta</div><div class="page-sub">Una experiencia clara, moderna y accionable para que el usuario sí use la app todos los días.</div></div>${athleteTabs()}</div><div class="deviceLayout"><div>${state.athletePage==='home'?athleteHomePhone(a):''}${state.athletePage==='training'?athleteTrainingPhone(a):''}${state.athletePage==='progress'?athleteProgressPhone(a):''}${state.athletePage==='store'?athleteStorePhone():''}${state.athletePage==='messages'?athleteMessagesPhone():''}</div><div>${athleteDesktop(a)}</div></div></div>`}
function openNotifications(){openModal(`<div class="modalHead"><div style="font-size:22px;font-weight:700">Notificaciones del coach</div><button class="xbtn" onclick="closeModal()">×</button></div><div class="list">${['Carlos Mena tiene 2 sesiones omitidas esta semana.','Fernanda reportó molestia leve en rodilla derecha.','Andrea calificó el último bloque con RPE 6/10.'].map(x=>`<div class="tagBtn" style="cursor:default">${x}</div>`).join('')}</div><div class="actions"><button class="whitebtn" onclick="closeModal()">Cerrar</button></div>`,'sm')}
function openCoachMessageModal(){const a=cAth(); openModal(`<div class="modalHead"><div style="font-size:22px;font-weight:700">Mensaje para ${a.name}</div><button class="xbtn" onclick="closeModal()">×</button></div><textarea id="coachMsgText" placeholder="Escribe una indicación, feedback o ajuste para el atleta"></textarea><div class="actions"><button class="ghost" onclick="closeModal()">Cancelar</button><button class="whitebtn" onclick="submitCoachMsg(${a.id})">Enviar</button></div>`)}
function submitCoachMsg(id){const text=$('#coachMsgText').value.trim(); if(!text)return; sendCoachMessage(id,text); state.athleteViewId=id; closeModal(); setToast('Mensaje enviado','Se notificó al atleta y ya aparece en su chat.')}
function openEditAthleteModal(){const a=cAth(); openModal(`<div class="modalHead"><div style="font-size:22px;font-weight:700">Editar plan de ${a.name}</div><button class="xbtn" onclick="closeModal()">×</button></div><div class="formGrid2"><label>Plan<input id="editPlan" type="text" value="${esc(a.plan)}"></label><label>Carga semanal<input id="editLoad" type="text" value="${esc(a.weeklyLoad)}"></label></div><label style="margin-top:16px">Nota del coach<textarea id="editNote">${esc(a.note)}</textarea></label><div class="actions"><button class="ghost" onclick="closeModal()">Cancelar</button><button class="whitebtn" onclick="submitEditAthlete(${a.id})">Guardar cambios</button></div>`)}
function submitEditAthlete(id){updateAthlete(id,{plan:$('#editPlan').value,weeklyLoad:$('#editLoad').value,note:$('#editNote').value}); state.athleteViewId=id; closeModal(); setToast('Plan actualizado','Los cambios ya se reflejan en la vista del atleta.')}
function openNewSessionModal(){openModal(`<div class="modalHead"><div style="font-size:22px;font-weight:700">Crear nueva sesión</div><button class="xbtn" onclick="closeModal()">×</button></div><div class="formGrid2"><label>Día<select id="newSessionDay">${state.calendar.map(d=>`<option value="${d.day}">${d.day}</option>`).join('')}</select></label><label>Sesión<input id="newSessionLabel" type="text" placeholder="Ej. Andrea · Fondo 16K"></label></div><div class="actions"><button class="ghost" onclick="closeModal()">Cancelar</button><button class="whitebtn" onclick="submitNewSession()">Agregar</button></div>`)}
function submitNewSession(){const day=$('#newSessionDay').value; const label=$('#newSessionLabel').value.trim(); if(!label)return; const s=addSession(day,label); state._selectedDay=day; state._selectedSessionId=s.id; closeModal(); setToast('Sesión creada','Se agregó en el planner y quedó seleccionada.')}
function openCreatePlanModal(){openModal(`<div class="modalHead"><div style="font-size:22px;font-weight:700">Crear plan digital</div><button class="xbtn" onclick="closeModal()">×</button></div><div class="formGrid2"><label>Nombre del plan<input id="newPlanTitle" type="text"></label><label>Precio<input id="newPlanPrice" type="number" value="199"></label></div><div class="formGrid2" style="margin-top:16px"><label>Etiqueta<input id="newPlanTag" type="text" value="Nuevo"></label><label>Descripción<input id="newPlanDesc" type="text"></label></div><div class="actions"><button class="ghost" onclick="closeModal()">Cancelar</button><button class="whitebtn" onclick="submitCreatePlan()">Crear</button></div>`)}
function submitCreatePlan(){const title=$('#newPlanTitle').value.trim(); if(!title)return; const id=createPlan({title,price:Number($('#newPlanPrice').value||0),tag:$('#newPlanTag').value||'Nuevo',desc:$('#newPlanDesc').value||''}); state._selectedPlanId=id; closeModal(); setToast('Plan creado','El nuevo plan quedó guardado como borrador y ya es editable.')}
function openEditPlanModal(id){const p=state.plans.find(x=>x.id===id); if(!p)return; openModal(`<div class="modalHead"><div style="font-size:22px;font-weight:700">Editar ficha del plan</div><button class="xbtn" onclick="closeModal()">×</button></div><div class="formGrid2"><label>Nombre<input id="editPlanTitle" type="text" value="${esc(p.title)}"></label><label>Precio<input id="editPlanPrice" type="number" value="${p.price}"></label></div><div class="formGrid2" style="margin-top:16px"><label>Etiqueta<input id="editPlanTag" type="text" value="${esc(p.tag)}"></label><label>Descripción<input id="editPlanDesc" type="text" value="${esc(p.desc)}"></label></div><div class="actions"><button class="ghost" onclick="closeModal()">Cancelar</button><button class="whitebtn" onclick="submitEditPlan(${id})">Guardar edición</button></div>`)}
function submitEditPlan(id){updatePlan(id,{title:$('#editPlanTitle').value,price:Number($('#editPlanPrice').value||0),tag:$('#editPlanTag').value,desc:$('#editPlanDesc').value}); closeModal(); setToast('Plan actualizado','La ficha del marketplace ya refleja los cambios.')}
function markPaid(id){state.billing=state.billing.map(r=>r.id===id?{...r,status:'Pagado'}:r); render(); setToast('Pago registrado','El movimiento quedó marcado como pagado.')}
function openAdaptationModal(){openModal(`<div class="modalHead"><div style="font-size:22px;font-weight:700">No puedo entrenar hoy</div><button class="xbtn" onclick="closeModal()">×</button></div><div class="list">${[['Versión corta','35 min · conserva intención del bloque'],['Indoor','Caminadora o bici suave'],['Mañana','Mover sin romper la semana']].map(([t,s])=>`<button class="tagBtn" onclick="applyAdaptation('${t}')"><div style="font-weight:700">${t}</div><div class="tiny muted" style="margin-top:4px">${s}</div></button>`).join('')}</div>`,'sm')}
function applyAdaptation(choice){const a=aView(); updateAthlete(a.id,{adapted:true,adaptationChoice:choice,sessionTitle:choice==='Mañana'?`${a.sessionTitle} · Reprogramado`:`${a.sessionTitle.split(' · ')[0]} · ${choice}`}); closeModal(); setToast('Entreno adaptado',`Se aplicó: ${choice}.`);}
function openFeedbackModal(){openModal(`<div class="modalHead"><div style="font-size:22px;font-weight:700">Guardar entrenamiento</div><button class="xbtn" onclick="closeModal()">×</button></div><div class="formGrid2"><label>RPE (1 a 10)<input id="feedbackRpe" type="number" value="7"></label><div></div></div><label style="margin-top:16px">Comentario<textarea id="feedbackNote">Me sentí bien, solo las últimas 2 repeticiones costaron más.</textarea></label><div class="actions"><button class="ghost" onclick="closeModal()">Cancelar</button><button class="whitebtn" onclick="submitFeedback()">Guardar</button></div>`,'sm')}
function submitFeedback(){const a=aView(); updateAthlete(a.id,{compliance:Math.min(99,a.compliance+2),streak:a.streak+1,monthVolume:a.monthVolume+9,completedToday:true,week:a.week.map(d=>d.today?{...d,done:true}:d)}); closeModal(); state.athletePage='progress'; render(); setToast('Entrenamiento guardado',`RPE ${$('#feedbackRpe')?$('#feedbackRpe').value:'7'}/10 registrado con éxito.`);}
function openCheckout(id){const p=state.plans.find(x=>x.id===id); const a=aView(); openModal(`<div class="modalHead"><div style="font-size:22px;font-weight:700">Checkout del plan</div><button class="xbtn" onclick="closeModal()">×</button></div><div class="row" style="display:block"><div style="font-size:22px;font-weight:700">${p.title}</div><div class="small muted" style="margin-top:8px;line-height:1.7">${p.desc}</div><div style="font-size:32px;font-weight:700;color:var(--cyan);margin-top:12px">${money(p.price)}</div></div><div class="formGrid2" style="margin-top:16px"><label>Nombre en tarjeta<input type="text" value="${a.name}"></label><label>Últimos 4<input type="text" value="4242"></label></div><div class="actions"><button class="ghost" onclick="closeModal()">Cancelar</button><button class="whitebtn" onclick="closeModal(); state.athletePage='home'; render(); setToast('Compra exitosa','Se activó ${p.title} en tu cuenta.')">Pagar ahora</button></div>`,'sm')}
function openMetricModal(title,value){openModal(`<div class="modalHead"><div style="font-size:22px;font-weight:700">${title}</div><button class="xbtn" onclick="closeModal()">×</button></div><div class="row" style="display:block"><div style="font-size:38px;font-weight:700">${value}</div><div class="small muted" style="margin-top:12px;line-height:1.8">Detalle interactivo del resumen de avance. Desde aquí ya puedes abrir otros módulos usando los botones del panel de progreso.</div></div>`,'sm')}
function submitAthleteMsg(){const el=$('#athleteMsgInput'); const text=el.value.trim(); if(!text)return; sendAthleteMessage(aView().id,text); el.value=''; setToast('Mensaje enviado','Tu coach verá este mensaje en el hilo.');}
function coachView(){return `<div class="grid coach-layout">${coachSidebar()}<div>${state.coachPage==='dashboard'?coachDashboard():''}${state.coachPage==='athletes'?coachAthletesPage():''}${state.coachPage==='calendar'?coachCalendarPage():''}${state.coachPage==='marketplace'?coachMarketplacePage():''}${state.coachPage==='billing'?coachBillingPage():''}${state.coachPage==='settings'?coachSettingsPage():''}</div></div>`}
function athleteView(){const a=aView(); return `<div class="page"><div class="page-header"><div><div class="page-title">Vista del atleta</div><div class="page-sub">Una experiencia clara, moderna y accionable para que el usuario sí use la app todos los días.</div></div>${athleteTabs()}</div><div class="deviceLayout"><div>${state.athletePage==='home'?athleteHomePhone(a):''}${state.athletePage==='training'?athleteTrainingPhone(a):''}${state.athletePage==='progress'?athleteProgressPhone(a):''}${state.athletePage==='store'?athleteStorePhone():''}${state.athletePage==='messages'?athleteMessagesPhone():''}</div><div>${athleteDesktop(a)}</div></div></div>`}
function render(){hero(); $('#app').innerHTML=state.role==='coach'?coachView():athleteView(); renderModal(); renderToast();}
render();
</script>

</body>
</html>
