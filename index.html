rder border-cyan-400/25 bg-cyan-400/10 px-3 py-2 text-xs font-medium text-cyan-200">Resolver</button></div>)}</div></GlassCard><GlassCard className="p-6"><SectionTitle title="Hoy en el planner" subtitle="Sesiones destacadas del día" action="Abrir calendario" /><div className="mt-5 space-y-4">{[{ title: "Tempo Run", subtitle: "12 km · Z3 / Z4", athlete: "Andrea Ruiz", accent: "from-cyan-500/30 to-blue-500/30", time: "6:00 PM" },{ title: "Fuerza Tren Inferior", subtitle: "45 min · Gym", athlete: "Fernanda Solís", accent: "from-violet-500/30 to-fuchsia-500/30", time: "8:00 PM" },{ title: "Long Ride", subtitle: "2h 15m · Resistencia", athlete: "Luis Garza", accent: "from-emerald-500/30 to-teal-500/30", time: "7:30 AM" }].map((session) => <button key={session.title + session.athlete} onClick={() => { setPage("calendar"); showToast("Planner abierto", `Entraste al calendario desde ${session.title}.`); }} className={cn("w-full rounded-[24px] border border-white/10 bg-gradient-to-br p-4 text-left transition hover:scale-[1.01]", session.accent)}><div className="flex items-center justify-between"><div><div className="text-sm font-semibold text-white">{session.title}</div><div className="mt-1 text-sm text-white/60">{session.subtitle}</div></div><div className="rounded-xl border border-white/10 bg-black/20 px-3 py-1 text-xs text-white/80">{session.time}</div></div><div className="mt-3 text-xs text-white/70">{session.athlete}</div></button>)}</div></GlassCard></div><div className="grid gap-6 xl:grid-cols-[1.15fr_.85fr]"><GlassCard className="p-6"><SectionTitle title="Atletas activos" subtitle="Haz clic sobre un atleta para entrar a su expediente" action="Gestionar" /><div className="mt-5 overflow-hidden rounded-[26px] border border-white/10"><div className="grid grid-cols-[1.2fr_1fr_.8fr_1.2fr] bg-white/5 px-4 py-3 text-xs uppercase tracking-[0.18em] text-white/35"><div>Atleta</div><div>Plan</div><div>Cumplimiento</div><div>Próximo</div></div>{athletes.map((athlete) => <button key={athlete.id} onClick={() => { setSelectedAthleteId(athlete.id); setAthleteViewId(athlete.id); setPage("athletes"); }} className="grid w-full grid-cols-[1.2fr_1fr_.8fr_1.2fr] items-center border-t border-white/10 px-4 py-4 text-left transition hover:bg-white/[0.03]"><div><div className="text-sm font-medium text-white">{athlete.name}</div><div className="mt-1 text-xs text-white/45">Estado: {athlete.status}</div></div><div className="text-sm text-white/65">{athlete.plan}</div><div className="pr-6"><div className="mb-2 text-sm text-white/70">{athlete.compliance}%</div><ProgressBar value={athlete.compliance} /></div><div className="text-sm text-white/55">{athlete.next}</div></button>)}</div></GlassCard><GlassCard className="p-6"><SectionTitle title="Ventas del marketplace" subtitle="Tus planes digitales generan ingresos incluso sin coaching 1:1" action="Administrar" /><div className="mt-5 space-y-4">{plans.map((plan) => <button key={plan.id} onClick={() => { setPage("marketplace"); showToast("Plan abierto", `Entraste a ${plan.title}.`); }} className="w-full rounded-[24px] border border-white/10 bg-white/[0.03] p-4 text-left transition hover:bg-white/[0.05]"><div className="flex items-start justify-between gap-3"><div><div className="text-sm font-semibold text-white">{plan.title}</div><div className="mt-1 text-sm leading-6 text-white/55">{plan.desc}</div></div><Pill active>{plan.tag}</Pill></div><div className="mt-4 flex items-center justify-between"><div><div className="text-base font-semibold text-cyan-300">{formatMoney(plan.price)}</div><div className="mt-1 text-xs text-white/45">{plan.sold} ventas · {plan.rating}★</div></div><div className="inline-flex items-center gap-2 rounded-2xl bg-white px-4 py-2 text-sm font-medium text-slate-900">Ver ficha <span>→</span></div></div></button>)}</div></GlassCard></div></div>;
    }

    function CoachAthletesPage({ athletes, plans, selectedAthleteId, setSelectedAthleteId, setAthleteViewId, onUpdateAthlete, onCreateAthlete, onSendCoachMessage, showToast, onLogout }) {
      const athlete = athletes.find((a) => a.id === selectedAthleteId) || athletes[0];
      const [search, setSearch] = useState("");
      const [messageOpen, setMessageOpen] = useState(false);
      const [editOpen, setEditOpen] = useState(false);
      const [createOpen, setCreateOpen] = useState(false);
      const [messageText, setMessageText] = useState("");
      const [editPlan, setEditPlan] = useState(athlete.plan);
      const [editLoad, setEditLoad] = useState(athlete.weeklyLoad);
      const [editNote, setEditNote] = useState(athlete.note);
      const [newAthlete, setNewAthlete] = useState({ name: "", email: "", level: "Principiante", plan: plans[0]?.title || "5K desde cero", race: "Sin carrera asignada", weeklyLoad: "18 km" });
      const filtered = useMemo(() => { const q = search.toLowerCase(); return athletes.filter((a) => a.name.toLowerCase().includes(q) || a.plan.toLowerCase().includes(q)); }, [athletes, search]);
      useEffect(() => { setEditPlan(athlete.plan); setEditLoad(athlete.weeklyLoad); setEditNote(athlete.note); }, [athlete]);
      return <div className="space-y-6"><HeaderBar title="Atletas" subtitle="Gestiona expedientes, wellness, próximas sesiones y comunicación individual." onLogout={onLogout} /><div className="grid gap-6 xl:grid-cols-[0.8fr_1.2fr]"><GlassCard className="p-5"><div className="mb-4 flex items-center gap-3 rounded-2xl border border-white/10 bg-white/[0.03] px-4 py-3"><span className="text-white/35">🔎</span><input value={search} onChange={(e) => setSearch(e.target.value)} placeholder="Buscar atleta o plan" className="w-full bg-transparent text-sm text-white outline-none placeholder:text-white/25" /></div><div className="flex items-center justify-between gap-3"><SectionTitle title="Lista de atletas" subtitle="Selecciona uno para revisar su detalle" /><button onClick={() => setCreateOpen(true)} className="inline-flex items-center gap-2 rounded-2xl bg-white px-4 py-3 text-sm font-semibold text-slate-900"><span>＋</span>Agregar atleta</button></div><div className="mt-5 space-y-3">{filtered.map((item) => { const active = item.id === athlete.id; return <button key={item.id} onClick={() => { setSelectedAthleteId(item.id); setAthleteViewId(item.id); }} className={cn("w-full rounded-[24px] border p-4 text-left transition", active ? "border-cyan-400/30 bg-cyan-400/10" : "border-white/10 bg-white/[0.03] hover:bg-white/[0.05]")}><div className="flex items-center justify-between gap-3"><div><div className="text-sm font-semibold text-white">{item.name}</div><div className="mt-1 text-xs text-white/45">{item.plan}</div></div><Pill active={active}>{item.status}</Pill></div><div className="mt-3 text-xs text-white/55">{item.race}</div><div className="mt-3"><ProgressBar value={item.compliance} /></div></button>; })}</div></GlassCard><div className="space-y-6"><GlassCard className="p-6"><div className="flex flex-col gap-4 lg:flex-row lg:items-start lg:justify-between"><div><div className="text-2xl font-semibold text-white">{athlete.name}</div><div className="mt-2 flex flex-wrap gap-2"><Pill active>{athlete.plan}</Pill><Pill>{athlete.level}</Pill><Pill>{athlete.race}</Pill></div></div><div className="flex gap-2"><button onClick={() => setMessageOpen(true)} className="rounded-2xl border border-white/10 bg-white/5 px-4 py-2 text-sm text-white">Enviar mensaje</button><button onClick={() => setEditOpen(true)} className="rounded-2xl bg-white px-4 py-2 text-sm font-medium text-slate-900">Editar plan</button></div></div><div className="mt-6 grid gap-4 md:grid-cols-4">{[{ label: "Cumplimiento", value: `${athlete.compliance}%` },{ label: "Carga semanal", value: athlete.weeklyLoad },{ label: "Fatiga", value: athlete.fatigue },{ label: "Próximo", value: athlete.next }].map((item) => <div key={item.label} className="rounded-[22px] border border-white/10 bg-white/[0.03] p-4"><div className="text-xs uppercase tracking-[0.18em] text-white/35">{item.label}</div><div className="mt-3 text-lg font-semibold text-white">{item.value}</div></div>)}</div></GlassCard><div className="grid gap-6 lg:grid-cols-[1fr_1fr]"><GlassCard className="p-6"><SectionTitle title="Notas del coach" subtitle="Contexto operativo y deportivo" /><div className="mt-5 rounded-[24px] border border-white/10 bg-white/[0.03] p-4 text-sm leading-7 text-white/65">{athlete.note}</div><div className="mt-4 space-y-3">{[`Última sesión cargada desde Strava ${athlete.lastUpload}`, `Sueño promedio de la semana: ${athlete.sleep}`, "Sin incidencias de pago"].map((item) => <div key={item} className="flex items-center gap-3 rounded-2xl border border-white/10 bg-white/[0.03] px-4 py-3 text-sm text-white/70"><span className="text-cyan-300">✓</span>{item}</div>)}</div></GlassCard><GlassCard className="p-6"><SectionTitle title="Próximas sesiones" subtitle="Semana visible del atleta" /><div className="mt-5 space-y-3">{["Mié · Series 8 × 400 m · 55 min", "Jue · Fuerza tren inferior · 40 min", "Vie · Tempo progresivo · 9 km", "Sáb · Long run · 14 km"].map((item, idx) => <button key={item} onClick={() => showToast("Sesión abierta", item)} className={cn("w-full rounded-[22px] border p-4 text-left text-sm transition", idx === 0 ? "border-cyan-400/30 bg-cyan-400/10 text-white" : "border-white/10 bg-white/[0.03] text-white/70 hover:bg-white/[0.05]")}>{item}</button>)}</div></GlassCard></div></div></div><Modal open={messageOpen} onClose={() => setMessageOpen(false)} title={`Mensaje para ${athlete.name}`}><div className="space-y-4"><textarea value={messageText} onChange={(e) => setMessageText(e.target.value)} placeholder="Escribe una indicación, feedback o ajuste para el atleta" className="min-h-[140px] w-full rounded-[22px] border border-white/10 bg-white/[0.04] px-4 py-3 text-sm text-white outline-none placeholder:text-white/25" /><div className="flex justify-end gap-3"><button onClick={() => setMessageOpen(false)} className="rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white">Cancelar</button><button onClick={() => { if (!messageText.trim()) return; onSendCoachMessage(athlete.id, messageText.trim()); setMessageText(""); setMessageOpen(false); showToast("Mensaje enviado", `Se notificó a ${athlete.name}.`); }} className="rounded-2xl bg-white px-4 py-3 text-sm font-semibold text-slate-900">Enviar</button></div></div></Modal><Modal open={editOpen} onClose={() => setEditOpen(false)} title={`Editar plan de ${athlete.name}`}><div className="space-y-4"><Field label="Plan" value={editPlan} onChange={(e) => setEditPlan(e.target.value)} /><Field label="Carga semanal" value={editLoad} onChange={(e) => setEditLoad(e.target.value)} /><label className="block space-y-2"><div className="text-sm text-white/65">Nota del coach</div><textarea value={editNote} onChange={(e) => setEditNote(e.target.value)} className="min-h-[120px] w-full rounded-[22px] border border-white/10 bg-white/[0.04] px-4 py-3 text-sm text-white outline-none" /></label><div className="flex justify-end gap-3"><button onClick={() => setEditOpen(false)} className="rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white">Cancelar</button><button onClick={() => { onUpdateAthlete(athlete.id, { plan: editPlan, weeklyLoad: editLoad, note: editNote }); setEditOpen(false); showToast("Plan actualizado", `Se guardaron cambios para ${athlete.name}.`); }} className="rounded-2xl bg-white px-4 py-3 text-sm font-semibold text-slate-900">Guardar</button></div></div></Modal><Modal open={createOpen} onClose={() => setCreateOpen(false)} title="Agregar nuevo atleta"><div className="grid gap-4 md:grid-cols-2"><Field label="Nombre" value={newAthlete.name} onChange={(e) => setNewAthlete({ ...newAthlete, name: e.target.value })} /><Field label="Email" value={newAthlete.email} onChange={(e) => setNewAthlete({ ...newAthlete, email: e.target.value })} /><Field label="Nivel" value={newAthlete.level} onChange={(e) => setNewAthlete({ ...newAthlete, level: e.target.value })} /><Field label="Plan inicial" value={newAthlete.plan} onChange={(e) => setNewAthlete({ ...newAthlete, plan: e.target.value })} /><Field label="Carrera objetivo" value={newAthlete.race} onChange={(e) => setNewAthlete({ ...newAthlete, race: e.target.value })} /><Field label="Carga semanal" value={newAthlete.weeklyLoad} onChange={(e) => setNewAthlete({ ...newAthlete, weeklyLoad: e.target.value })} /></div><div className="mt-5 flex justify-end gap-3"><button onClick={() => setCreateOpen(false)} className="rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white">Cancelar</button><button onClick={() => { if (!newAthlete.name.trim()) return; const newId = onCreateAthlete(newAthlete); setSelectedAthleteId(newId); setAthleteViewId(newId); setCreateOpen(false); setNewAthlete({ name: "", email: "", level: "Principiante", plan: plans[0]?.title || "5K desde cero", race: "Sin carrera asignada", weeklyLoad: "18 km" }); showToast("Atleta creado", "Se agregó el atleta y quedó seleccionado."); }} className="rounded-2xl bg-white px-4 py-3 text-sm font-semibold text-slate-900">Crear atleta</button></div></Modal></div>;
    }

    function CoachCalendarPage({ calendar, setCalendar, showToast, onLogout }) {
      const [newSessionOpen, setNewSessionOpen] = useState(false);
      const [newSession, setNewSession] = useState({ day: "Lunes", label: "" });
      const addSession = () => { if (!newSession.label.trim()) return; setCalendar((prev) => prev.map((d) => d.day === newSession.day ? { ...d, sessions: [...d.sessions, { id: Date.now(), label: newSession.label }] } : d)); setNewSessionOpen(false); setNewSession({ day: "Lunes", label: "" }); showToast("Sesión creada", "La sesión apareció en el planner semanal."); };
      const removeSession = (day, id) => { setCalendar((prev) => prev.map((d) => d.day === day ? { ...d, sessions: d.sessions.filter((s) => s.id !== id) } : d)); showToast("Sesión eliminada", "Se quitó del planner."); };
      return <div className="space-y-6"><HeaderBar title="Planner semanal" subtitle="Organiza la semana, crea sesiones nuevas y reordena el trabajo." onLogout={onLogout} /><div className="flex justify-end"><button onClick={() => setNewSessionOpen(true)} className="inline-flex items-center gap-2 rounded-2xl bg-white px-4 py-3 text-sm font-semibold text-slate-900"><span>＋</span>Nueva sesión</button></div><div className="grid gap-4 xl:grid-cols-5">{calendar.map((day) => <GlassCard key={day.day} className="p-5"><div className="flex items-center justify-between"><div><div className="text-sm font-semibold text-white">{day.day}</div><div className="mt-1 text-xs text-white/45">{day.sessions.length} sesiones</div></div><button onClick={() => { setNewSession({ day: day.day, label: "" }); setNewSessionOpen(true); }} className="rounded-xl border border-white/10 bg-white/5 px-3 py-2 text-xs text-white/75">+ agregar</button></div><div className="mt-4 space-y-3">{day.sessions.map((session) => <div key={session.id} className="rounded-[20px] border border-white/10 bg-white/[0.03] p-3"><div className="flex items-start justify-between gap-2"><div className="text-sm text-white/80">{session.label}</div><button onClick={() => removeSession(day.day, session.id)} className="text-xs text-red-300">Quitar</button></div></div>)}</div></GlassCard>)}</div><Modal open={newSessionOpen} onClose={() => setNewSessionOpen(false)} title="Nueva sesión semanal"><div className="space-y-4"><label className="block space-y-2"><div className="text-sm text-white/65">Día</div><select value={newSession.day} onChange={(e) => setNewSession({ ...newSession, day: e.target.value })} className="w-full rounded-2xl border border-white/10 bg-white/[0.04] px-4 py-3 text-sm text-white outline-none">{calendar.map((d) => <option key={d.day} value={d.day} className="bg-[#0C1325]">{d.day}</option>)}</select></label><Field label="Sesión" value={newSession.label} onChange={(e) => setNewSession({ ...newSession, label: e.target.value })} placeholder="Ej. Andrea · Long Run 16K" /><div className="flex justify-end gap-3"><button onClick={() => setNewSessionOpen(false)} className="rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white">Cancelar</button><button onClick={addSession} className="rounded-2xl bg-white px-4 py-3 text-sm font-semibold text-slate-900">Guardar sesión</button></div></div></Modal></div>;
    }

    function CoachMarketplacePage({ plans, setPlans, showToast, onLogout }) {
      const [editOpen, setEditOpen] = useState(false);
      const [selectedPlan, setSelectedPlan] = useState(null);
      const [form, setForm] = useState({ title: "", price: 0, desc: "", tag: "Premium", published: true });
      const openEdit = (plan) => { setSelectedPlan(plan); setForm({ title: plan.title, price: plan.price, desc: plan.desc, tag: plan.tag, published: plan.published }); setEditOpen(true); };
      return <div className="space-y-6"><HeaderBar title="Marketplace" subtitle="Edita planes publicados y mantén actualizada la oferta digital." onLogout={onLogout} /><div className="grid gap-6 lg:grid-cols-3">{plans.map((plan) => <GlassCard key={plan.id} className="p-6"><div className="flex items-start justify-between gap-3"><div><div className="text-lg font-semibold text-white">{plan.title}</div><div className="mt-2 text-sm leading-7 text-white/55">{plan.desc}</div></div><Pill active={plan.published}>{plan.published ? "Publicado" : "Oculto"}</Pill></div><div className="mt-4 flex items-center justify-between"><div><div className="text-2xl font-semibold text-cyan-300">{formatMoney(plan.price)}</div><div className="mt-1 text-xs text-white/45">{plan.sold} ventas · {plan.rating}★</div></div><button onClick={() => openEdit(plan)} className="rounded-2xl bg-white px-4 py-2 text-sm font-semibold text-slate-900">Editar</button></div></GlassCard>)}</div><Modal open={editOpen} onClose={() => setEditOpen(false)} title={selectedPlan ? `Editar ${selectedPlan.title}` : "Editar plan"}><div className="space-y-4"><Field label="Título" value={form.title} onChange={(e) => setForm({ ...form, title: e.target.value })} /><Field label="Precio" type="number" value={form.price} onChange={(e) => setForm({ ...form, price: Number(e.target.value) })} /><Field label="Tag" value={form.tag} onChange={(e) => setForm({ ...form, tag: e.target.value })} /><label className="block space-y-2"><div className="text-sm text-white/65">Descripción</div><textarea value={form.desc} onChange={(e) => setForm({ ...form, desc: e.target.value })} className="min-h-[120px] w-full rounded-[22px] border border-white/10 bg-white/[0.04] px-4 py-3 text-sm text-white outline-none" /></label><label className="flex items-center gap-3 rounded-2xl border border-white/10 bg-white/[0.03] px-4 py-3 text-sm text-white/75"><input type="checkbox" checked={form.published} onChange={(e) => setForm({ ...form, published: e.target.checked })} />Publicado en marketplace</label><div className="flex justify-end gap-3"><button onClick={() => setEditOpen(false)} className="rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white">Cancelar</button><button onClick={() => { setPlans((prev) => prev.map((p) => p.id === selectedPlan.id ? { ...p, ...form } : p)); setEditOpen(false); showToast("Plan actualizado", "Los cambios del marketplace ya están activos."); }} className="rounded-2xl bg-white px-4 py-3 text-sm font-semibold text-slate-900">Guardar cambios</button></div></div></Modal></div>;
    }

    function CoachBillingPage({ billing, showToast, onLogout }) {
      const totalPaid = billing.filter((b) => b.status === "Pagado").reduce((a, b) => a + b.amount, 0);
      const totalPending = billing.filter((b) => b.status === "Pendiente").reduce((a, b) => a + b.amount, 0);
      return <div className="space-y-6"><HeaderBar title="Cobros" subtitle="Monitorea coaching mensual y ventas del marketplace." onLogout={onLogout} /><div className="grid gap-4 md:grid-cols-3"><MetricCard icon="💰" label="Cobrado" value={formatMoney(totalPaid)} sub="Ingresos confirmados" /><MetricCard icon="⏳" label="Pendiente" value={formatMoney(totalPending)} sub="Por recuperar" /><MetricCard icon="🧾" label="Movimientos" value={String(billing.length)} sub="Este ciclo" /></div><GlassCard className="p-6"><SectionTitle title="Movimientos" subtitle="Detalle simple de facturación" /><div className="mt-5 overflow-hidden rounded-[26px] border border-white/10"><div className="grid grid-cols-[1.6fr_.8fr_.8fr_.7fr] bg-white/5 px-4 py-3 text-xs uppercase tracking-[0.18em] text-white/35"><div>Concepto</div><div>Monto</div><div>Estado</div><div>Acción</div></div>{billing.map((item) => <div key={item.id} className="grid grid-cols-[1.6fr_.8fr_.8fr_.7fr] items-center border-t border-white/10 px-4 py-4 text-sm"><div className="text-white/80">{item.label}</div><div className="text-cyan-300">{formatMoney(item.amount)}</div><div><Pill active={item.status === "Pagado"}>{item.status}</Pill></div><div><button onClick={() => showToast("Factura simulada", `Se generó comprobante para ${item.label}.`)} className="rounded-xl border border-white/10 bg-white/5 px-3 py-2 text-xs text-white/75">Factura</button></div></div>)}</div></GlassCard></div>;
    }

      const openBuy = (plan) => { setSelectedPlan(plan); setCheckoutOpen(true); };
      const onOpenMetric = (_key, title, value) => { setMetricDetail({ title, value }); setMetricOpen(true); };
      return <><div className="space-y-6"><div className="flex flex-col gap-4 xl:flex-row xl:items-center xl:justify-between"><div><div className="text-3xl font-semibold tracking-tight text-white">Vista del atleta</div><div className="mt-2 text-sm text-white/50">Módulo atleta corregido para demo HTML.</div></div><AthleteTopTabs page={page} setPage={setPage} /></div><div className="grid gap-8 xl:grid-cols-[420px_minmax(0,1fr)]"><div className="flex justify-center">{page === "home" && <AthleteSummaryPhone athlete={athlete} setPage={setPage} openAdaptation={() => setAdaptationOpen(true)} onLogout={onLogout} />}{page === "training" && <AthleteCalendarPhone athlete={athlete} onComplete={() => setFeedbackOpen(true)} openAdaptation={() => setAdaptationOpen(true)} onLogout={onLogout} />}{page === "progress" && <AthletePlanPhone athlete={athlete} onOpenMetric={onOpenMetric} openAdaptation={() => setAdaptationOpen(true)} onLogout={onLogout} />}{page === "store" && <AthleteHistoryPhone plans={plans.filter((p) => p.published)} onBuy={openBuy} onLogout={onLogout} />}{page === "messages" && <AthleteMessagesPhone messages={messages} onLogout={onLogout} />}</div><AthleteDesktopCompanion page={page} athlete={athlete} plans={plans.filter((p) => p.published)} messages={messages} setPage={setPage} sendMessage={(text) => { onSendAthleteMessage(athlete.id, text); showToast("Mensaje enviado", "Tu coach verá este mensaje en el hilo."); }} openAdaptation={() => setAdaptationOpen(true)} openBuy={openBuy} onOpenMetric={onOpenMetric} onLogout={onLogout} /></div></div><Modal open={adaptationOpen} onClose={() => setAdaptationOpen(false)} title="Ajuste simple" width="max-w-lg"><div className="space-y-5 text-center"><div className="border-b border-white/10 pb-4 text-sm leading-7 text-white/70">Indícanos los días que puedes entrenar y cuál es el día más largo disponible para reorganizar tu semana.</div><div><div className="text-xl font-medium text-cyan-300">Días disponibles esta semana</div><div className="mt-5 grid grid-cols-2 gap-x-8 gap-y-4 text-left">{["Lun", "Mar", "Mié", "Jue", "Vie", "Sáb", "Dom", "Indoor"].map((day) => <label key={day} className="flex items-center gap-3 text-lg text-white/85"><span className="h-6 w-6 rounded-md border border-white/25" /><span>{day}</span></label>)}</div></div><div><div className="text-xl font-medium text-cyan-300">Día largo disponible</div><div className="mt-4 rounded-[24px] border border-white/10 bg-white/[0.04] px-5 py-4 text-left text-xl text-white/75">Seleccionar día</div></div><button className="text-lg font-semibold text-white/80">Ajuste avanzado</button><div className="flex justify-center"><button onClick={applyAdaptation} className="rounded-full bg-cyan-500 px-10 py-4 text-xl font-semibold text-white shadow-lg shadow-cyan-500/20">Aplicar ajuste</button></div></div></Modal><Modal open={feedbackOpen} onClose={() => setFeedbackOpen(false)} title="Guardar entrenamiento" width="max-w-lg"><div className="space-y-4"><Field label="RPE (1 a 10)" type="number" value={feedback.rpe} onChange={(e) => setFeedback({ ...feedback, rpe: e.target.value })} /><label className="block space-y-2"><div className="text-sm text-white/65">Comentario</div><textarea value={feedback.note} onChange={(e) => setFeedback({ ...feedback, note: e.target.value })} className="min-h-[120px] w-full rounded-[22px] border border-white/10 bg-white/[0.04] px-4 py-3 text-sm text-white outline-none" /></label><div className="flex justify-end gap-3"><button onClick={() => setFeedbackOpen(false)} className="rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white">Cancelar</button><button onClick={saveFeedback} className="rounded-2xl bg-white px-4 py-3 text-sm font-semibold text-slate-900">Guardar</button></div></div></Modal><Modal open={checkoutOpen} onClose={() => setCheckoutOpen(false)} title="Checkout del plan" width="max-w-lg">{selectedPlan ? <div className="space-y-4"><div className="rounded-[24px] border border-white/10 bg-white/[0.03] p-5"><div className="text-lg font-semibold text-white">{selectedPlan.title}</div><div className="mt-2 text-sm leading-7 text-white/60">{selectedPlan.desc}</div><div className="mt-4 text-2xl font-semibold text-cyan-300">{formatMoney(selectedPlan.price)}</div></div><div className="grid gap-4 md:grid-cols-2"><Field label="Nombre en tarjeta" value={athlete.name} onChange={() => {}} /><Field label="Últimos 4" value="4242" onChange={() => {}} /></div><div className="flex justify-end gap-3"><button onClick={() => setCheckoutOpen(false)} className="rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white">Cancelar</button><button onClick={() => { setCheckoutOpen(false); setPage("home"); showToast("Compra exitosa", `Se activó ${selectedPlan.title} en tu cuenta.`); }} className="rounded-2xl bg-white px-4 py-3 text-sm font-semibold text-slate-900">Pagar ahora</button></div></div> : null}</Modal><Modal open={metricOpen} onClose={() => setMetricOpen(false)} title={metricDetail.title} width="max-w-lg"><div className="rounded-[24px] border border-white/10 bg-white/[0.03] p-5"><div className="text-3xl font-semibold text-white">{metricDetail.value}</div><div className="mt-3 text-sm leading-7 text-white/60">Detalle expandido de la métrica seleccionada dentro del perfil del atleta.</div></div></Modal></>;
    }

    function LoginView({ authForm, setAuthForm, onLogin, onQuickLogin }) {
      return <div className="grid gap-8 xl:grid-cols-[1.05fr_.95fr]"><GlassCard className="p-8"><div className="inline-flex items-center gap-2 rounded-full border border-cyan-400/20 bg-cyan-400/10 px-3 py-1 text-xs font-medium text-cyan-200">🔒 Acceso de plataforma</div><div className="mt-5 text-4xl font-semibold tracking-tight text-white">Inicia sesión y ponla a trabajar</div><div className="mt-3 max-w-2xl text-base leading-7 text-white/58">Versión HTML corregida para GitHub Pages con coach, admin y atleta funcionales.</div><div className="mt-8 grid gap-4 md:grid-cols-3">{[{ key: "admin", label: "Administrador", desc: "Licencias, accesos y control general" }, { key: "coach", label: "Entrenador", desc: "Planner, atletas, marketplace y cobros" }, { key: "athlete", label: "Atleta", desc: "Entrenos, progreso y mensajería" }].map((item) => <button key={item.key} onClick={() => setAuthForm((prev) => ({ ...prev, role: item.key }))} className={cn("rounded-[24px] border p-5 text-left transition", authForm.role === item.key ? "border-cyan-400/30 bg-cyan-400/10" : "border-white/10 bg-white/[0.03] hover:bg-white/[0.05]")}><div className="text-lg font-semibold text-white">{item.label}</div><div className="mt-2 text-sm leading-6 text-white/55">{item.desc}</div></button>)}</div></GlassCard><GlassCard className="p-8"><div className="flex items-center gap-3"><LogoMark /><div><div className="text-xl font-semibold text-white">Acceso por rol</div><div className="text-sm text-white/45">Usa las credenciales demo o inicia con acceso rápido.</div></div></div><div className="mt-6 space-y-4"><label className="block space-y-2"><div className="text-sm text-white/65">Rol</div><select value={authForm.role} onChange={(e) => setAuthForm((prev) => ({ ...prev, role: e.target.value }))} className="w-full rounded-2xl border border-white/10 bg-white/[0.04] px-4 py-3 text-sm text-white outline-none"><option value="coach" className="bg-[#0C1325]">Entrenador</option><option value="athlete" className="bg-[#0C1325]">Atleta</option><option value="admin" className="bg-[#0C1325]">Administrador</option></select></label><Field label="Email" value={authForm.email} onChange={(e) => setAuthForm((prev) => ({ ...prev, email: e.target.value }))} placeholder="correo@demo.com" /><Field label="Contraseña" type="password" value={authForm.password} onChange={(e) => setAuthForm((prev) => ({ ...prev, password: e.target.value }))} placeholder="••••••••" /><button onClick={onLogin} className="w-full rounded-2xl bg-white px-4 py-3 text-sm font-semibold text-slate-900">Entrar al sistema</button></div><div className="mt-6 grid gap-3 md:grid-cols-3"><button onClick={() => onQuickLogin("admin")} className="rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white">Acceso admin</button><button onClick={() => onQuickLogin("coach")} className="rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white">Acceso coach</button><button onClick={() => onQuickLogin("athlete")} className="rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white">Acceso atleta</button></div><div className="mt-6 rounded-[24px] border border-white/10 bg-white/[0.03] p-5"><div className="text-sm font-medium text-white">Credenciales demo</div><div className="mt-3 space-y-2 text-sm text-white/60"><div>Admin: admin@pulse.coach / demo123</div><div>Coach: marco@coach.demo / demo123</div><div>Athlete: andrea@athlete.demo / demo123</div></div></div></GlassCard></div>;
    }

    function App() {
      const [session, setSession] = useState(null);
      const [role, setRole] = useState("coach");
      const [toast, setToast] = useState(null);
      const [athletes, setAthletes] = useState(initialAthletes);
      const [plans, setPlans] = useState(initialPlans);
      const [calendar, setCalendar] = useState(initialCalendar);
      const [billing] = useState(initialBilling);
      const [messagesByAthlete, setMessagesByAthlete] = useState(initialMessages);
      const [athleteViewId, setAthleteViewId] = useState(1);
      const [selectedAthleteId, setSelectedAthleteId] = useState(1);
      const [coachLicenses, setCoachLicenses] = useState(initialCoachLicenses);
      const [athleteLicenses, setAthleteLicenses] = useState(initialAthleteLicenses);
      const [coachBrand, setCoachBrand] = useState("Marco Coach");
      const [authForm, setAuthForm] = useState({ role: "coach", email: initialUsers.coach.email, password: initialUsers.coach.password });
      const athleteView = athletes.find((a) => a.id === athleteViewId) || athletes[0];
      const athleteMessages = messagesByAthlete[athleteViewId] || [];
      const showToast = (title, message) => setToast({ title, message });
      const clearToast = () => setToast(null);
      const onUpdateAthlete = (id, patch) => setAthletes((prev) => prev.map((ath) => ath.id === id ? { ...ath, ...patch } : ath));
      const onSendAthleteMessage = (athleteId, text) => setMessagesByAthlete((prev) => ({ ...prev, [athleteId]: [...(prev[athleteId] || []), { id: Date.now(), from: "me", text }] }));
      const onSendCoachMessage = (athleteId, text) => setMessagesByAthlete((prev) => ({ ...prev, [athleteId]: [...(prev[athleteId] || []), { id: Date.now(), from: "coach", text }] }));
      const onCreateAthlete = (payload) => { const newId = Date.now(); const athlete = { id: newId, name: payload.name, level: payload.level || "Principiante", plan: payload.plan || "5K desde cero", compliance: 0, status: "Nuevo", next: "Sin sesión programada", fatigue: "Baja", race: payload.race || "Sin carrera asignada", weeklyLoad: payload.weeklyLoad || "18 km", note: "Atleta recién agregado.", sleep: "—", lastUpload: "Sin carga", streak: 0, monthVolume: 0, completedToday: false, adapted: false, adaptationChoice: "", sessionTitle: "Sesión inicial", sessionCopy: "Configura el primer bloque de trabajo para este atleta.", week: athleteWeekBase.map((item) => ({ ...item, done: false, today: item.today || false })) }; setAthletes((prev) => [...prev, athlete]); setMessagesByAthlete((prev) => ({ ...prev, [newId]: [{ id: Date.now(), from: "coach", text: "Bienvenido al programa. Pronto verás tu plan asignado." }] })); return newId; };
      const performLogin = (roleKey) => { const expected = initialUsers[roleKey]; setSession({ role: roleKey, name: expected.name, email: expected.email }); setRole(roleKey); if (roleKey === "athlete") { setAthleteViewId(expected.athleteId); setSelectedAthleteId(expected.athleteId); } showToast("Sesión iniciada", `Entraste como ${roleKey}.`); };
      const onLogin = () => { const candidate = initialUsers[authForm.role]; if (candidate && candidate.email === authForm.email && candidate.password === authForm.password) performLogin(authForm.role); else showToast("Credenciales inválidas", "Usa las credenciales demo del panel de acceso."); };
      const onQuickLogin = (roleKey) => { const user = initialUsers[roleKey]; setAuthForm({ role: roleKey, email: user.email, password: user.password }); performLogin(roleKey); };
      const onLogout = () => { setSession(null); setRole("coach"); showToast("Sesión cerrada", "Volviste a la pantalla de acceso."); };
      const roleTabs = !session ? [] : session.role === "admin" ? [{ id: "admin", label: "Administrador", icon: roleTabsIcons.admin }, { id: "coach", label: "Entrenador", icon: roleTabsIcons.coach }, { id: "athlete", label: "Atleta", icon: roleTabsIcons.athlete }] : session.role === "coach" ? [{ id: "coach", label: "Entrenador", icon: roleTabsIcons.coach }, { id: "athlete", label: "Atleta", icon: roleTabsIcons.athlete }] : [{ id: "athlete", label: "Atleta", icon: roleTabsIcons.athlete }];
      return <><AppShell title={!session ? "Access gateway" : role === "admin" ? "Admin console" : role === "coach" ? "Coach workspace" : `Athlete experience · ${athleteView.name}`} subtitle={!session ? "Login unificado para administrador, entrenador y atleta, todo conectado al mismo demo." : "Versión HTML corregida para GitHub Pages con admin, coach y atleta funcionales."} roleTabs={roleTabs} activeRole={role} onRoleChange={setRole}>{!session ? <LoginView authForm={authForm} setAuthForm={setAuthForm} onLogin={onLogin} onQuickLogin={onQuickLogin} /> : role === "admin" ? <AdminView coachLicenses={coachLicenses} setCoachLicenses={setCoachLicenses} athleteLicenses={athleteLicenses} setAthleteLicenses={setAthleteLicenses} showToast={showToast} onLogout={onLogout} /> : role === "coach" ? <CoachView athletes={athletes} plans={plans} calendar={calendar} setCalendar={setCalendar} billing={billing} setPlans={setPlans} selectedAthleteId={selectedAthleteId} setSelectedAthleteId={setSelectedAthleteId} setAthleteViewId={setAthleteViewId} onUpdateAthlete={onUpdateAthlete} onCreateAthlete={onCreateAthlete} onSendCoachMessage={onSendCoachMessage} coachBrand={coachBrand} setCoachBrand={setCoachBrand} showToast={showToast} onLogout={onLogout} /> : <AthleteView athlete={athleteView} plans={plans} messages={athleteMessages} onUpdateAthlete={onUpdateAthlete} onSendAthleteMessage={onSendAthleteMessage} showToast={showToast} onLogout={onLogout} />}</AppShell><Toast toast={toast} onClose={clearToast} /></>;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
