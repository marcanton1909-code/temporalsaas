<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pulse Coach OS Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #07101D; }
    .glass { backdrop-filter: blur(16px); }
    .modal-backdrop { background: rgba(0,0,0,.6); }
  </style>
</head>
<body class="min-h-screen text-white">
  <div id="app"></div>
  <script>
    const state = {
      session: null,
      role: 'coach',
      athletePage: 'home',
      toast: null,
      modal: null,
      auth: { role: 'coach', email: 'marco@coach.demo', password: 'demo123' },
      athletes: [
        { id: 1, name: 'Andrea Ruiz', level: 'Intermedio', plan: '21K Intermedio', compliance: 92, status: 'Excelente', next: 'Series · Hoy 6:00 PM', fatigue: 'Baja', race: '21K Monterrey · 18 abr', weeklyLoad: '48 km', note: 'Lista para ajuste progresivo de fondo.', sleep: '7.3h', lastUpload: 'Hace 2 horas', streak: 6, monthVolume: 124, completedToday: false, sessionTitle: 'Series 8 × 400 m', sessionCopy: 'Calentamiento 10 min, 8 repeticiones a ritmo 5K con 90 seg suaves y enfriamiento de 8 min.', week: [{ day: 'L', type: 'Descanso', done: true },{ day: 'M', type: 'Easy 6K', done: true },{ day: 'M', type: 'Series', done: false, today: true },{ day: 'J', type: 'Fuerza', done: false },{ day: 'V', type: 'Tempo', done: false },{ day: 'S', type: 'Long Run', done: false },{ day: 'D', type: 'Movilidad', done: false }] },
        { id: 2, name: 'Carlos Mena', level: 'Avanzado', plan: '10K Sub 50', compliance: 68, status: 'Riesgo', next: 'Long Run · Mañana 7:00 AM', fatigue: 'Alta', race: '10K Nocturno · 9 may', weeklyLoad: '31 km', note: 'Faltó a 2 sesiones y reportó semana pesada en trabajo.', sleep: '5.9h', lastUpload: 'Hace 1 día', streak: 2, monthVolume: 87, completedToday: false, sessionTitle: 'Long Run 14K', sessionCopy: 'Rodaje largo con cierre controlado. Mantén RPE estable y técnica relajada.', week: [{ day: 'L', type: 'Descanso', done: true },{ day: 'M', type: 'Easy 6K', done: true },{ day: 'M', type: 'Series', done: false, today: true },{ day: 'J', type: 'Fuerza', done: false },{ day: 'V', type: 'Tempo', done: false },{ day: 'S', type: 'Long Run', done: false },{ day: 'D', type: 'Movilidad', done: false }] }
      ],
      plans: [
        { id: 1, title: '5K desde cero', price: 149, desc: '8 semanas · 3 días por semana · ideal para principiantes', published: true },
        { id: 2, title: '10K flexible', price: 229, desc: '10 semanas · adapta sesiones si fallas entrenos', published: true },
        { id: 3, title: '21K primer medio maratón', price: 349, desc: '12 semanas · incluye fuerza, movilidad y progreso semanal', published: true }
      ],
      messages: {
        1: [
          { id: 1, from: 'coach', text: 'Hoy prioriza técnica y no salgas demasiado rápido.' },
          { id: 2, from: 'me', text: 'Perfecto, si me siento cansada cambio la última serie.' },
          { id: 3, from: 'coach', text: 'Exacto. Lo importante es mantener continuidad.' }
        ],
        2: [{ id: 4, from: 'coach', text: 'Esta semana vamos a bajar un poco la carga.' }]
      },
      users: {
        admin: { email: 'admin@pulse.coach', password: 'demo123', name: 'Admin Pulse' },
        coach: { email: 'marco@coach.demo', password: 'demo123', name: 'Marco Coach' },
        athlete: { email: 'andrea@athlete.demo', password: 'demo123', name: 'Andrea Ruiz', athleteId: 1 }
      },
      athleteId: 1,
      chatInput: '',
      metricDetail: { title: '', value: '' }
    };

    function cn(){ return [...arguments].filter(Boolean).join(' '); }
    function money(n){ return '$' + Number(n).toLocaleString('es-MX') + ' MXN'; }
    function athlete(){ return state.athletes.find(a => a.id === state.athleteId) || state.athletes[0]; }
    function athleteMessages(){ return state.messages[state.athleteId] || []; }
    function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

    function setToast(title, message){ state.toast = { title, message }; render(); clearTimeout(window.__t); window.__t = setTimeout(()=>{ state.toast = null; render(); }, 2500); }
    function login(role){ const u = state.users[role]; state.session = { role, name: u.name, email: u.email }; state.role = role; if(role==='athlete') state.athleteId = u.athleteId; setToast('Sesión iniciada', 'Entraste como ' + role + '.'); render(); }
    function logout(){ state.session = null; state.role = 'coach'; state.athletePage = 'home'; state.modal = null; setToast('Sesión cerrada', 'Volviste a la pantalla de acceso.'); render(); }
    function doLogin(){ const u = state.users[state.auth.role]; if(u && u.email === state.auth.email && u.password === state.auth.password) login(state.auth.role); else setToast('Credenciales inválidas', 'Usa las credenciales demo.'); }
    function openMetric(title, value){ state.metricDetail = { title, value }; state.modal = 'metric'; render(); }
    function markWorkoutDone(){ const a = athlete(); a.completedToday = true; a.compliance = Math.min(99, a.compliance + 2); a.streak += 1; a.monthVolume += 9; a.week = a.week.map(d => d.today ? ({...d, done:true}) : d); state.modal = null; state.athletePage = 'progress'; setToast('Entrenamiento guardado', 'Se registró el avance del día.'); render(); }
    function applySimpleAdjustment(){ const a = athlete(); a.note += ' · El atleta ajustó disponibilidad semanal.'; state.modal = null; setToast('Plan ajustado', 'Se actualizó tu disponibilidad semanal.'); render(); }
    function buyPlan(id){ const p = state.plans.find(x => x.id === id); state.modal = 'checkout'; state.selectedPlanId = id; state.metricDetail = { title: p.title, value: money(p.price) }; render(); }
    function sendMessage(){ const text = state.chatInput.trim(); if(!text) return; if(!state.messages[state.athleteId]) state.messages[state.athleteId] = []; state.messages[state.athleteId].push({ id: Date.now(), from: 'me', text }); state.chatInput = ''; setToast('Mensaje enviado', 'Tu coach verá este mensaje en el hilo.'); render(); }
    function finishCheckout(){ const p = state.plans.find(x => x.id === state.selectedPlanId); state.modal = null; state.athletePage = 'home'; setToast('Compra exitosa', 'Se activó ' + p.title + ' en tu cuenta.'); render(); }

    function athleteTopTabs(){
      return `<div class="flex flex-wrap gap-2">
        ${[['home','✨','Resumen'],['training','📅','Calendario'],['progress','📈','Plan'],['store','🏅','Historial'],['messages','💬','Mensajes']].map(([id,icon,label]) => `<button onclick="setAthletePage('${id}')" class="${cn('inline-flex items-center gap-2 rounded-full border px-4 py-2.5 text-sm font-medium transition', state.athletePage===id ? 'border-cyan-400/40 bg-cyan-400/15 text-white' : 'border-white/10 bg-white/5 text-white/60 hover:bg-white/10')}"><span>${icon}</span>${label}</button>`).join('')}
      </div>`;
    }

    function shell(content){
      return `<div class="min-h-screen bg-[#07101D] text-white">
        <div class="pointer-events-none absolute inset-0 overflow-hidden">
          <div class="absolute -top-24 left-1/2 h-80 w-80 -translate-x-1/2 rounded-full bg-cyan-500/20 blur-3xl"></div>
          <div class="absolute right-10 top-40 h-72 w-72 rounded-full bg-violet-500/15 blur-3xl"></div>
          <div class="absolute bottom-0 left-10 h-72 w-72 rounded-full bg-blue-500/10 blur-3xl"></div>
        </div>
        <div class="relative mx-auto w-full max-w-[1680px] px-6 py-8 md:px-8 xl:px-10">
          <div class="glass rounded-[36px] border border-white/10 bg-white/[0.03] p-5 shadow-[0_30px_120px_rgba(0,0,0,0.35)]">
            <div class="flex flex-col gap-5 xl:flex-row xl:items-center xl:justify-between">
              <div class="max-w-3xl">
                <div class="inline-flex items-center gap-2 rounded-full border border-cyan-400/20 bg-cyan-400/10 px-3 py-1 text-xs font-medium text-cyan-200">🛡️ Producto en operación · SaaS deportivo premium</div>
                <div class="mt-4 flex items-center gap-3">
                  <div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-gradient-to-br from-cyan-400 to-violet-500 text-white shadow-lg">⚡</div>
                  <div>
                    <div class="text-4xl font-semibold tracking-tight text-white md:text-5xl">Pulse Coach OS</div>
                    <div class="mt-2 text-base leading-7 text-white/58">${!state.session ? 'Login unificado para administrador, entrenador y atleta.' : 'Archivo único HTML listo para GitHub Pages.'}</div>
                  </div>
                </div>
              </div>
              <div class="flex items-center gap-2 text-sm text-white/45"><span>${!state.session ? 'Access gateway' : state.role}</span><span>›</span><span class="text-cyan-300">Vista interactiva</span></div>
            </div>
          </div>
          <div class="mt-8">${content}</div>
        </div>
      </div>`;
    }

    function loginView(){
      return `<div class="grid gap-8 xl:grid-cols-[1.05fr_.95fr]">
        <div class="glass rounded-[28px] border border-white/10 bg-white/5 p-8 shadow-2xl shadow-black/25">
          <div class="inline-flex items-center gap-2 rounded-full border border-cyan-400/20 bg-cyan-400/10 px-3 py-1 text-xs font-medium text-cyan-200">🔒 Acceso de plataforma</div>
          <div class="mt-5 text-4xl font-semibold tracking-tight text-white">Inicia sesión y ponla a trabajar</div>
          <div class="mt-3 max-w-2xl text-base leading-7 text-white/58">Versión en un solo <code>index.html</code> para GitHub Pages.</div>
          <div class="mt-8 grid gap-4 md:grid-cols-3">
            ${[['admin','Administrador','Licencias, accesos y control general'],['coach','Entrenador','Planner, atletas, marketplace y cobros'],['athlete','Atleta','Entrenos, progreso y mensajería']].map(([key,label,desc]) => `<button onclick="setRole('${key}')" class="${cn('rounded-[24px] border p-5 text-left transition', state.auth.role===key ? 'border-cyan-400/30 bg-cyan-400/10' : 'border-white/10 bg-white/[0.03] hover:bg-white/[0.05]')}"><div class="text-lg font-semibold text-white">${label}</div><div class="mt-2 text-sm leading-6 text-white/55">${desc}</div></button>`).join('')}
          </div>
        </div>
        <div class="glass rounded-[28px] border border-white/10 bg-white/5 p-8 shadow-2xl shadow-black/25">
          <div class="flex items-center gap-3"><div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-gradient-to-br from-cyan-400 to-violet-500 text-white shadow-lg">⚡</div><div><div class="text-xl font-semibold text-white">Acceso por rol</div><div class="text-sm text-white/45">Usa las credenciales demo o inicia con acceso rápido.</div></div></div>
          <div class="mt-6 space-y-4">
            <label class="block space-y-2"><div class="text-sm text-white/65">Rol</div><select onchange="updateAuth('role', this.value)" class="w-full rounded-2xl border border-white/10 bg-white/[0.04] px-4 py-3 text-sm text-white outline-none"><option value="coach" ${state.auth.role==='coach'?'selected':''}>Entrenador</option><option value="athlete" ${state.auth.role==='athlete'?'selected':''}>Atleta</option><option value="admin" ${state.auth.role==='admin'?'selected':''}>Administrador</option></select></label>
            <label class="block space-y-2"><div class="text-sm text-white/65">Email</div><input value="${esc(state.auth.email)}" oninput="updateAuth('email', this.value)" class="w-full rounded-2xl border border-white/10 bg-white/[0.04] px-4 py-3 text-sm text-white outline-none"></label>
            <label class="block space-y-2"><div class="text-sm text-white/65">Contraseña</div><input type="password" value="${esc(state.auth.password)}" oninput="updateAuth('password', this.value)" class="w-full rounded-2xl border border-white/10 bg-white/[0.04] px-4 py-3 text-sm text-white outline-none"></label>
            <button onclick="doLogin()" class="w-full rounded-2xl bg-white px-4 py-3 text-sm font-semibold text-slate-900">Entrar al sistema</button>
          </div>
          <div class="mt-6 grid gap-3 md:grid-cols-3">
            <button onclick="quickLogin('admin')" class="rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white">Acceso admin</button>
            <button onclick="quickLogin('coach')" class="rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white">Acceso coach</button>
            <button onclick="quickLogin('athlete')" class="rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white">Acceso atleta</button>
          </div>
        </div>
      </div>`;
    }

    function simplePanel(title, subtitle){
      return `<div class="grid gap-6 xl:grid-cols-[240px_minmax(0,1fr)]">
        <div class="glass rounded-[28px] border border-white/10 bg-white/5 p-4 shadow-2xl shadow-black/25"><div class="mb-6 flex items-center gap-3 px-2 pt-2"><div class="flex h-11 w-11 items-center justify-center rounded-2xl bg-gradient-to-br from-cyan-400 to-violet-500 text-white shadow-lg">⚡</div><div><div class="text-base font-semibold text-white">${state.role === 'coach' ? 'Marco Coach' : 'Pulse Admin'}</div><div class="text-xs text-white/45">${state.role === 'coach' ? 'Coach workspace' : 'Licencias y operación'}</div></div></div></div>
        <div class="space-y-2">${(state.role === 'coach' ? ['Dashboard','Atletas','Calendario','Marketplace','Cobros','Ajustes'] : ['Resumen','Licencias Coach','Licencias Atleta','Controles']).map(x => `<div class="rounded-2xl border border-white/10 bg-white/[0.03] px-3 py-3 text-sm text-white/65">${x}</div>`).join('')}</div></div>
        <div class="space-y-6">
          <div class="flex flex-col gap-4 xl:flex-row xl:items-center xl:justify-between"><div><div class="text-3xl font-semibold tracking-tight text-white">${title}</div><div class="mt-2 text-sm text-white/50">${subtitle}</div></div><div class="flex items-center gap-3"><button onclick="logout()" class="rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white">Cerrar sesión</button></div></div>
          <div class="grid gap-4 md:grid-cols-2 xl:grid-cols-4">${['Demo','Activo','OK','HTML'].map(v=>`<div class="glass rounded-[28px] border border-white/10 bg-white/5 p-5 shadow-2xl shadow-black/25"><div class="text-sm text-white/50">Estado</div><div class="mt-2 text-3xl font-semibold text-white">${v}</div></div>`).join('')}</div>
        </div>
      </div>`;
    }

    function athleteView(){
      const a = athlete();
      const msgs = athleteMessages();
      return `<div class="space-y-6">
        <div class="flex flex-col gap-4 xl:flex-row xl:items-center xl:justify-between"><div><div class="text-3xl font-semibold tracking-tight text-white">Vista del atleta</div><div class="mt-2 text-sm text-white/50">Archivo único HTML listo para descarga y GitHub Pages.</div></div>${athleteTopTabs()}</div>
        <div class="grid gap-8 xl:grid-cols-[420px_minmax(0,1fr)]">
          <div class="mx-auto w-full max-w-[340px] rounded-[42px] border border-white/10 bg-[#0A1020] p-3 shadow-[0_30px_90px_rgba(0,0,0,0.5)]">
            <div class="mx-auto mb-3 h-6 w-32 rounded-full bg-black/55"></div>
            <div class="overflow-hidden rounded-[30px] border border-white/10 bg-[#0E152B]">
              ${state.athletePage === 'home' ? `<div class="min-h-[700px] bg-[linear-gradient(180deg,#0d1427_0%,#09111e_100%)] p-4 text-white"><div class="flex items-center justify-between pt-2"><div><div class="text-xs uppercase tracking-[0.25em] text-cyan-300/80">Resumen diario</div><div class="mt-1 text-2xl font-semibold tracking-tight">${a.name}</div><div class="mt-1 text-sm text-white/55">Estado actual del plan y recomendaciones</div></div><div class="flex items-center gap-2"><button class="rounded-2xl border border-white/10 bg-white/5 p-3 text-white/70">🔔</button><button onclick="logout()" class="rounded-2xl border border-white/10 bg-white/5 px-3 py-2 text-xs text-white">Salir</button></div></div><div class="mt-4 rounded-[28px] border border-cyan-400/20 bg-gradient-to-br from-cyan-400/15 to-violet-500/15 p-4 shadow-2xl shadow-cyan-500/10"><div class="flex items-center justify-between"><div class="rounded-full border border-cyan-400/60 bg-cyan-400/15 px-3 py-1 text-xs font-medium text-cyan-100">${a.completedToday ? 'Entreno completado' : 'Sesión del día'}</div><div class="text-xs text-white/60">${a.next}</div></div><div class="mt-3 text-xs text-white/50">Plan activo: ${a.plan}</div><div class="mt-2 text-2xl font-semibold">${a.completedToday ? 'Completado' : a.sessionTitle}</div><div class="mt-2 text-sm leading-6 text-white/65">${a.sessionCopy}</div><div class="mt-4 grid grid-cols-3 gap-3 text-center"><div class="rounded-2xl border border-white/10 bg-black/15 px-3 py-3"><div class="text-xs text-white/45">Fatiga</div><div class="mt-1 text-sm font-medium">${a.fatigue}</div></div><div class="rounded-2xl border border-white/10 bg-black/15 px-3 py-3"><div class="text-xs text-white/45">Racha</div><div class="mt-1 text-sm font-medium">${a.streak}</div></div><div class="rounded-2xl border border-white/10 bg-black/15 px-3 py-3"><div class="text-xs text-white/45">Cumplimiento</div><div class="mt-1 text-sm font-medium">${a.compliance}%</div></div></div><div class="mt-4 grid grid-cols-2 gap-3"><button onclick="setAthletePage('training')" class="rounded-2xl bg-white px-4 py-3 text-sm font-semibold text-slate-900">Ver calendario</button><button onclick="openModal('adjust')" class="rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm font-medium text-white">Ajuste simple</button></div></div><div class="mt-5 rounded-[28px] border border-white/10 bg-white/[0.04] p-4"><div class="flex items-center justify-between"><div><div class="text-sm font-medium">Indicaciones del coach</div><div class="mt-1 text-xs text-white/50">Feedback operativo</div></div><span class="text-cyan-300">💬</span></div><div class="mt-3 text-sm leading-7 text-white/70">${a.note}</div></div><div class="mt-5"><div class="mb-3 flex items-center justify-between"><div class="text-sm font-medium text-white">Progreso semanal</div><button onclick="setAthletePage('progress')" class="text-xs text-cyan-300">Ver detalle</button></div><div class="grid grid-cols-7 gap-2">${a.week.map(item => `<div class="${cn('rounded-[20px] border p-2 text-center', item.today ? 'border-cyan-400/50 bg-cyan-400/10' : item.done ? 'border-emerald-400/25 bg-emerald-400/10' : 'border-white/10 bg-white/5')}"><div class="text-[10px] uppercase tracking-[0.2em] text-white/40">${item.day}</div><div class="mt-2 text-[11px] leading-4 text-white/70">${item.type}</div></div>`).join('')}</div></div></div>` : state.athletePage === 'training' ? `<div class="min-h-[700px] bg-[linear-gradient(180deg,#0d1427_0%,#09111e_100%)] p-4 text-white"><div class="flex items-center justify-between pt-2"><div><div class="text-2xl font-semibold">Calendario semanal</div><div class="mt-1 text-sm text-white/55">Tus sesiones programadas y el orden del bloque</div></div><button onclick="logout()" class="rounded-2xl border border-white/10 bg-white/5 px-3 py-2 text-xs text-white">Salir</button></div><div class="mt-5 space-y-3">${[['Lunes','Rodaje suave 6K','40 min · Z2', true],['Martes',a.sessionTitle,'55 min · Calidad', a.completedToday],['Miércoles','Movilidad + fuerza','35 min · Complementario', false],['Jueves','Tempo progresivo','9K · Umbral', false],['Sábado','Long run','14K · Resistencia', false]].map(([day,label,meta,done]) => `<div class="${cn('rounded-[24px] border p-4', done ? 'border-emerald-400/20 bg-emerald-400/10' : 'border-white/10 bg-white/[0.04]')}"><div class="flex items-center justify-between gap-3"><div><div class="text-xs uppercase tracking-[0.18em] text-white/40">${day}</div><div class="mt-2 text-lg font-semibold text-white">${label}</div><div class="mt-1 text-sm text-white/55">${meta}</div></div><div class="text-xs text-white/55">${done ? 'Hecho' : 'Pendiente'}</div></div></div>`).join('')}</div><div class="mt-5 grid grid-cols-2 gap-3"><button onclick="openModal('feedback')" class="rounded-2xl bg-white px-4 py-3 text-sm font-semibold text-slate-900">Marcar entreno</button><button onclick="openModal('adjust')" class="rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white">Ajustar semana</button></div></div>` : state.athletePage === 'progress' ? `<div class="min-h-[700px] bg-[linear-gradient(180deg,#0d1427_0%,#09111e_100%)] p-4 text-white"><div class="flex items-center justify-between pt-2"><div><div class="text-2xl font-semibold">Plan y progreso</div><div class="mt-1 text-sm text-white/55">Estructura, carga, condición física y ritmos</div></div><button onclick="logout()" class="rounded-2xl border border-white/10 bg-white/5 px-3 py-2 text-xs text-white">Salir</button></div><div class="mt-5 rounded-[28px] border border-white/10 bg-white/[0.04] p-4"><div class="grid grid-cols-2 gap-4"><div><div class="text-xs uppercase tracking-[0.18em] text-white/40">Objetivo</div><div class="mt-2 text-xl font-semibold">Media Maratón</div><div class="mt-1 text-sm text-white/55">${a.race}</div></div><div><div class="text-xs uppercase tracking-[0.18em] text-white/40">Modo</div><div class="mt-2 text-xl font-semibold">${a.level}</div><div class="mt-1 text-sm text-white/55">Carga actual: ${a.weeklyLoad}</div></div></div><div class="mt-4 grid grid-cols-3 gap-3 text-center"><button onclick="openMetric('Objetivo de tiempo','2h 06m')" class="rounded-2xl border border-white/10 bg-black/15 px-3 py-3"><div class="text-xs text-white/45">Objetivo</div><div class="mt-1 text-sm font-medium text-violet-300">2h 06m</div></button><button onclick="openMetric('Duración del plan','8 semanas')" class="rounded-2xl border border-white/10 bg-black/15 px-3 py-3"><div class="text-xs text-white/45">Duración</div><div class="mt-1 text-sm font-medium">8 semanas</div></button><button onclick="openMetric('Fatiga actual','${a.fatigue}')" class="rounded-2xl border border-white/10 bg-black/15 px-3 py-3"><div class="text-xs text-white/45">Fatiga</div><div class="mt-1 text-sm font-medium">${a.fatigue}</div></button></div></div><div class="mt-5 rounded-[28px] border border-white/10 bg-white/[0.04] p-4"><div class="text-sm font-medium">Carga del plan</div><div class="mt-4 flex h-40 items-end gap-3">${[12,18,26,16,34,34,20,7].map((v,i)=>`<button onclick="openMetric('Semana ${i+1}','${v} km')" class="flex flex-1 items-end justify-center"><div class="${cn('w-full rounded-t-md', i===0 ? 'bg-lime-500' : i===3 ? 'bg-slate-400' : i>5 ? 'bg-amber-300' : 'bg-emerald-300')}" style="height:${v*3.2}px"></div></button>`).join('')}</div></div><div class="mt-5 rounded-[28px] border border-white/10 bg-white/[0.04] p-4"><div class="text-sm font-medium">Zonas de ritmo</div><div class="mt-3 text-3xl font-semibold text-cyan-300">Umbral 5:31/km</div><div class="mt-4 space-y-2">${[['Zona 1','7:04+'],['Zona 2','7:04 – 6:16'],['Zona 3','6:16 – 5:52'],['Zona 4','5:52 – 5:31'],['Zona 5','< 5:31']].map(([z,v])=>`<button onclick="openMetric('${z}','${v}')" class="flex w-full items-center justify-between rounded-2xl border border-white/10 bg-black/15 px-4 py-3 text-sm text-white/80"><span>${z}</span><span>${v}</span></button>`).join('')}</div></div><button onclick="openModal('adjust')" class="mt-5 w-full rounded-2xl bg-cyan-500 px-4 py-3 text-sm font-semibold text-white">Ajuste simple</button></div>` : state.athletePage === 'store' ? `<div class="min-h-[700px] bg-[linear-gradient(180deg,#0d1427_0%,#09111e_100%)] p-4 text-white"><div class="flex items-center justify-between pt-2"><div><div class="text-2xl font-semibold">Historial</div><div class="mt-1 text-sm text-white/55">Carreras, récords y soporte complementario</div></div><button onclick="logout()" class="rounded-2xl border border-white/10 bg-white/5 px-3 py-2 text-xs text-white">Salir</button></div><div class="mt-5 rounded-[28px] border border-white/10 bg-white/[0.04] p-4"><div class="flex items-center justify-between"><div><div class="text-sm font-medium">Próxima carrera</div><div class="mt-2 text-xl font-semibold">San Diego</div><div class="mt-1 text-sm text-white/55">31 mayo 2026 · 21K</div></div><button class="rounded-2xl bg-white px-4 py-2 text-sm font-semibold text-slate-900">Agregar</button></div></div><div class="mt-5 rounded-[28px] border border-white/10 bg-white/[0.04] p-4"><div class="text-sm font-medium">Récords personales</div><div class="mt-4 space-y-2">${[['5K','26:58'],['10K','56:44'],['21K','2:11:32']].map(([d,t])=>`<div class="flex items-center justify-between rounded-2xl border border-white/10 bg-black/15 px-4 py-3 text-sm text-white/80"><span>${d}</span><span class="font-semibold">${t}</span></div>`).join('')}</div></div><div class="mt-5 rounded-[28px] border border-white/10 bg-white/[0.04] p-4"><div class="text-sm font-medium">Estiramiento de la semana</div><div class="mt-3 text-lg font-semibold">Forward Lunge</div><div class="mt-2 text-sm leading-7 text-white/65">Prioriza flexores de cadera antes de trabajos de calidad y después del fondo largo.</div><div class="mt-4 rounded-2xl border border-white/10 bg-black/15 p-4 text-sm leading-7 text-white/70">Consejo: consulta a tu médico si sientes dolor persistente o molestias agudas.</div></div><div class="mt-5 rounded-[28px] border border-white/10 bg-white/[0.04] p-4"><div class="text-sm font-medium">Planes relacionados</div><div class="mt-4 space-y-3">${state.plans.slice(0,2).map(plan=>`<button onclick="buyPlan(${plan.id})" class="flex w-full items-center justify-between rounded-2xl border border-white/10 bg-black/15 px-4 py-3 text-left text-sm text-white/80"><div><div class="font-semibold">${plan.title}</div><div class="text-xs text-white/50">${plan.desc}</div></div><div class="text-cyan-300">${money(plan.price)}</div></button>`).join('')}</div></div></div>` : `<div class="min-h-[700px] bg-[linear-gradient(180deg,#0d1427_0%,#09111e_100%)] p-4 text-white"><div class="flex items-center justify-between pt-2"><div><div class="text-2xl font-semibold">Mensajes</div><div class="mt-1 text-sm text-white/55">Comunicación directa con tu entrenador</div></div><button onclick="logout()" class="rounded-2xl border border-white/10 bg-white/5 px-3 py-2 text-xs text-white">Salir</button></div><div class="mt-5 space-y-3">${msgs.map(msg=>`<div class="${cn('max-w-[88%] rounded-[22px] px-4 py-3 text-sm leading-6', msg.from==='coach' ? 'bg-cyan-400/10 text-white' : 'ml-auto bg-white/[0.05] text-white/75')}"><div class="mb-1 text-[10px] uppercase tracking-[0.18em] text-white/35">${msg.from==='coach' ? 'Coach' : 'Tú'}</div>${msg.text}</div>`).join('')}</div></div>`}
            </div>
            <div class="px-2 pb-1 pt-3 text-center text-sm text-white/50">Athlete App</div>
          </div>
          <div class="glass rounded-[28px] border border-white/10 bg-white/5 p-6 shadow-2xl shadow-black/25">
            <div class="flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between"><div><div class="text-2xl font-semibold text-white">${state.athletePage === 'home' ? 'Resumen del atleta' : state.athletePage === 'training' ? 'Calendario semanal' : state.athletePage === 'progress' ? 'Plan personalizado' : state.athletePage === 'store' ? 'Historial y soporte' : 'Mensajes'}</div><div class="mt-2 text-sm text-white/55">Funciones reales del perfil atleta integradas al mockup.</div></div><div class="flex flex-wrap items-center gap-2">${athleteTopTabs()}<button onclick="logout()" class="rounded-2xl border border-white/10 bg-white/5 px-4 py-2.5 text-sm text-white">Cerrar sesión</button></div></div>
            ${state.athletePage === 'messages' ? `<div class="mt-6 rounded-[26px] border border-white/10 bg-white/[0.03] p-5"><div class="space-y-4">${msgs.map(msg=>`<div class="${cn('max-w-[85%] rounded-[22px] px-4 py-3 text-sm leading-6', msg.from==='coach' ? 'bg-cyan-400/10 text-white' : 'ml-auto bg-white/[0.05] text-white/75')}"><div class="mb-1 text-xs uppercase tracking-[0.16em] text-white/35">${msg.from==='coach' ? 'Coach' : 'Tú'}</div>${msg.text}</div>`).join('')}</div><div class="mt-5 flex gap-3"><input value="${esc(state.chatInput)}" oninput="updateChat(this.value)" placeholder="Escribe un mensaje" class="w-full rounded-2xl border border-white/10 bg-white/[0.04] px-4 py-3 text-sm text-white outline-none placeholder:text-white/25"><button onclick="sendMessage()" class="inline-flex items-center gap-2 rounded-2xl bg-white px-4 py-3 text-sm font-semibold text-slate-900">Enviar</button></div></div>` : `<div class="mt-6 rounded-[26px] border border-white/10 bg-white/[0.03] p-5"><div class="text-lg font-semibold text-white">Vista desktop complementaria</div><div class="mt-3 text-sm leading-7 text-white/60">Navega entre Resumen, Calendario, Plan, Historial y Mensajes. Los botones funcionales principales ya operan en esta demo HTML.</div></div>`}
          </div>
        </div>
      </div>`;
    }

    function modalHtml(){
      if(!state.modal) return '';
      if(state.modal === 'adjust') return `<div class="fixed inset-0 z-40 modal-backdrop" onclick="closeModal()"></div><div class="fixed left-1/2 top-1/2 z-50 w-[92%] max-w-lg -translate-x-1/2 -translate-y-1/2 rounded-[28px] border border-white/10 bg-[#0C1325] p-6 shadow-[0_30px_120px_rgba(0,0,0,0.55)]"><div class="mb-5 flex items-center justify-between"><div class="text-xl font-semibold text-white">Ajuste simple</div><button onclick="closeModal()" class="rounded-2xl border border-white/10 bg-white/5 p-2 text-white/65">✕</button></div><div class="space-y-5 text-center"><div class="border-b border-white/10 pb-4 text-sm leading-7 text-white/70">Indícanos los días que puedes entrenar y cuál es el día más largo disponible para reorganizar tu semana.</div><div><div class="text-xl font-medium text-cyan-300">Días disponibles esta semana</div><div class="mt-5 grid grid-cols-2 gap-x-8 gap-y-4 text-left">${['Lun','Mar','Mié','Jue','Vie','Sáb','Dom','Indoor'].map(day=>`<label class="flex items-center gap-3 text-lg text-white/85"><span class="h-6 w-6 rounded-md border border-white/25"></span><span>${day}</span></label>`).join('')}</div></div><div><div class="text-xl font-medium text-cyan-300">Día largo disponible</div><div class="mt-4 rounded-[24px] border border-white/10 bg-white/[0.04] px-5 py-4 text-left text-xl text-white/75">Seleccionar día</div></div><div class="flex justify-center"><button onclick="applySimpleAdjustment()" class="rounded-full bg-cyan-500 px-10 py-4 text-xl font-semibold text-white shadow-lg shadow-cyan-500/20">Aplicar ajuste</button></div></div></div>`;
      if(state.modal === 'feedback') return `<div class="fixed inset-0 z-40 modal-backdrop" onclick="closeModal()"></div><div class="fixed left-1/2 top-1/2 z-50 w-[92%] max-w-lg -translate-x-1/2 -translate-y-1/2 rounded-[28px] border border-white/10 bg-[#0C1325] p-6 shadow-[0_30px_120px_rgba(0,0,0,0.55)]"><div class="mb-5 flex items-center justify-between"><div class="text-xl font-semibold text-white">Guardar entrenamiento</div><button onclick="closeModal()" class="rounded-2xl border border-white/10 bg-white/5 p-2 text-white/65">✕</button></div><div class="space-y-4"><label class="block space-y-2"><div class="text-sm text-white/65">RPE (1 a 10)</div><input value="7" class="w-full rounded-2xl border border-white/10 bg-white/[0.04] px-4 py-3 text-sm text-white outline-none"></label><label class="block space-y-2"><div class="text-sm text-white/65">Comentario</div><textarea class="min-h-[120px] w-full rounded-[22px] border border-white/10 bg-white/[0.04] px-4 py-3 text-sm text-white outline-none">Me sentí bien, solo las últimas 2 repeticiones costaron más.</textarea></label><div class="flex justify-end gap-3"><button onclick="closeModal()" class="rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white">Cancelar</button><button onclick="markWorkoutDone()" class="rounded-2xl bg-white px-4 py-3 text-sm font-semibold text-slate-900">Guardar</button></div></div></div>`;
      if(state.modal === 'checkout'){ const p = state.plans.find(x=>x.id===state.selectedPlanId); return `<div class="fixed inset-0 z-40 modal-backdrop" onclick="closeModal()"></div><div class="fixed left-1/2 top-1/2 z-50 w-[92%] max-w-lg -translate-x-1/2 -translate-y-1/2 rounded-[28px] border border-white/10 bg-[#0C1325] p-6 shadow-[0_30px_120px_rgba(0,0,0,0.55)]"><div class="mb-5 flex items-center justify-between"><div class="text-xl font-semibold text-white">Checkout del plan</div><button onclick="closeModal()" class="rounded-2xl border border-white/10 bg-white/5 p-2 text-white/65">✕</button></div><div class="space-y-4"><div class="rounded-[24px] border border-white/10 bg-white/[0.03] p-5"><div class="text-lg font-semibold text-white">${p.title}</div><div class="mt-2 text-sm leading-7 text-white/60">${p.desc}</div><div class="mt-4 text-2xl font-semibold text-cyan-300">${money(p.price)}</div></div><div class="flex justify-end gap-3"><button onclick="closeModal()" class="rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white">Cancelar</button><button onclick="finishCheckout()" class="rounded-2xl bg-white px-4 py-3 text-sm font-semibold text-slate-900">Pagar ahora</button></div></div></div>`; }
      if(state.modal === 'metric') return `<div class="fixed inset-0 z-40 modal-backdrop" onclick="closeModal()"></div><div class="fixed left-1/2 top-1/2 z-50 w-[92%] max-w-lg -translate-x-1/2 -translate-y-1/2 rounded-[28px] border border-white/10 bg-[#0C1325] p-6 shadow-[0_30px_120px_rgba(0,0,0,0.55)]"><div class="mb-5 flex items-center justify-between"><div class="text-xl font-semibold text-white">${state.metricDetail.title}</div><button onclick="closeModal()" class="rounded-2xl border border-white/10 bg-white/5 p-2 text-white/65">✕</button></div><div class="rounded-[24px] border border-white/10 bg-white/[0.03] p-5"><div class="text-3xl font-semibold text-white">${state.metricDetail.value}</div><div class="mt-3 text-sm leading-7 text-white/60">Detalle expandido de la métrica seleccionada dentro del perfil del atleta.</div></div></div>`;
      return '';
    }

    function render(){
      const content = !state.session ? loginView() : state.role === 'athlete' ? athleteView() : simplePanel(state.role === 'coach' ? 'Vista de entrenador' : 'Consola admin', 'Conservada en esta versión HTML.');
      document.getElementById('app').innerHTML = shell(content) + modalHtml() + (state.toast ? `<div class="fixed bottom-6 right-6 z-[60] rounded-[22px] border border-cyan-400/20 bg-[#0D1528] px-4 py-3 shadow-2xl"><div class="flex items-center gap-3"><div class="rounded-xl bg-cyan-400/15 p-2 text-cyan-300">✓</div><div><div class="text-sm font-medium text-white">${state.toast.title}</div><div class="text-xs text-white/55">${state.toast.message}</div></div><button onclick="clearToast()" class="ml-2 text-white/35">✕</button></div></div>` : '');
    }

    window.setRole = function(role){ state.auth.role = role; state.auth.email = state.users[role].email; state.auth.password = state.users[role].password; render(); };
    window.updateAuth = function(field, value){ state.auth[field] = value; };
    window.quickLogin = function(role){ setRole(role); login(role); };
    window.doLogin = doLogin;
    window.logout = logout;
    window.setAthletePage = function(page){ state.athletePage = page; render(); };
    window.openModal = function(name){ state.modal = name; render(); };
    window.closeModal = function(){ state.modal = null; render(); };
    window.applySimpleAdjustment = applySimpleAdjustment;
    window.markWorkoutDone = markWorkoutDone;
    window.buyPlan = buyPlan;
    window.finishCheckout = finishCheckout;
    window.openMetric = openMetric;
    window.updateChat = function(v){ state.chatInput = v; };
    window.sendMessage = sendMessage;
    window.clearToast = function(){ state.toast = null; render(); };

    render();
  </script>
</body>
</html>
