function openModal(title, body, small=false){const back=document.getElementById('modalBack');back.innerHTML=`<div class="modal ${small?'small':''}"><div class="modalhead"><div style="font-size:22px;font-weight:700">${esc(title)}</div><button class="btn secondary small" onclick="closeModal()">Cerrar</button></div>${body}</div>`;back.className='modalback show';}
document.getElementById('modalBack').addEventListener('click',(e)=>{if(e.target.id==='modalBack')closeModal();});
function renderRoleSwitch(){const el=document.getElementById('roleSwitch');if(!state.session){el.innerHTML='';return;}const tabs=state.session.role==='admin'?[{id:'admin',label:'Administrador',icon:'🛡️'},{id:'coach',label:'Entrenador',icon:'📊'},{id:'athlete',label:'Atleta',icon:'👟'}]:state.session.role==='coach'?[{id:'coach',label:'Entrenador',icon:'📊'},{id:'athlete',label:'Atleta',icon:'👟'}]:[{id:'athlete',label:'Atleta',icon:'👟'}];el.innerHTML=tabs.map(t=>`<button class="role-pill ${state.role===t.id?'active':''}" onclick="switchRole('${t.id}')">${t.icon} ${t.label}</button>`).join('');}
function switchRole(role){state.role=role;render();}
function setAuthRole(role){state.auth.role=role;state.auth.email=state.users[role].email;state.auth.password=state.users[role].password;render();}
function performLogin(roleKey){const user=state.users[roleKey];state.auth={role:roleKey,email:user.email,password:user.password};state.session={role:roleKey,name:user.name,email:user.email};state.role=roleKey;if(roleKey==='athlete'){state.athleteViewId=user.athleteId;state.selectedAthleteId=user.athleteId;}toast("Sesión iniciada",`Entraste como ${roleKey}.`);render();}
function submitLogin(){const user=state.users[state.auth.role];if(user&&user.email===state.auth.email&&user.password===state.auth.password)performLogin(state.auth.role);else toast("Credenciales inválidas","Usa las credenciales demo del panel de acceso.");}
function logout(){state.session=null;state.role='coach';toast("Sesión cerrada","Volviste a la pantalla de acceso.");render();}
function renderLogin(){return `<div class="grid-login">${card(`<div class="badge">🔐 Acceso de plataforma</div><div style="margin-top:18px;font-size:42px;font-weight:800;letter-spacing:-.03em">Inicia sesión y ponla a trabajar</div><div class="sub" style="max-width:none">Demo pulido para coach, atleta y administración de suscripciones.</div><div class="tile-grid">${[['admin','Administrador','Licencias, accesos y control general'],['coach','Entrenador','Atletas, biblioteca, planner y cobros'],['athlete','Atleta','Calendario, progreso, historial y mensajes']].map(r=>`<button class="tile ${state.auth.role===r[0]?'active':''}" onclick="setAuthRole('${r[0]}')"><div style="font-size:18px;font-weight:700">${r[1]}</div><div style="margin-top:8px;color:var(--muted);line-height:1.6;font-size:14px">${r[2]}</div></button>`).join('')}</div>`)}${card(`<div style="display:flex;align-items:center;gap:12px"><div class="logo">⚡</div><div><div style="font-size:20px;font-weight:700">Acceso por rol</div><div style="color:var(--muted)">Usa credenciales demo o acceso rápido.</div></div></div><div class="field"><label>Rol</label><select class="select" onchange="setAuthRole(this.value)">${['coach','athlete','admin'].map(r=>`<option value="${r}" ${state.auth.role===r?'selected':''}>${r==='coach'?'Entrenador':r==='athlete'?'Atleta':'Administrador'}</option>`).join('')}</select></div><div class="field"><label>Email</label><input class="input" value="${escAttr(state.auth.email)}" oninput="state.auth.email=this.value" /></div><div class="field"><label>Contraseña</label><input type="password" class="input" value="${escAttr(state.auth.password)}" oninput="state.auth.password=this.value" /></div><div style="margin-top:16px"><button class="btn primary" style="width:100%" onclick="submitLogin()">Entrar al sistema</button></div><div class="quick"><button class="btn secondary" onclick="performLogin('admin')">Acceso admin</button><button class="btn secondary" onclick="performLogin('coach')">Acceso coach</button><button class="btn secondary" onclick="performLogin('athlete')">Acceso atleta</button></div>`)}</div>`;}
function renderSideNav(kind, items, current, title, subtitle){return card(`<div class="navhead"><div class="logo">⚡</div><div><div style="font-weight:700">${title}</div><div style="font-size:12px;color:var(--muted2)">${subtitle}</div></div></div>${items.map(i=>`<button class="navbtn ${current===i.id?'active':''}" onclick="${kind==='coach'?'state.coachPage':'state.adminPage'}='${i.id}'; render()"><span>${i.icon} ${i.label}</span><span>${current===i.id?'›':''}</span></button>`).join('')}`,'nav');}
function renderHeader(title, subtitle, userName='Marco Coach', userSub='48 atletas activos'){return `<div class="topbar"><div><div style="font-size:32px;font-weight:700;letter-spacing:-.03em">${esc(title)}</div><div style="margin-top:8px;font-size:14px;color:var(--muted)">${esc(subtitle)}</div></div><div class="topactions"><button class="btn secondary" onclick="logout()">Cerrar sesión</button><button class="btn secondary" style="width:48px;height:48px;padding:0">🔔</button><div class="userchip"><div class="avatar">👤</div><div><div style="font-size:14px;font-weight:600">${esc(userName)}</div><div style="font-size:12px;color:var(--muted2)">${esc(userSub)}</div></div></div></div></div>`;}
function renderMetric(label, value, sub, icon){return `<div class="card metric"><div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start"><div><div class="label">${label}</div><div class="value">${value}</div><div class="sub">${sub}</div></div><div class="metricicon">${icon}</div></div></div>`;}
function renderCoach(){const athlete=getAthlete();const filteredAthletes=state.athletes.filter(a=>!state.athleteSearch||a.name.toLowerCase().includes(state.athleteSearch.toLowerCase())||a.plan.toLowerCase().includes(state.athleteSearch.toLowerCase()));const filteredLibrary=state.library.filter(item=>!state.librarySearch||[item.title,item.category,item.level,item.goal,item.tag].join(' ').toLowerCase().includes(state.librarySearch.toLowerCase()));const totalPaid=state.billing.filter(b=>b.status==='Pagado').reduce((a,b)=>a+b.amount,0);const totalPending=state.billing.filter(b=>b.status==='Pendiente').reduce((a,b)=>a+b.amount,0);const premiumAthletes=state.athletes.filter(a=>a.coachPlan==='Pro').length;let body='';if(state.coachPage==='dashboard'){body=`${renderHeader('Dashboard del coach','Diseñado para vender mejor el valor de cambiar de plataforma.')}<div class="metrics">${renderMetric('Atletas activos', String(state.athletes.length), '+4 en esta demo', '👥')}${renderMetric('Cumplimiento', '84%', 'Promedio semanal', '📈')}${renderMetric('Ingresos del mes', '$28k', '+8% vs. anterior', '💳')}${renderMetric('En riesgo', String(state.athletes.filter(a=>a.status==='Riesgo').length), 'Revisar hoy', '❤️')}</div><div class="grid-2">${card(`<div style="display:flex;justify-content:space-between;gap:16px;align-items:flex-start"><div><div style="font-size:22px;font-weight:700">Por qué engancha este producto</div><div style="margin-top:8px;color:var(--muted);font-size:14px">Flujo más vendible para coaches que hoy trabajan con herramientas dispersas.</div></div>${pill('Coach-first UX', true)}</div><div class="grid-cards" style="margin-top:20px">${[['Biblioteca reusable', state.library.length + ' plantillas', 'asignables por día'],['Atletas gestionados', String(state.athletes.length), 'listos para demo'],['Upsell premium', String(premiumAthletes), 'con funciones avanzadas'],['Capacidad coach', '25 seats', 'administrable por licencia']].map(c=>`<div class="card soft"><div style="font- t:700;color:#b9fbff">${esc(day.title)}</div><div style="margin-top:4px;font-size:12px;color:var(--muted2)">${esc(day.meta)}</div><div style="margin-top:8px;font-size:12px;line-height:1.6;color:var(--muted)">${esc(day.description)}</div>`:`<div style="margin-top:12px;font-size:12px;color:rgba(255,255,255,.35)">Sin entrenamiento asignado</div>`}</div>`).join('')}</div>`)}</div>`;} else if(state.coachPage==='library'){body=`${renderHeader('Biblioteca de entrenamientos','Plantillas reutilizables para acelerar la asignación y mejorar la percepción del producto.')}<div style="display:flex;justify-content:space-between;gap:16px;align-items:center;flex-wrap:wrap"><div class="searchbar" style="max-width:540px;flex:1 1 420px"><span>🔎</span><input placeholder="Buscar por título, categoría, nivel o meta" value="${escAttr(state.librarySearch||'')}" oninput="state.librarySearch=this.value; render()" /></div><button class="btn primary" onclick="openCreateLibraryModal()">Nueva plantilla</button></div><div class="grid-3">${filteredLibrary.map(item=>card(`<div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start"><div><div style="font-size:20px;font-weight:700">${esc(item.title)}</div><div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">${pill(item.category,true)}${pill(item.level)}${pill(item.goal)}</div></div><div style="padding:6px 10px;border-radius:999px;background:rgba(34,211,238,.1);color:#bff8ff;font-size:12px">${esc(item.tag)}</div></div><div style="margin-top:14px;color:var(--muted);font-size:14px">${esc(item.meta)}</div><div style="margin-top:12px;white-space:pre-line;line-height:1.8;color:rgba(255,255,255,.65);font-size:14px">${esc(item.description)}</div><div style="margin-top:18px;display:flex;gap:10px"><button class="btn primary small" onclick="openAssignFromLibrary(null, ${item.id})">Asignar</button><button class="btn secondary small" onclick="prefillManualFromLibrary(${item.id})">Editar sobre atleta</button></div>`)).join('')}< oporte'}</div><div style="margin-top:12px;font-size:16px;line-height:1.7;color:var(--muted);max-width:420px">Funciones reales del perfil atleta integradas al mockup.</div></div><div class="tabrow">${athleteNav.map(item=>`<button class="role-pill ${state.athletePage===item.id?'active':''}" onclick="state.athletePage='${item.id}'; render()">${item.icon} ${item.label}</button>`).join('')}<button class="role-pill" onclick="logout()">Cerrar sesión</button></div></div>`;if(state.athletePage==='home'){desktop+=`<div class="grid-2" style="margin-top:24px"><div class="stack">${card(`<div style="font-size:16px;color:rgba(255,255,255,.6)">Sesión del día</div><div style="margin-top:12px;font-size:34px;font-weight:700;letter-spacing:-.03em">${esc(primary.title)}</div><div style="margin-top:16px;font-size:16px;line-height:2;color:rgba(255,255,255,.65)">${esc(primary.description)}</div><div class="row" style="margin-top:24px"><button class="btn primary" onclick="state.athletePage='training'; render()">Ver calendario</button><button class="btn secondary" onclick="toast('Ajuste simple','Aquí puede abrirse la lógica de ajuste semanal del atleta.')">Ajuste simple</button></div>`)}${card(`<div style="font-size:18px;font-weight:700">Tu fatiga</div><div style="margin-top:20px;display:flex;gap:20px;align-items:center;flex-wrap:wrap"><div style="width:80px;height:80px;border-radius:999px;background:rgba(34,211,238,.20);display:grid;place-items:center;font-size:30px">🙂</div><div style="flex:1"><div style="font-size:30px;font-weight:700">${esc(athlete.fatigue)}</div><div style="margin-top:16px;display:grid;grid-template-columns:repeat(9,1fr);gap:8px">${['#22d3ee','#22d3ee','#22d3ee','#22d3ee','#34d399','#eab308','#eab308','#ef4444','#ef4444'].map(c=>`<div style="height:20px;border-radius:8px;background:${c};opacity:.85"></div>`).join('')}</div></div></div>`)}</div><div class="stack">${card(`<div style="font-size:18px;font-weight:700">Progreso semanal</div><div class="weekdots" style="margin- :18px;font-weight:700">Plan activo</div><div class="grid-cards" style="grid-template-columns:repeat(3,1fr);margin-top:20px"><div class="card soft"><div style="font-size:14px;color:var(--muted)">Objetivo</div><div style="margin-top:10px;font-size:24px;font-weight:700;color:#c4b5fd">2h 06m</div></div><div class="card soft"><div style="font-size:14px;color:var(--muted)">Duración</div><div style="margin-top:10px;font-size:24px;font-weight:700">8 semanas</div></div><div class="card soft"><div style="font-size:14px;color:var(--muted)">Carga</div><div style="margin-top:10px;font-size:24px;font-weight:700">${esc(athlete.weeklyLoad)}</div></div></div>`)}${card(`<div style="font-size:18px;font-weight:700">Carga del plan</div><div style="margin-top:20px;border:1px solid var(--line);background:rgba(0,0,0,.12);border-radius:24px;padding:20px"><div class="chartbars">${loadBars.map((v,idx)=>`<div class="barcol"><div class="barfill" style="height:${Math.max(30,v*4)}px;background:${idx<3?'#86efac':idx===3?'#94a3b8':idx<6?'#86efac':'#facc15'}"></div><div style="font-size:14px;color:var(--muted)">${idx+1}</div></div>`).join('')}</div></div>`)}</div>${card(`<div style="font-size:18px;font-weight:700">Estructura por ciclos</div><div class="stack" style="margin-top:20px">${cycleRows.map(([week,type,cycle])=>`<div style="display:grid;grid-template-columns:70px 1fr 150px;gap:12px;align-items:center;border:1px solid var(--line);background:rgba(0,0,0,.12);border-radius:20px;padding:16px 20px;font-size:14px"><div style="color:rgba(255,255,255,.75)">${week}</div><div style="color:rgba(255,255,255,.82)">${type}</div><div style="text-align:right;color:#67e8f9">${cycle}</div></div>`).join('')}</div>`)}</div>`;}else if(state.athletePage==='store'){desktop+=`<div class="grid-2" style="margin-top:24px"><div class="stack">${card(`<div style="font-size:18px;font-weight:700">Carreras</div><div style="margin-top:20px;border:1px solid var(--line);background:rgba(0,0,0,.12);border-radius:22px;padding:20px"><div style="display:flex;justify-content:space-between;gap:16px;align-items:center;flex-wrap:wrap"><div><div style="font-size:18px;font-weight:700">Próxima carrera</div><div style="margin-top:6px;font-size:14px;color:var(--muted)">${esc(athlete.race)}</div></div><button class="btn primary" onclick="toast('Carrera agregada','Aquí puede abrirse el flujo para registrar una nueva carrera.')">Agregar</button></div></div>`)}${card(`<div style="font-size:18px;font-weight:700">Récords</div><div class="stack" style="margin-top:20px">${Object.entries(athlete.records).map(([distance,time])=>`<div style="display:grid;grid-template-columns:1fr 120px;gap:12px;align-items:center;border:1px solid var(--line);background:rgba(0,0,0,.12);border-radius:20px;padding:16px 20px;font-size:14px"><div>${esc(distance)}</div><div style="text-align:right;font-weight:700">${esc(time)}</div></div>`).join('')}</div>`)}</div><div class="stack">${card(`<div style="font-size:18px;font-weight:700">Estiramiento de la semana</div><div style="margin-top:20px;font-size:24px;font-weight:700">Forward Lunge</div><div style="margin-top:12px;font-size:14px;line-height:2;color:rgba(255,255,255,.65)">Prioriza flexores de cadera. Úsalo antes de trabajos de calidad y después del fondo largo.</div><div style="margin-top:20px;border:1px solid var(--line);background:rgba(0,0,0,.12);border-radius:22px;padding:18px;font-size:14px;line-height:1.8;color:rgba(255,255,255,.7)">Consejo: consulta a tu médico si sientes dolor persistente o molestias agudas.</div>`)}${card(`<div style="font-size:18px;font-weight:700">Marketplace relacionado</div><div class="stack" style="margin-top:20px">${historyPlans.map(plan=>`<button class="btn secondary" style="display:grid;grid-template-columns:1fr 120px;gap:16px;align-items:center;text-align:left" onclick="openCheckoutModal(${plan.id})"><div><div style="font-size:16px;font-weight:700">${esc(plan.title)}</div><div style="margin-top:4px;font-size:14px;line-height:1.6;color:var(--muted)" function openCoachMessageModal(){const athlete=getAthlete();openModal(`Mensaje para ${athlete.name}`,`<div class="field"><label>Mensaje</label><textarea id="coachMessageText" class="textarea" placeholder="Escribe una indicación para el atleta"></textarea></div><div class="row" style="margin-top:16px"><button class="btn secondary" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="saveCoachMessage()">Enviar</button></div>`,true);}
function saveCoachMessage(){const txt=document.getElementById('coachMessageText').value.trim();if(!txt)return;const athlete=getAthlete();const key=String(athlete.id);if(!state.messages[key])state.messages[key]=[];state.messages[key].push({id:Date.now(),from:'coach',text:txt});closeModal();toast('Mensaje enviado',`Se notificó a ${athlete.name}.`);render();}
function openEditPlanModal(){const athlete=getAthlete();openModal(`Editar plan de ${athlete.name}`,`<div class="field"><label>Nombre del plan</label><input id="editPlanTitle" class="input" value="${escAttr(athlete.plan)}" /></div><div class="field"><label>Objetivo / carrera</label><input id="editPlanRace" class="input" value="${escAttr(athlete.race)}" /></div><div class="row" style="margin-top:16px"><button class="btn secondary" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="saveEditPlan()">Guardar</button></div>`,true);}
function saveEditPlan(){const athlete=getAthlete();athlete.plan=document.getElementById('editPlanTitle').value;athlete.race=document.getElementById('editPlanRace').value;closeModal();toast('Plan actualizado','Se guardó el nombre del plan y el objetivo.');render();}
function openTrainingModal(dayKey){const athlete=getAthlete();const use=(dayKey?athlete.trainingSchedule.find(d=>d.key===dayKey):athlete.trainingSchedule.find(d=>d.key==='tue'))||{key:'tue',title:'',description:'',meta:'45 min · Calidad'};const days={mon:'Lunes',tue:'Martes',wed:'Miércoles',thu:'Jueves',fri:'Viernes',sat:'Sábado',sun:'Domingo'};openModal(`Entrenamiento manual · ${athlete.name}`,`<div class="field"><label>Día</label><select id="manualDay" class="select">${Object.keys(days).map(k=>`<option value="${k}" ${use.key===k?'selected':''}>${days[k]}</option>`).join('')}</select></div><div class="field"><label>Título del entrenamiento</label><input id="manualTitle" class="input" value="${escAttr(use.title||'')}" /></div><div class="field"><label>Meta visible</label><input id="manualMeta" class="input" value="${escAttr(use.meta||'45 min · Calidad')}" /></div><div class="field"><label>Descripción / sesión</label><textarea id="manualDesc" class="textarea" placeholder="2KMS CALENTAMIENTO | 4*1200 RITMO 5:00 | RECUPERACIÓN 2 MINUTOS | 2*2000 RITMO 5:05 | 1KMS ENFRIAMIENTO">${esc(use.description||'')}</textarea></div><div class="row" style="margin-top:16px"><button class="btn secondary" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="saveManualTraining()">Guardar entrenamiento</button></div>`);}
function saveManualTraining(){const athlete=getAthlete();const key=document.getElementById('manualDay').value;const title=document.getElementById('manualTitle').value.trim();const meta=document.getElementById('manualMeta').value.trim();const desc=document.getElementById('manualDesc').value.trim();const slot=athlete.trainingSchedule.find(d=>d.key===key);if(slot){slot.title=title;slot.meta=meta;slot.description=desc;}athlete.sessionTitle=title||athlete.sessionTitle;athlete.sessionCopy=desc||athlete.sessionCopy;closeModal();toast('Entrenamiento agregado','La sesión manual quedó asignada al atleta.');render();}
function openAssignFromLibrary(dayKey, forceLibraryId){const athlete=getAthlete();state.assignDay=dayKey||state.assignDay||'tue';state.assignLibraryId=forceLibraryId||state.assignLibraryId||null;const days={mon:'Lunes',tue:'Martes',wed:'Miércoles',thu:'Jueves',fri:'Viernes',sat:'Sábado',sun:'Domingo'};const filtered=state.library.filter(item=>!state.assignSearch||[item.title,item.category,item.level,item.goal,item.tag].join(' ').toLowerCase().includes(state.assignSearch.toLowerCase()));openModal(`Asignar desde biblioteca · ${athlete.name}`,`<div class="field"><label>Día destino</label><select id="assignDay" class="select" onchange="state.assignDay=this.value">${Object.keys(days).map(k=>`<option value="${k}" ${state.assignDay===k?'selected':''}>${days[k]}</option>`).join('')}</select></div><div class="searchbar" style="margin-top:12px"><span>🔎</span><input value="${escAttr(state.assignSearch||'')}" oninput="state.assignSearch=this.value; openAssignFromLibrary(state.assignDay, state.assignLibraryId)" placeholder="Buscar plantilla" /></div><div class="grid-2" style="margin-top:16px">${filtered.map(item=>`<button class="ath-item ${state.assignLibraryId===item.id?'active':''}" onclick="state.assignLibraryId=${item.id}; openAssignFromLibrary(state.assignDay, state.assignLibraryId)"><div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start"><div><div style="font-size:16px;font-weight:700">${esc(item.title)}</div><div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">${pill(item.category,true)}${pill(item.level)}</div></div><div style="font-size:12px;color:#67e8f9">${esc(item.tag)}</div></div><div style="margin-top:12px;font-size:14px;color:var(--muted)">${esc(item.meta)}</div><div style="margin-top:10px;white-space:pre-line;font-size:14px;line-height:1.8;color:rgba(255,255,255,.65)">${esc(item.description)}</div></button>`).join('')}</div><div class="row" style="margin-top:16px"><button class="btn secondary" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="saveAssignFromLibrary()">Asignar plantilla</button></div>`);}
function saveAssignFromLibrary(){const athlete=getAthlete();const lib=state.library.find(x=>x.id===state.assignLibraryId);if(!lib)return;const key=state.assignDay||'tue';const slot=athlete.trainingSchedule.find(d=>d.key===key);if(slot){slot.title=lib.title;slot.meta=lib.meta;slot.description=lib.description;}athlete.sessionTitle=lib.title;athlete.sessionCopy=lib.description;closeModal();toast('Sesión asignada',`${athlete.name} recibió un entrenamiento desde la biblioteca.`);render();}
function prefillManualFromLibrary(id){const lib=state.library.find(x=>x.id===id);if(!lib)return;closeModal();setTimeout(()=>{openTrainingModal(state.assignDay||'tue');setTimeout(()=>{const title=document.getElementById('manualTitle');const meta=document.getElementById('manualMeta');const desc=document.getElementById('manualDesc');if(title)title.value=lib.title;if(meta)meta.value=lib.meta;if(desc)desc.value=lib.description;},20);},20);}
function openCreateLibraryModal(){openModal('Nueva plantilla de biblioteca',`<div class="field"><label>Título</label><input id="libTitle" class="input" /></div><div class="row"><div class="field"><label>Categoría</label><input id="libCategory" class="input" value="Rodaje" /></div><div class="field"><label>Nivel</label><input id="libLevel" class="input" value="General" /></div><div class="field"><label>Meta visible</label><input id="libMeta" class="input" value="45 min · Base" /></div></div><div class="row"><div class="field"><label>Objetivo</label><input id="libGoal" class="input" value="General" /></div><div class="field"><label>Tag</label><input id="libTag" class="input" value="Nuevo" /></div></div><div class="field"><label>Descripción</label><textarea id="libDesc" class="textarea"></textarea></div><div class="row" style="margin-top:16px"><button class="btn secondary" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="saveLibraryItem()">Guardar plantilla</button></div>`);}
function saveLibraryItem(){const title=document.getElementById('libTitle').value.trim();const desc=document.getElementById('libDesc').value.trim();if(!title||!desc)return;state.library.unshift({id:Date.now(),title,category:document.getElementById('libCategory').value.trim()||'Rodaje',level:document.getElementById('libLevel').value.trim()||'General',meta:document.getElementById('libMeta').value.trim()||'45 min · Base',goal:document.getElementById('libGoal').value.trim()||'General',description:desc,tag:document.getElementById('libTag').value.trim()||'Nuevo'});closeModal();toast('Plantilla creada','La biblioteca ya tiene un nuevo entrenamiento reusable.');render();}
function openCalendarModal(day='Lunes'){openModal('Nueva sesión semanal',`<div class="field"><label>Día</label><select id="calDay" class="select">${state.calendar.map(d=>`<option value="${escAttr(d.day)}" ${d.day===day?'selected':''}>${esc(d.day)}</option>`).join('')}</select></div><div class="field"><label>Sesión</label><input id="calLabel" class="input" /></div><div class="row" style="margin-top:16px"><button class="btn secondary" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="saveCalendarItem()">Guardar sesión</button></div>`,true);}
function saveCalendarItem(){const day=document.getElementById('calDay').value;const label=document.getElementById('calLabel').value.trim();if(!label)return;const col=state.calendar.find(d=>d.day===day);if(col)col.sessions.push({id:Date.now(),label});closeModal();toast('Sesión creada','La sesión apareció en el planner semanal.');render();}
function removeCalendarItem(day,id){const col=state.calendar.find(d=>d.day===day);if(col)col.sessions=col.sessions.filter(s=>s.id!==id);toast('Sesión eliminada','Se quitó del planner.');render();}
function openMarketplaceModal(id){const plan=state.plans.find(p=>p.id===id);openModal('Editar plan marketplace',`<input type="hidden" id="mkId" value="${plan.id}" /><div class="field"><label>Título</label><input id="mkTitle" class="input" value="${escAttr(plan.title)}" /></div><div class="field"><label>Precio</label><input id="mkPrice" class="input" type="number" value="${plan.price}" /></div><div class="field"><label>Descripción</label><textarea id="mkDesc" class="textarea">${esc(plan.desc)}</textarea></div><div class="field"><label><input type="checkbox" id="mkPub" ${plan.published?'checked':''} /> Publicado en marketplace</label></div><div class="row" style="margin-top:16px"><button class="btn secondary" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="saveMarketplaceItem()">Guardar cambios</button></div>`);}
function saveMarketplaceItem(){const id=Number(document.getElementById('mkId').value);const plan=state.plans.find(p=>p.id===id);plan.title=document.getElementById('mkTitle').value;plan.price=Number(document.getElementById('mkPrice').value||0);plan.desc=document.getElementById('mkDesc').value;plan.published=document.getElementById('mkPub').checked;closeModal();toast('Marketplace actualizado','Los cambios ya quedaron activos.');render();}
function openCheckoutModal(id){const plan=state.plans.find(p=>p.id===id);openModal('Checkout del plan',`<div class="card soft"><div style="font-size:20px;font-weight:700">${esc(plan.title)}</div><div style="margin-top:8px;line-height:1.7;color:var(--muted);font-size:14px">${esc(plan.desc)}</div><div style="margin-top:16px;font-size:28px;font-weight:700;color:#67e8f9">${money(plan.price)}</div></div><div class="row" style="margin-top:16px"><button class="btn secondary" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="closeModal(); toast('Compra exitosa', 'Se activó ${escAttr(plan.title)} en tu cuenta.')">Pagar ahora</button></div>`,true);}
function openMetricModal(title, value){openModal(title,`<div class="card soft"><div style="font-size:28px;font-weight:700">${esc(value)}</div><div style="margin-top:12px;font-size:14px;line-height:1.7;color:var(--muted)">Detalle expandido de la métrica del atleta.</div></div>`,true);}
function sendAthleteMessage(){const input=document.getElementById('athleteMsgInput');const txt=input.value.trim();if(!txt)return;const key=String(state.athleteViewId);if(!state.messages[key])state.messages[key]=[];state.messages[key].push({id:Date.now(),from:'me',text:txt});toast('Mensaje enviado','Tu coach verá este mensaje.');render();}
function render(){renderRoleSwitch();const root=document.getElementById('appRoot');const heroSub=document.getElementById('heroSub');const crumb=document.getElementById('crumb');if(!state.session){heroSub.textContent='Login unificado para administrador, entrenador y atleta, todo conectado al mismo demo.';crumb.textContent='Access gateway › Vista interactiva';root.innerHTML=renderLogin();return;}if(state.role==='coach'){heroSub.textContent='Coach mejorado con biblioteca reusable, más atletas y base para administración real.';crumb.textContent='Coach workspace › Vista interactiva';root.innerHTML=renderCoach();}else if(state.role==='admin'){heroSub.textContent='Control para administrar entrenadores, atletas, seats y funciones.';crumb.textContent='Admin console › Vista interactiva';root.innerHTML=renderAdmin();}else{heroSub.textContent='Calendario, progreso, historial y mensajes funcionales.';crumb.textContent='Athlete experience › ' + getAthlete(state.athleteViewId).name;root.innerHTML=renderAthlete();}}
render();
</script>
</body>
</html>
