function cn(...classes){ return classes.filter(Boolean).join(" ") }
function money(value){ return `$${Number(value).toLocaleString("es-MX")} MXN`; }
function GlassCard({ children, className = "" }) { return <div className={cn("rounded-[28px] border border-white/10 bg-white/5 shadow-2xl shadow-black/25 backdrop-blur-xl", className)}>{children}</div> }
function Pill({ children, active = false }) { return <div className={cn("rounded-full border px-3 py-1 text-xs font-medium", active ? "border-cyan-400/60 bg-cyan-400/15 text-cyan-100" : "border-white/10 bg-white/5 text-white/60")}>{children}</div> }
function LogoMark(){ return <div className="flex h-11 w-11 items-center justify-center rounded-2xl bg-gradient-to-br from-cyan-400 to-violet-500 text-white shadow-lg shadow-cyan-500/25"><Zap className="h-5 w-5" /></div> }
function DeviceFrame({ children, label }) { return <div className="w-[340px] max-w-full rounded-[42px] border border-white/10 bg-[#0A1020] p-3 shadow-[0_30px_90px_rgba(0,0,0,0.5)]"><div className="mx-auto mb-3 h-6 w-32 rounded-full bg-black/55" /><div className="overflow-hidden rounded-[30px] border border-white/10 bg-[#0E152B]">{children}</div><div className="px-2 pb-1 pt-3 text-center text-sm text-white/50">{label}</div></div> }
function Modal({ open, onClose, title, children, width = "max-w-xl" }) { if(!open) return null; return <div className="fixed inset-0 z-50 flex items-center justify-center p-4"><div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={onClose} /><div className={cn("relative z-10 w-[92%] rounded-[28px] border border-white/10 bg-[#0C1325] p-6 shadow-[0_30px_120px_rgba(0,0,0,0.55)]", width)}><div className="mb-5 flex items-center justify-between"><div className="text-xl font-semibold text-white">{title}</div><button onClick={onClose} className="rounded-2xl border border-white/10 bg-white/5 p-2 text-white/65"><X className="h-4 w-4" /></button></div>{children}</div></div> }
function Toast({ toast, onClose }) { if(!toast) return null; return <div className="fixed bottom-6 right-6 z-[60] rounded-[22px] border border-cyan-400/20 bg-[#0D1528] px-4 py-3 shadow-2xl"><div className="flex items-center gap-3"><div className="rounded-xl bg-cyan-400/15 p-2 text-cyan-300"><Check className="h-4 w-4" /></div><div><div className="text-sm font-medium text-white">{toast.title}</div><div className="text-xs text-white/55">{toast.message}</div></div><button onClick={onClose} className="ml-2 text-white/35"><X className="h-4 w-4" /></button></div></div> }
function Field({ label, value, onChange, placeholder, type = "text" }) { return <label className="block space-y-2"><div className="text-sm text-white/65">{label}</div><input type={type} value={value} onChange={onChange} placeholder={placeholder} className="w-full rounded-2xl border border-white/10 bg-white/[0.04] px-4 py-3 text-sm text-white outline-none placeholder:text-white/25" /></label> }

ssName="h-4 w-4" /><span className="text-cyan-300">Vista interactiva</span></div></div></div><div className="mt-8">{children}</div></div></div></div> }

function CoachView(props) {

nded-[22px] border border-white/10 bg-white/[0.03] p-4 text-left text-sm leading-7 text-white/75 hover:bg-white/[0.05]">{text}</button>)}</div></GlassCard></div></>;

on onClick={()=>{ setSessionForm({ day: day.key, title: day.title, description: day.description, meta: day.meta }); setCustomOpen(true); }} className="rounded-xl border border-white/10 bg-white/5 p-2 text-white/65"><Pencil className="h-3.5 w-3.5" /></button><button onClick={()=>{ setSessionForm((prev)=>({...prev, day: day.key })); setLibraryAssignOpen(true); }} className="rounded-xl border border-white/10 bg-white/5 p-2 text-cyan-300"><Library className="h-3.5 w-3.5" /></button></div></div>{day.title ? <><div className="mt-3 text-sm font-medium text-cyan-200">{day.title}</div><div className="mt-1 text-xs text-white/45">{day.meta}</div><div className="mt-2 whitespace-pre-line text-xs leading-6 text-white/60">{day.description}</div></> : <div className="mt-3 text-xs text-white/35">Sin entrenamiento asignado</div>}</div>)}</div></GlassCard></div></>;

function AdminView({ coachLicenses, setCoachLicenses, athleteLicenses, setAthleteLicenses, showToast, onLogout }) {
  const [page, setPage] = useState("overview");
  const [coachOpen, setCoachOpen] = useState(false);
  const [athleteOpen, setAthleteOpen] = useState(false);
  const [coachForm, setCoachForm] = useState({ owner: "", email: "", plan: "Studio", seats: 10 });
  const [athleteForm, setAthleteForm] = useState({ athlete: "", email: "", source: "Coach", owner: "Nuevo coach", status: "Trial" });
  const paidCoaches = coachLicenses.filter((c)=>c.status==="Activa").length;
  const activeAthletes = athleteLicenses.filter((a)=>a.status==="Activa").length;
  const trialAthletes = athleteLicenses.filter((a)=>a.status!=="Activa").length;
  const usedSeats = coachLicenses.reduce((acc,item)=>acc+item.usedSeats,0);
  const totalSeats = coachLicenses.reduce((acc,item)=>acc+item.seats,0);
  const addCoachLicense = ()=>{ if(!coachForm.owner.trim()||!coachForm.email.trim()) return; setCoachLicenses((prev)=>[...prev,{ id:Date.now(), owner:coachForm.owner, email:coachForm.email, plan:coachForm.plan, seats:Number(coachForm.seats), usedSeats:0, status:"Trial", renewal:"2026-05-30" }]); setCoachOpen(false); setCoachForm({ owner: "", email: "", plan: "Studio", seats: 10 }); showToast("Coach creado", "Ya aparece con licencia en el panel admin."); };
  const addAthleteLicense = ()=>{ if(!athleteForm.athlete.trim()||!athleteForm.email.trim()) return; setAthleteLicenses((prev)=>[...prev,{ id:Date.now(), ...athleteForm, expires:"2026-05-30" }]); setAthleteOpen(false); setAthleteForm({ athlete: "", email: "", source: "Coach", owner: "Nuevo coach", status: "Trial" }); showToast("Licencia atleta creada", "La nueva licencia ya aparece en administración."); };
  return <div className="grid gap-6 xl:grid-cols-[240px_minmax(0,1fr)]"><SideNav items={adminNav} page={page} setPage={setPage} title="Pulse Admin" subtitle="Licencias y operación" /><div className="space-y-6">

/div></>}
    {page==="coach_licenses" && <><HeaderBar title="Licencias coach" subtitle="Administra capacidad, seats, trial y renovación de coaches." onLogout={onLogout} userName="Admin Pulse" userSub="Control de plataforma" /><div className="flex justify-end"><button onClick={()=>setCoachOpen(true)} className="rounded-2xl bg-white px-4 py-3 text-sm font-semibold text-slate-900">Nueva licencia coach</button></div><GlassCard className="p-6"><div className="overflow-hidden rounded-[26px] border border-white/10"><div className="grid grid-cols-[1.2fr_1.2fr_.8fr_.8fr_.8fr_.9fr] bg-white/5 px-4 py-3 text-xs uppercase tracking-[0.18em] text-white/35"><div>Coach</div><div>Email</div><div>Plan</div><div>Seats</div><div>Status</div><div>Renovación</div></div>{coachLicenses.map((item)=><div key={item.id} className="grid grid-cols-[1.2fr_1.2fr_.8fr_.8fr_.8fr_.9fr] items-center border-t border-white/10 px-4 py-4 text-sm text-white/75"><div>{item.owner}</div><div>{item.email}</div><div>{item.plan}</div><div>{item.usedSeats}/{item.seats}</div><div><Pill active={item.status==="Activa"}>{item.status}</Pill></div><div>{item.renewal}</div></div>)}</div></GlassCard></>}
    {page==="athlete_licenses" && <><HeaderBar title="Licencias atleta" subtitle="Controla licencias directas, ligadas a coach y trials." onLogout={onLogout} userName="Admin Pulse" userSub="Control de plataforma" /><div className="flex justify-end"><button onClick={()=>setAthleteOpen(true)} className="rounded-2xl bg-white px-4 py-3 text-sm font-semibold text-slate-900">Nueva licencia atleta</button></div><GlassCard className="p-6"><div className="overflow-hidden rounded-[26px] border border-white/10"><div className="grid grid-cols-[1fr_1.2fr_.9fr_.9fr_.8fr_.9fr] bg-white/5 px-4 py-3 text-xs uppercase tracking-[0.18em] text-white/35"><div>Atleta</div><div>Email</div><div>Source</div><div>Owner</div><div>Status</div><div>Vence</div></div>{athleteLicenses.map((item)=><div key={item.id} className="grid grid-cols-[1fr_1.2fr_.9fr_.9fr_.8fr_.9fr] items-center border-t border-white/10 px-4 py-4 text-sm text-white/75"><div>{item.athlete}</div><div>{item.email}</div><div>{item.source}</div><div>{item.owner}</div><div><Pill active={item.status==="Activa"}>{item.status}</Pill></div><div>{item.expires}</div></div>)}</div></GlassCard></>}

    <Modal open={coachOpen} onClose={()=>setCoachOpen(false)} title="Nueva licencia coach"><div className="space-y-4"><Field label="Nombre" value={coachForm.owner} onChange={(e)=>setCoachForm({...coachForm, owner:e.target.value})} /><Field label="Email" value={coachForm.email} onChange={(e)=>setCoachForm({...coachForm, email:e.target.value})} /><div className="grid gap-4 md:grid-cols-2"><Field label="Plan" value={coachForm.plan} onChange={(e)=>setCoachForm({...coachForm, plan:e.target.value})} /><Field label="Seats" type="number" value={coachForm.seats} onChange={(e)=>setCoachForm({...coachForm, seats:e.target.value})} /></div><div className="flex justify-end gap-3"><button onClick={()=>setCoachOpen(false)} className="rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white">Cancelar</button><button onClick={addCoachLicense} className="rounded-2xl bg-white px-4 py-3 text-sm font-semibold text-slate-900">Crear licencia</button></div></div></Modal>

ounded-md opacity-80", color)} />)}</div></div></div></div></div><div className="space-y-6"><div className="rounded-[28px] border border-white/10 bg-white/[0.04] p-6"><div className="text-base font-semibold text-white">Progreso semanal</div><div className="mt-6 flex items-center justify-between gap-3 overflow-x-auto pb-2">{["L","M","M","J","V","S","D"].map((label,idx)=><div key={label+idx} className="flex min-w-[64px] flex-col items-center gap-2"><div className={cn("flex h-14 w-14 items-center justify-center rounded-full text-xl", idx < 2 ? "bg-emerald-500/25 text-emerald-100" : idx === 2 ? "bg-violet-500/70 text-white" : "bg-white/10 text-white/70")}>{idx < 2 ? "✓" : "🏃"}</div><div className="text-xs text-white/60">{label}</div></div>)}</div><div className="mt-8 flex items-center justify-between text-sm text-white/60"><span>Distancia total</span><span>{athlete.monthVolume} km del mes</span></div><div className="mt-3 h-5 rounded-full bg-white/10 p-1"><div className="h-full rounded-full bg-emerald-400" style={{ width: `${Math.min(90, Math.max(35, athlete.compliance))}%` }} /></div></div><div className="rounded-[28px] border border-white/10 bg-white/[0.04] p-6"><div className="text-base font-semibold text-white">Indicaciones del coach</div><div className="mt-4 text-base leading-8 text-white/65">{athlete.note}</div><button onClick={()=>setPage("messages")} className="mt-6 rounded-[20px] border border-white/10 bg-white/[0.04] px-5 py-3 text-sm font-semibold text-white">Abrir mensajes</button></div></div></div>}{page==="training" && <div className="mt-8 space-y-5">{schedule.map((item)=><div key={item.day} className="rounded-[28px] border border-white/10 bg-white/[0.04] p-6"><div className="text-sm text-white/55">{item.day}</div><div className="mt-3 text-[30px] font-semibold leading-tight tracking-tight text-white">{item.title || "Sin entrenamiento"}</div><div className="mt-3 text-sm text-white/55">{item.meta}</div><div className="mt-3 text-sm leading-7 text-white/60">{item.description || "Todavía no hay sesión asignada para este día."}</div></div>)}</div>}{page==="progress" && <div className="mt-8 grid gap-6 xl:grid-cols-[1fr_1fr]"><div className="space-y-6"><div className="rounded-[28px] border border-white/10 bg-white/[0.04] p-6"><div className="text-base font-semibold text-white">Plan activo</div><div className="mt-5 grid gap-4 md:grid-cols-3"><div className="rounded-[22px] border border-white/10 bg-black/10 p-5"><div className="text-sm text-white/55">Objetivo</div><div className="mt-3 text-[24px] font-semibold text-violet-300">2h 06m</div></div><div className="rounded-[22px] border border-white/10 bg-black/10 p-5"><div className="text-sm text-white/55">Duración</div><div className="mt-3 text-[24px] font-semibold text-white">8 semanas</div></div><div className="rounded-[22px] border border-white/10 bg-black/10 p-5"><div className="text-sm text-white/55">Carga</div><div className="mt-3 text-[24px] font-semibold text-white">{athlete.weeklyLoad}</div></div></div></div><div className="rounded-[28px] border border-white/10 bg-white/[0.04] p-6"><div className="text-base font-semibold text-white">Carga del plan</div><div className="mt-6 rounded-[24px] border border-white/10 bg-black/10 p-5"><div className="flex h-[220px] items-end justify-between gap-4">{loadBars.map((value,idx)=><div key={idx} className="flex flex-1 flex-col items-center justify-end gap-3"><div className={cn("w-full rounded-t-xl", idx < 3 ? "bg-emerald-300" : idx === 3 ? "bg-slate-400" : idx < 6 ? "bg-emerald-300" : "bg-yellow-400")} style={{ height: `${Math.max(30, value * 4)}px` }} /><div className="text-sm text-white/55">{idx+1}</div></div>)}</div></div></div></div><div className="rounded-[28px] border border-white/10 bg-white/[0.04] p-6"><div className="text-base font-semibold text-white">Estructura por ciclos</div><div className="mt-5 space-y-3">{cycleRows.map(([week, type, cycle])=><div key={String(week)} className="grid grid-cols-[70px_1fr_150px] items-center rounded-[20px] border border-white/10 bg-black/10 px-5 py-4 text-sm"><div className="text-white/75">{week}</div><div className="text-white/80">{type}</div><div className="text-right text-cyan-300">{cycle}</div></div>)}</div></div></div>}{page==="store" && <div className="mt-8 grid gap-6 xl:grid-cols-[1fr_1fr]"><div className="space-y-6"><div className="rounded-[28px] border border-white/10 bg-white/[0.04] p-6"><div className="text-base font-semibold text-white">Carreras</div><div className="mt-5 rounded-[22px] border border-white/10 bg-black/10 p-5"><div className="flex items-center justify-between gap-4"><div><div className="text-lg font-semibold text-white">Próxima carrera</div><div className="mt-1 text-sm text-white/55">{athlete.race}</div></div><button onClick={()=>showToast("Carrera agregada", "Aquí puede abrirse el flujo para registrar una nueva carrera.")} className="rounded-[18px] bg-white px-5 py-3 text-sm font-semibold text-slate-900">Agregar</button></div></div></div><div className="rounded-[28px] border border-white/10 bg-white/[0.04] p-6"><div className="text-base font-semibold text-white">Récords</div><div className="mt-5 space-y-3">{Object.entries(athlete.records).map(([distance,time])=><div key={distance} className="grid grid-cols-[1fr_120px] items-center rounded-[20px] border border-white/10 bg-black/10 px-5 py-4 text-sm"><div className="text-white/80">{distance}</div><div className="text-right font-semibold text-white/90">{time}</div></div>)}</div></div></div><div className="space-y-6"><div className="rounded-[28px] border border-white/10 bg-white/[0.04] p-6"><div className="text-base font-semibold text-white">Estiramiento de la semana</div><div className="mt-5 text-[24px] font-semibold text-white">Forward Lunge</div><div className="mt-3 text-sm leading-8 text-white/65">Prioriza flexores de cadera. Úsalo antes de trabajos de calidad y después del fondo largo.</div><div className="mt-6 rounded-[22px] border border-white/10 bg-black/10 p-5 text-sm leading-7 text-white/70">Consejo: consulta a tu médico si sientes dolor persistente o molestias agudas.</div></div><div className="rounded-[28px] border border-white/10 bg-white/[0.04] p-6"><div className="text-base font-semibold text-white">Marketplace relacionado</div><div className="mt-5 space-y-3">{historyPlans.map((plan)=><button key={plan.id} onClick={()=>{ setSelectedPlan(plan); setCheckoutOpen(true); }} className="grid w-full grid-cols-[1fr_120px] items-center gap-4 rounded-[22px] border border-white/10 bg-black/10 px-5 py-4 text-left"><div><div className="text-base font-semibold text-white">{plan.title}</div><div className="mt-1 text-sm leading-6 text-white/55">{plan.desc}</div></div><div className="text-right text-base font-semibold text-cyan-300">{money(plan.price)}</div></button>)}</div></div></div></div>}{page==="messages" && <div className="mt-8 rounded-[28px] border border-white/10 bg-white/[0.04] p-6"><div className="space-y-4">{messages.map((msg)=><div key={msg.id} className={cn("max-w-[70%] rounded-[22px] px-5 py-4 text-sm leading-7", msg.from==="coach" ? "bg-cyan-400/10 text-white" : "ml-auto bg-white/[0.05] text-white/75")}><div className="mb-1 text-[10px] uppercase tracking-[0.16em] text-white/35">{msg.from==="coach" ? "Coach" : "Tú"}</div>{msg.text}</div>)}</div><div className="mt-5 flex gap-3"><input value={input} onChange={(e)=>setInput(e.target.value)} placeholder="Escribe un mensaje" className="w-full rounded-2xl border border-white/10 bg-white/[0.04] px-4 py-4 text-sm text-white outline-none placeholder:text-white/25" /><button onClick={()=>{ if(!input.trim()) return; onSendAthleteMessage(athlete.id, input.trim()); setInput(""); showToast("Mensaje enviado", "Tu coach verá este mensaje."); }} className="inline-flex items-center gap-2 rounded-2xl bg-white px-5 py-4 text-sm font-semibold text-slate-900"><SendHorizontal className="h-4 w-4" />Enviar</button></div></div>}</GlassCard></div></div>
    <Modal open={checkoutOpen} onClose={()=>setCheckoutOpen(false)} title="Checkout del plan"><div className="space-y-4">{selectedPlan ? <><div className="rounded-[24px] border border-white/10 bg-white/[0.03] p-5"><div className="text-lg font-semibold text-white">{selectedPlan.title}</div><div className="mt-2 text-sm leading-7 text-white/60">{selectedPlan.desc}</div><div className="mt-4 text-2xl font-semibold text-cyan-300">{money(selectedPlan.price)}</div></div><div className="flex justify-end gap-3"><button onClick={()=>setCheckoutOpen(false)} className="rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white">Cancelar</button><button onClick={()=>{ setCheckoutOpen(false); showToast("Compra exitosa", `Se activó ${selectedPlan.title} en tu cuenta.`); }} className="rounded-2xl bg-white px-4 py-3 text-sm font-semibold text-slate-900">Pagar ahora</button></div></> : null}</div></Modal>
    <Modal open={metricOpen} onClose={()=>setMetricOpen(false)} title={metricDetail.title}><div className="rounded-[24px] border border-white/10 bg-white/[0.03] p-5"><div className="text-2xl font-semibold text-white">{metricDetail.value}</div><div className="mt-3 text-sm leading-7 text-white/60">Detalle expandido de la métrica del atleta.</div></div></Modal>
  </>;
}

function App() {
  const [athletes, setAthletes] = useState(initialAthletes);
  const [plans, setPlans] = useState(initialPlans);
  const [calendar, setCalendar] = useState(initialCalendar);
  const [billing] = useState(initialBilling);
  const [coachLicenses, setCoachLicenses] = useState(initialCoachLicenses);
  const [athleteLicenses, setAthleteLicenses] = useState(initialAthleteLicenses);
  const [messages, setMessages] = useState(initialMessages);
  const [workoutLibrary, setWorkoutLibrary] = useState(initialLibrary);
  const [session, setSession] = useState(null);
  const [role, setRole] = useState("coach");
  const [auth, setAuth] = useState({ role: "coach", email: users.coach.email, password: users.coach.password });
  const [toast, setToast] = useState(null);
  const [selectedAthleteId, setSelectedAthleteId] = useState(1);
  const [athleteViewId, setAthleteViewId] = useState(1);
  const athleteView = athletes.find((a)=>a.id===athleteViewId) || athletes[0];
  const athleteMessages = messages[athleteViewId] || [];
  const showToast = (title,message)=>setToast({ title, message });
  const clearToast = ()=>setToast(null);
  const onQuickLogin = (roleKey)=>{ const user=users[roleKey]; setAuth({ role:roleKey, email:user.email, password:user.password }); setSession({ role:roleKey, name:user.name, email:user.email }); setRole(roleKey); if(roleKey==="athlete"){ setAthleteViewId(user.athleteId); setSelectedAthleteId(user.athleteId); } showToast("Sesión iniciada", `Entraste como ${roleKey}.`); };
  const onLogin = ()=>{ const user=users[auth.role]; if(user && user.email===auth.email && user.password===auth.password){ setSession({ role:auth.role, name:user.name, email:user.email }); setRole(auth.role); if(auth.role==="athlete"){ setAthleteViewId(user.athleteId); setSelectedAthleteId(user.athleteId); } showToast("Sesión iniciada", `Entraste como ${auth.role}.`); } else { showToast("Credenciales inválidas", "Usa las credenciales demo del panel de acceso."); } };
  const onLogout = ()=>{ setSession(null); setRole("coach"); showToast("Sesión cerrada", "Volviste a la pantalla de acceso."); };
  const roleTabs = !session ? [] : session.role==="admin" ? [{ id:"admin", label:"Administrador", icon:ShieldCheck },{ id:"coach", label:"Entrenador", icon:LayoutDashboard },{ id:"athlete", label:"Atleta", icon:Activity }] : session.role==="coach" ? [{ id:"coach", label:"Entrenador", icon:LayoutDashboard },{ id:"athlete", label:"Atleta", icon:Activity }] : [{ id:"athlete", label:"Atleta", icon:Activity }];

  return <><AppShell title={!session ? "Access gateway" : role==="admin" ? "Admin console" : role==="coach" ? "Coach workspace" : `Athlete experience · ${athleteView.name}`} subtitle={!session ? "Login unificado para administrador, entrenador y atleta, todo conectado al mismo demo." : "Coach mejorado con biblioteca reusable, más atletas y base para administración real."} roleTabs={roleTabs} activeRole={role} onRoleChange={setRole}>{!session ? <LoginView auth={auth} setAuth={setAuth} onLogin={onLogin} onQuickLogin={onQuickLogin} /> : role==="admin" ? <AdminView coachLicenses={coachLicenses} setCoachLicenses={setCoachLicenses} athleteLicenses={athleteLicenses} setAthleteLicenses={setAthleteLicenses} showToast={showToast} onLogout={onLogout} /> : role==="coach" ? <CoachView athletes={athletes} setAthletes={setAthletes} plans={plans} setPlans={setPlans} calendar={calendar} setCalendar={setCalendar} billing={billing} setMessagesByAthlete={setMessages} selectedAthleteId={selectedAthleteId} setSelectedAthleteId={setSelectedAthleteId} setAthleteViewId={setAthleteViewId} workoutLibrary={workoutLibrary} setWorkoutLibrary={setWorkoutLibrary} showToast={showToast} onLogout={onLogout} /> : <AthleteView athlete={athleteView} plans={plans.filter((p)=>p.published)} messages={athleteMessages} onSendAthleteMessage={(athleteId,text)=>setMessages((prev)=>({ ...prev, [athleteId]: [...(prev[athleteId]||[]), { id:Date.now(), from:"me", text }] }))} showToast={showToast} onLogout={onLogout} />}</AppShell><Toast toast={toast} onClose={clearToast} /></>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
