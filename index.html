function money(v){return `$${Number(v).toLocaleString('es-MX')} MXN`}
function currentAthlete(){return state.athletes.find(a=>a.id===state.selectedAthleteId)||state.athletes[0]}
function athleteView(){return state.athletes.find(a=>a.id===state.athleteViewId)||state.athletes[0]}
function athleteMessages(){return state.messages[state.athleteViewId]||[]}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function toast(t,m){const el=document.getElementById('toast');document.getElementById('toastTitle').textContent=t;document.getElementById('toastMsg').textContent=m;el.classList.add('show');clearTimeout(state.toastTimer);state.toastTimer=setTimeout(()=>el.classList.remove('show'),2600)}
function openModal(title,body){document.getElementById('modalTitle').textContent=title;document.getElementById('modalBody').innerHTML=body;document.getElementById('modalBackdrop').classList.add('show')}
function closeModal(){document.getElementById('modalBackdrop').classList.remove('show')} window.closeModal=closeModal;
function setSession(roleKey){const u=state.users[roleKey];state.session={role:roleKey,name:u.name,email:u.email};state.role=roleKey;if(roleKey==='athlete'){state.athleteViewId=u.athleteId;state.selectedAthleteId=u.athleteId}toast('Sesión iniciada',`Entraste como ${roleKey}.`);render()}

</button></div></div></div>`}

function sidebar(items,active,type){return `<div class="sidebar card"><div class="brand-mini"><div class="logo" style="width:44px;height:44px">⚡</div><div><div style="font-weight:700">${type==='coach'?'Marco Coach':'Pulse Admin'}</div><div class="small-muted">${type==='coach'?'Coach workspace':'Licencias y operación'}</div></div></div><div class="nav">${items.map(it=>`<button class="nav-btn ${active===it.id?'active':''}" onclick="${type==='coach'?'setCoachPage':'setAdminPage'}('${it.id}')"><span>${it.label}</span><span style="color:#67e8f9">${active===it.id?'›':''}</span></button>`).join('')}</div></div>`}
window.setCoachPage=p=>{state.activeCoachPage=p;render()}; window.setAdminPage=p=>{state.activeAdminPage=p;render()}; window.setAthletePage=p=>{state.activeAthletePage=p;render()};
function topbar(title,subtitle,user='Marco Coach',sub='48 atletas activos'){return `<div class="topbar"><div><h2>${title}</h2><p>${subtitle}</p></div><div class="top-actions"><button class="btn small" onclick="logout()">Cerrar sesión</button><div class="avatar"><div class="avatar-icon">👤</div><div><div style="font-size:14px;font-weight:700">${user}</div><div class="small-muted">${sub}</div></div></div></div></div>`}
function metric(label,value,sub){return `<div class="metric"><div class="k">${label}</div><div class="v">${value}</div><div class="s">${sub}</div></div>`}
window.selectAthlete=id=>{state.selectedAthleteId=id;state.athleteViewId=id;render()};
window.openCoachMessage=()=>{const a=currentAthlete();openModal(`Mensaje para ${a.name}`,`<div class="field"><div class="label">Mensaje</div><textarea class="input" id="coachMsg" style="min-height:140px"></textarea></div><div style="display:flex;justify-content:flex-end;gap:12px"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="saveCoachMessage()">Enviar</button></div>`)};
window.saveCoachMessage=()=>{const a=currentAthlete();const text=document.getElementById('coachMsg').value.trim();if(!text)return;if(!state.messages[a.id])state.messages[a.id]=[];state.messages[a.id].push({id:Date.now(),from:'coach',text});closeModal();toast('Mensaje enviado',`Se notificó a ${a.name}.`);render()};
window.openPlanEdit=()=>{const a=currentAthlete();openModal(`Editar plan de ${a.name}`,`<div class="field"><div class="label">Nombre del plan</div><input class="input" id="editPlanName" value="${esc(a.plan)}"></div><div class="field"><div class="label">Objetivo / carrera</div><input class="input" id="editPlanRace" value="${esc(a.race)}"></div><div style="display:flex;justify-content:flex-end;gap:12px"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="savePlanEdit()">Guardar</button></div>`)};
window.savePlanEdit=()=>{const a=currentAthlete();a.plan=document.getElementById('editPlanName').value;a.race=document.getElementById('editPlanRace').value;closeModal();toast('Plan actualizado','Se guardó el nombre del plan y el objetivo.');render()};
window.openCustomSession=(dayKey='')=>{const a=currentAthlete();const day=a.trainingSchedule.find(d=>d.key===dayKey)||a.trainingSchedule[1]||a.trainingSchedule[0];openModal(`Entrenamiento personalizado · ${a.name}`,`<div class="field"><div class="label">Día</div><select class="input" id="sessionDay">${a.trainingSchedule.map(d=>`<option value="${d.key}" ${d.key===day.key?'selected':''}>${d.day}</option>`).join('')}</select></div><div class="field"><div class="label">Título</div><input class="input" id="sessionTitle" value="${esc(day.title||'')}"></div><div class="field"><div class="label">Meta visible</div><input class="input" id="sessionMeta" value="${esc(day.meta||'45 min · Calidad')}"></div><div class="field"><div class="label">Descripción / sesión</div><textarea class="input" id="sessionDesc" style="min-height:220px">${esc(day.description||'')}</textarea></div><div style="display:flex;justify-content:flex-end;gap:12px"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="saveCustomSession()">Guardar entrenamiento</button></div>`)};
window.saveCustomSession=()=>{const a=currentAthlete();const key=document.getElementById('sessionDay').value,title=document.getElementById('sessionTitle').value.trim(),meta=document.getElementById('sessionMeta').value.trim(),description=document.getElementById('sessionDesc').value.trim();if(!title)return;const day=a.trainingSchedule.find(d=>d.key===key);if(day){day.title=title;day.meta=meta;day.description=description}a.sessionTitle=title;a.sessionCopy=description;closeModal();toast('Entrenamiento agregado','La sesión personalizada quedó asignada al atleta.');render()};
window.openCalendarModal=(day='Lunes')=>openModal('Nueva sesión semanal',`<div class="field"><div class="label">Día</div><select class="input" id="calDay">${state.calendar.map(d=>`<option value="${d.day}" ${d.day===day?'selected':''}>${d.day}</option>`).join('')}</select></div><div class="field"><div class="label">Sesión</div><input class="input" id="calLabel"></div><div style="display:flex;justify-content:flex-end;gap:12px"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="saveCalendarSession()">Guardar sesión</button></div>`);
window.saveCalendarSession=()=>{const day=document.getElementById('calDay').value,label=document.getElementById('calLabel').value.trim();if(!label)return;const col=state.calendar.find(d=>d.day===day);if(col)col.sessions.push({id:Date.now(),label});closeModal();toast('Sesión creada','La sesión apareció en el planner semanal.');render()};
window.removeCalendarSession=(day,id)=>{const col=state.calendar.find(d=>d.day===day);if(col)col.sessions=col.sessions.filter(s=>s.id!==id);toast('Sesión eliminada','Se quitó del planner.');render()};
window.openMarketplaceEdit=id=>{const p=state.plans.find(x=>x.id===id);openModal('Editar plan marketplace',`<div class="field"><div class="label">Título</div><input class="input" id="mpTitle" value="${esc(p.title)}"></div><div class="field"><div class="label">Precio</div><input class="input" id="mpPrice" type="number" value="${p.price}"></div><div class="field"><div class="label">Descripción</div><textarea class="input" id="mpDesc" style="min-height:120px">${esc(p.desc)}</textarea></div><label style="display:flex;gap:10px;align-items:center;border:1px solid var(--line);background:rgba(255,255,255,.03);padding:14px 16px;border-radius:18px"><input type="checkbox" id="mpPub" ${p.published?'checked':''}> Publicado en marketplace</label><div style="display:flex;justify-content:flex-end;gap:12px"><button class="btn" onclick="closeModal()">Cancelar</button><button class="btn primary" onclick="saveMarketplace(${id})">Guardar cambios</button></div>`)};
window.saveMarketplace=id=>{const p=state.plans.find(x=>x.id===id);p.title=document.getElementById('mpTitle').value;p.price=Number(document.getElementById('mpPrice').value||0);p.desc=document.getElementById('mpDesc').value;p.published=document.getElementById('mpPub').checked;closeModal();toast('Plan actualizado','Los cambios del marketplace ya están activos.');render()};
function renderCoach(){const page=state.activeCoachPage,a=currentAthlete(),filtered=state.athletes.filter(x=>(x.name+' '+x.plan).toLowerCase().includes(state.coachSearch.toLowerCase())),totalPaid=state.billing.filter(b=>b.status==='Pagado').reduce((m,b)=>m+b.amount,0),totalPending=state.billing.filter(b=>b.status==='Pendiente').reduce((m,b)=>m+b.amount,0);let content='';if(page==='dashboard')content=`${topbar('Dashboard del coach','Resumen operativo y comercial del estudio.')}<div class="metric-grid" style="margin-top:18px">${metric('Atletas activos',state.athletes.length,'+2 esta semana')}${metric('Cumplimiento','84%','Promedio semanal')}${metric('Ingresos del mes','$28k','+8% vs. anterior')}${metric('En riesgo',state.athletes.filter(x=>x.status==='Riesgo').length,'Revisar hoy')}</div>`;if(page==='athletes')content=`${topbar('Atletas','Asigna sesiones personalizadas por día a cada atleta.')}<div class="section-grid-athletes" style="margin-top:18px"><div class="card"><div class="search"><input placeholder="Buscar atleta o plan" value="${esc(state.coachSearch)}" oninput="state.coachSearch=this.value;render()"></div><div class="list" style="margin-top:14px">${filtered.map(x=>`<button class="list-item ${a.id===x.id?'active':''}" onclick="selectAthlete(${x.id})"><div style="display:flex;justify-content:space-between;gap:12px"><div><div style="font-weight:700">${x.name}</div><div class="small-muted" style="margin-top:4px">${x.plan}</div></div><span class="pill active">${x.status}</span></div><div class="small-muted" style="margin-top:10px">${x.race}</div></button>`).join('')}</div></div><div class="card"><div style="display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap"><div><div style="font-size:32px;font-weight:800">${a.name}</div><div style="margin-top:10px;display:flex;gap:8px;flex-wrap:wrap"><span class="pill active">${a.plan}</span><span class="pill">${a.level}</span><span class="pill">${a.race}</span></div></div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="btn small" onclick="openCoachMessage()">Enviar mensaje</button><button class="btn small" onclick="openPlanEdit()">Editar plan</button><button class="btn primary small" onclick="openCustomSession()">Agregar entrenamiento</button></div></div><div class="stats-grid" style="margin-top:22px"><div class="stat"><div class="k">Cumplimiento</div><div class="v">${a.compliance}%</div></div><div class="stat"><div class="k">Carga semanal</div><div class="v">${a.weeklyLoad}</div></div><div class="stat"><div class="k">Fatiga</div><div class="v">${a.fatigue}</div></div><div class="stat"><div class="k">Racha</div><div class="v">${a.streak} días</div></div></div><div style="margin-top:24px"><div style="font-size:14px;font-weight:700">Semana personalizada del atleta</div><div class="days-grid" style="margin-top:12px">${a.trainingSchedule.map(day=>`<div class="day-card"><div style="display:flex;justify-content:space-between"><div style="font-weight:700;font-size:14px">${day.day}</div><button class="mini-btn" onclick="openCustomSession('${day.key}')">Editar</button></div>${day.title?`<div style="margin-top:12px;color:#a5f3fc;font-size:14px;font-weight:700">${esc(day.title)}</div><div class="small-muted" style="margin-top:4px">${esc(day.meta||'Asignado')}</div><div class="content-muted" style="margin-top:8px;font-size:12px">${esc(day.description||'').replace(/\n/g,'<br>')}</div>`:`<div class="small-muted" style="margin-top:12px">Sin entrenamiento asignado</div>`}</div>`).join('')}</div></div></div></div>`;if(page==='calendar')content=`${topbar('Planner semanal','Organiza la semana y crea sesiones nuevas.')}<div style="display:flex;justify-content:flex-end;margin-top:18px"><button class="btn primary small" onclick="openCalendarModal()">Nueva sesión</button></div><div class="planner-grid" style="margin-top:14px">${state.calendar.map(day=>`<div class="planner-col card"><div style="display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:700">${day.day}</div><div class="small-muted" style="margin-top:4px">${day.sessions.length} sesiones</div></div><button class="mini-btn" onclick="openCalendarModal('${day.day}')">+ agregar</button></div>${day.sessions.map(s=>`<div class="planner-session"><div style="display:flex;justify-content:space-between;gap:8px"><div style="font-size:14px;color:rgba(255,255,255,.82)">${esc(s.label)}</div><button class="mini-btn" onclick="removeCalendarSession('${day.day}',${s.id})">Quitar</button></div></div>`).join('')}</div>`).join('')}</div>`;if(page==='marketplace')content=`${topbar('Marketplace','Edita planes publicados.')}<div class="section-grid-3" style="margin-top:18px">${state.plans.map(p=>`<div class="card"><div style="display:flex;justify-content:space-between;gap:10px"><div><div style="font-size:20px;font-weight:700">${esc(p.title)}</div><div class="content-muted" style="margin-top:8px">${esc(p.desc)}</div></div><span class="pill active">${p.published?'Publicado':'Oculto'}</span></div><div style="display:flex;justify-content:space-between;align-items:end;margin-top:18px"><div><div style="font-size:30px;font-weight:800;color:#67e8f9">${money(p.price)}</div><div class="small-muted" style="margin-top:4px">${p.sold} ventas · ${p.rating}★</div></div><button class="btn primary small" onclick="openMarketplaceEdit(${p.id})">Editar</button></div></div>`).join('')}</div>`;if(page==='billing')content=`${topbar('Cobros','Monitorea coaching mensual y marketplace.')}<div class="metric-grid" style="margin-top:18px">${metric('Cobrado',money(totalPaid),'Ingresos confirmados')}${metric('Pendiente',money(totalPending),'Por recuperar')}${metric('Movimientos',state.billing.length,'Este ciclo')}${metric('Ticket promedio',money(Math.round(totalPaid/Math.max(1,state.billing.filter(b=>b.status==='Pagado').length))),'Pagos confirmados')}</div>`;if(page==='settings')content=`${topbar('Ajustes','Configuración base del workspace del coach.')}<div class="section-grid-2" style="margin-top:18px"><div class="card"><div style="font-size:20px;font-weight:700">Marca del coach</div><div class="field" style="margin-top:18px"><div class="label">Nombre del estudio</div><input class="input" value="Marco Coach"></div><button class="btn primary" onclick="toast('Ajustes guardados','La marca del coach se actualizó.')">Guardar marca</button></div><div class="card"><div style="font-size:20px;font-weight:700">Acciones rápidas</div><div class="list" style="margin-top:18px">${[['Reenviar invitaciones','Se reenviaron invitaciones a atletas pendientes.'],['Regenerar links de pago','Se regeneraron links de pago activos.'],['Sincronizar calendario','El calendario quedó sincronizado.'],['Exportar base de atletas','Se preparó la exportación en CSV.']].map(([t,m])=>`<button class="list-item" onclick="toast('${t}','${m}')">${t}</button>`).join('')}</div></div></div>`;return `<div class="dashboard">${sidebar([{id:'dashboard',label:'Dashboard'},{id:'athletes',label:'Atletas'},{id:'calendar',label:'Calendario'},{id:'marketplace',label:'Marketplace'},{id:'billing',label:'Cobros'},{id:'settings',label:'Ajustes'}],page,'coach')}${content}</div>`}

iv>${i.source}</div><div>${i.owner}</div><div><span class="pill active">${i.status}</span></div><div>${i.expires}</div></div>`).join('')}</div></div>`;if(page==='controls')content=`${topbar('Controles globales','Acciones operativas de la plataforma en modo demo.','Admin Pulse','Control de plataforma')}<div class="section-grid-2" style="margin-top:18px"><div class="card"><div style="font-size:20px;font-weight:700">Operación</div><div class="list" style="margin-top:18px">${[['Forzar sincronización','Licencias sincronizadas'],['Reindexar marketplace','Marketplace actualizado'],['Enviar recordatorios','Recordatorios enviados'],['Refrescar métricas','Dashboard actualizado']].map(([k,v])=>`<div class="list-item"><div>${k}</div><div class="small-muted" style="color:#67e8f9;margin-top:4px">${v}</div></div>`).join('')}</div></div><div class="card"><div style="font-size:20px;font-weight:700">Seguridad y acceso</div><div class="list" style="margin-top:18px">${[['Revocar sesiones activas','Proceso demo listo'],['Resetear accesos','Flujo habilitado'],['Exportar auditoría','Archivo demo preparado'],['Respaldar configuración','Backup simulado completado']].map(([k,v])=>`<div class="list-item"><div>${k}</div><div class="small-muted" style="color:#67e8f9;margin-top:4px">${v}</div></div>`).join('')}</div></div></div>`;return `<div class="dashboard">${sidebar([{id:'overview',label:'Resumen'},{id:'coach_licenses',label:'Licencias Coach'},{id:'athlete_licenses',label:'Licencias Atleta'},{id:'controls',label:'Controles'}],page,'admin')}${content}</div>`}

function renderAthlete(){const a=athleteView(),msgs=athleteMessages(),published=state.plans.filter(p=>p.published),history=published.slice(0,2),loadBars=a.id===1?[12,18,26,16,34,34,20,7]:[20,24,28,18,31,31,18,10],cycleRows=a.id===1?[[1,'Carga','Base'],[2,'Carga','Base'],[3,'Carga','Construcción'],[4,'Descarga','Específico'],[5,'Carga','Específico'],[6,'Carga','Específico'],[7,'Taper','Pre carrera'],[8,'Carrera','Evento']]:[[1,'Carga','Base'],[2,'Carga','Construcción'],[3,'Carga','Construcción'],[4,'Descarga','Específico'],[5,'Carga','Específico'],[6,'Carga','Específico'],[7,'Taper','Pre carrera'],[8,'Carrera','Evento']],page=state.activeAthletePage;let phone='';if(page==='home')phone=`<div class="phone-inner"><div style="display:flex;justify-content:space-between;gap:10px"><div><div style="font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:#67e8f9">Resumen diario</div><div class="phone-title" style="margin-top:6px">${a.name}</div><div class="small-muted" style="margin-top:4px">Entrenamiento cargado por tu coach</div></div><button class="btn small" onclick="logout()">Salir</button></div><div class="hero-card"><div style="display:flex;justify-content:space-between;gap:10px"><span class="pill active">${a.completedToday?'Entreno completado':'Sesión del día'}</span><span class="small-muted">${a.next}</span></div><div class="small-muted" style="margin-top:12px">Plan activo: ${a.plan}</div><div style="font-size:24px;font-weight:800;margin-top:8px">${esc(a.trainingSchedule.find(x=>x.title.trim())?.title||a.sessionTitle)}</div><div class="content-muted" style="margin-top:12px;white-space:pre-line">${esc(a.trainingSchedule.find(x=>x.title.trim())?.description||a.sessionCopy)}</div></div><div class="card" style="padding:18px;margin-top:18px"><div style="font-size:14px;font-weight:700">Indicaciones del coach</div><div class="content-muted" style="margin-top:10px">${a.note}</div></div></div>`;if(page==='training')phone=`<div class="phone-inner"><div style="display:flex;justify-content:space-between;gap:10px"><div><div class="phone-title">Semana</div><div class="small-muted" style="margin-top:4px">Tu coach asignó estas sesiones</div></div><button class="btn small" onclick="logout()">Salir</button></div><div class="schedule-list">${a.trainingSchedule.map(day=>`<div class="schedule-card"><div style="font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.4)">${day.day}</div><div style="font-size:18px;font-weight:800;margin-top:10px">${esc(day.title||'Sin entrenamiento')}</div><div class="small-muted" style="margin-top:6px">${esc(day.meta||'')}</div><div class="content-muted" style="margin-top:10px;white-space:pre-line">${esc(day.description||'Todavía no hay sesión asignada para este día.')}</div></div>`).join('')}</div></div>`;if(page==='progress')phone=`<div class="phone-inner"><div class="phone-title">Plan</div><div class="list" style="margin-top:18px"><button class="list-item" onclick="openMetric('Cumplimiento','${a.compliance}%')" style="display:flex;justify-content:space-between"><span>Cumplimiento</span><span>${a.compliance}%</span></button><button class="list-item" onclick="openMetric('Carga semanal','${esc(a.weeklyLoad)}')" style="display:flex;justify-content:space-between"><span>Carga semanal</span><span>${a.weeklyLoad}</span></button><button class="list-item" onclick="openMetric('Objetivo','${esc(a.race)}')" style="display:flex;justify-content:space-between"><span>Objetivo</span><span>${a.race}</span></button></div></div>`;if(page==='messages')phone=`<div class="phone-inner"><div style="display:flex;justify-content:space-between;gap:10px"><div><div class="phone-title">Mensajes</div><div class="small-muted" style="margin-top:4px">Comunicación con tu entrenador</div></div><button class="btn small" onclick="logout()">Salir</button></div><div class="message-list" style="margin-top:18px">${msgs.map(m=>`<div class="msg ${m.from==='coach'?'coach':'me'}"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.16em;color:rgba(255,255,255,.35);margin-bottom:4px">${m.from==='coach'?'Coach':'Tú'}</div>${esc(m.text)}</div>`).join('')}</div></div>`;if(page==='store')phone=`<div class="phone-inner"><div class="phone-title">Historial</div><div class="content-muted" style="margin-top:12px">Carreras, récords y soporte complementario.</div><div class="card" style="padding:18px;margin-top:18px"><div style="font-size:14px;font-weight:700">Próxima carrera</div><div style="font-size:18px;font-weight:800;margin-top:8px">San Diego</div><div class="small-muted" style="margin-top:4px">31 mayo 2026 · 21K</div></div><div class="card" style="padding:18px;margin-top:18px"><div style="font-size:14px;font-weight:700">Récords</div><div class="list" style="margin-top:12px">${Object.entries(a.records).map(([d,t])=>`<div class="list-item" style="display:flex;justify-content:space-between"><span>${d}</span><strong>${t}</strong></div>`).join('')}</div></div></div>`;let desktop=`<div class="desktop-panel card"><div style="display:flex;justify-content:space-between;gap:18px;flex-wrap:wrap"><div><h3>${page==='home'?'Resumen del atleta':page==='training'?'Calendario semanal':page==='messages'?'Mensajes del atleta':page==='progress'?'Plan personalizado':'Historial y soporte'}</h3><div class="subtitle" style="font-size:16px;margin-top:8px">Funciones reales del perfil atleta integradas al mockup.</div></div><div style="display:flex;gap:10px;flex-wrap:wrap">${[['home','Resumen'],['training','Calendario'],['progress','Plan'],['store','Historial'],['messages','Mensajes']].map(([id,l])=>`<button class="tab ${page===id?'active':''}" onclick="setAthletePage('${id}')">${l}</button>`).join('')}<button class="tab" onclick="logout()">Cerrar sesión</button></div></div>`;if(page==='home')desktop+=`<div class="desktop-grid-home"><div><div class="subpanel"><div style="font-size:16px;color:var(--muted)">Sesión del día</div><div class="session-big">${esc(a.trainingSchedule.find(x=>x.title.trim())?.title||a.sessionTitle)}</div><div class="content-muted" style="margin-top:16px;font-size:16px;white-space:pre-line">${esc(a.trainingSchedule.find(x=>x.title.trim())?.description||a.sessionCopy)}</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:24px"><button class="btn primary" onclick="setAthletePage('training')">Ver calendario</button><button class="btn" onclick="toast('Ajuste simple','Aquí puede abrirse la lógica de ajuste semanal del atleta.')">Ajuste simple</button></div></div><div class="subpanel" style="margin-top:20px"><div style="font-size:16px;font-weight:700">Tu fatiga</div><div style="display:flex;gap:20px;align-items:center;margin-top:20px"><div style="width:80px;height:80px;border-radius:50%;display:grid;place-items:center;background:rgba(34,211,238,.2);font-size:30px">🙂</div><div style="flex:1"><div style="font-size:30px;font-weight:800">${a.fatigue}</div><div class="fatigue-bars"><div style="background:#22d3ee"></div><div style="background:#22d3ee"></div><div style="background:#22d3ee"></div><div style="background:#22d3ee"></div><div style="background:#4ade80"></div><div style="background:#eab308"></div><div style="background:#eab308"></div><div style="background:#ef4444"></div><div style="background:#ef4444"></div></div></div></div></div></div><div><div class="subpanel"><div style="font-size:16px;font-weight:700">Progreso semanal</div><div class="week-circles">${['L','M','M','J','V','S','D'].map((label,idx)=>`<div class="w"><div class="c" style="${idx<2?'background:rgba(34,197,94,.25);color:#dcfce7':idx===2?'background:rgba(139,92,246,.7)':'background:rgba(255,255,255,.1);color:rgba(255,255,255,.7)'}">${idx<2?'✓':'🏃'}</div><div style="font-size:12px;color:rgba(255,255,255,.6)">${label}</div><div style="font-size:12px;line-height:1.4;text-align:center;color:rgba(255,255,255,.65)">${idx===0?'Descanso':idx===1?'Easy 6k':idx===2?'Series':idx===3?'Fuerza':idx===4?'Tempo':idx===5?'Long Run':'Movilidad'}</div></div>`).join('')}</div><div style="display:flex;justify-content:space-between;margin-top:28px;font-size:14px;color:rgba(255,255,255,.62)"><span>Distancia total</span><span>${a.monthVolume} km del mes</span></div><div class="progress-wrap"><div class="progress-bar" style="width:${Math.min(90,Math.max(35,a.compliance))}%"></div></div></div><div class="subpanel" style="margin-top:20px"><div style="font-size:16px;font-weight:700">Indicaciones del coach</div><div class="content-muted" style="margin-top:16px;font-size:16px">${esc(a.note)}</div><button class="btn" style="margin-top:20px" onclick="setAthletePage('messages')">Abrir mensajes</button></div></div></div>`;if(page==='training')desktop+=`<div class="schedule-list">${a.trainingSchedule.map(item=>`<div class="schedule-card"><div style="font-size:14px;color:rgba(255,255,255,.55)">${item.day}</div><div style="font-size:30px;font-weight:800;line-height:1.1;margin-top:12px">${esc(item.title||'Sin entrenamiento')}</div><div style="font-size:14px;color:rgba(255,255,255,.55);margin-top:10px">${esc(item.meta||'')}</div><div class="content-muted" style="margin-top:12px;white-space:pre-line">${esc(item.description||'Todavía no hay sesión asignada para este día.')}</div></div>`).join('')}</div>`;if(page==='progress')desktop+=`<div class="desktop-grid-2"><div><div class="subpanel"><div style="font-size:16px;font-weight:700">Plan activo</div><div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:20px"><div class="stat"><div class="k">Objetivo</div><div class="v" style="color:#c4b5fd">2h 06m</div></div><div class="stat"><div class="k">Duración</div><div class="v">8 semanas</div></div><div class="stat"><div class="k">Carga</div><div class="v">${a.weeklyLoad}</div></div></div></div><div class="subpanel" style="margin-top:20px"><div style="font-size:16px;font-weight:700">Carga del plan</div><div class="bars">${loadBars.map((value,idx)=>`<div class="bar-col"><div class="bar" style="height:${Math.max(30,value*4)}px;background:${idx<3?'#86efac':idx===3?'#94a3b8':idx<6?'#86efac':'#fcd34d'}"></div><div style="font-size:14px;color:rgba(255,255,255,.55)">${idx+1}</div></div>`).join('')}</div></div></div><div class="subpanel"><div style="font-size:16px;font-weight:700">Estructura por ciclos</div><div class="cycle-list">${cycleRows.map(([w,t,c])=>`<div class="cycle-row"><div>${w}</div><div>${t}</div><div style="text-align:right;color:#67e8f9">${c}</div></div>`).join('')}</div></div></div>`;if(page==='store')desktop+=`<div class="dual-grid"><div><div class="subpanel"><div style="font-size:16px;font-weight:700">Carreras</div><div class="subpanel" style="background:rgba(0,0,0,.12);margin-top:20px;padding:20px"><div style="display:flex;justify-content:space-between;gap:16px;align-items:center"><div><div style="font-size:20px;font-weight:700">Próxima carrera</div><div class="small-muted" style="margin-top:4px">${a.race}</div></div><button class="btn primary small" onclick="toast('Carrera agregada','Aquí puede abrirse el flujo para registrar una nueva carrera.')">Agregar</button></div></div></div><div class="subpanel" style="margin-top:20px"><div style="font-size:16px;font-weight:700">Récords</div><div class="cycle-list">${Object.entries(a.records).map(([d,t])=>`<div class="record-row"><div>${d}</div><div style="text-align:right;font-weight:700">${t}</div></div>`).join('')}</div></div></div><div><div class="subpanel"><div style="font-size:16px;font-weight:700">Estiramiento de la semana</div><div style="font-size:28px;font-weight:800;margin-top:20px">Forward Lunge</div><div class="content-muted" style="margin-top:14px">Prioriza flexores de cadera. Úsalo antes de trabajos de calidad y después del fondo largo.</div><div class="subpanel" style="background:rgba(0,0,0,.12);margin-top:20px;padding:20px;font-size:14px;color:rgba(255,255,255,.75)">Consejo: consulta a tu médico si sientes dolor persistente o molestias agudas.</div></div><div class="subpanel" style="margin-top:20px"><div style="font-size:16px;font-weight:700">Marketplace relacionado</div><div class="cycle-list">${history.map(p=>`<button class="record-row" style="grid-template-columns:1fr 120px;text-align:left" onclick="buyPlan(${p.id})"><div><div style="font-size:16px;font-weight:700">${esc(p.title)}</div><div class="small-muted" style="margin-top:4px">${esc(p.desc)}</div></div><div style="text-align:right;color:#67e8f9;font-weight:700">${money(p.price)}</div></button>`).join('')}</div></div></div></div>`;if(page==='messages')desktop+=`<div class="subpanel" style="margin-top:28px"><div class="message-list">${msgs.map(m=>`<div class="msg ${m.from==='coach'?'coach':'me'}"><div style="font-size:10px;text-transform:uppercase;letter-spacing:.16em;color:rgba(255,255,255,.35);margin-bottom:4px">${m.from==='coach'?'Coach':'Tú'}</div>${esc(m.text)}</div>`).join('')}</div><div class="input-row"><input class="input" id="athleteMsgInput" placeholder="Escribe un mensaje"><button class="btn primary" onclick="sendAthleteMessage()">Enviar</button></div></div>`;desktop+=`</div>`;return `<div class="athlete-layout"><div class="phone"><div class="notch"></div><div class="screen">${phone}</div><div style="text-align:center;color:rgba(255,255,255,.5);font-size:14px;padding:12px 8px 2px">Athlete App</div></div>${desktop}</div>`}
function render(){document.getElementById('heroSubtitle').textContent=!state.session?'Login unificado para administrador, entrenador y atleta.':'Versión standalone para demo en GitHub Pages.';document.getElementById('crumbTitle').textContent=!state.session?'Access gateway':state.role==='admin'?'Admin console':state.role==='coach'?'Coach workspace':`Athlete experience · ${athleteView().name}`;renderRoleTabs();const main=document.getElementById('main');if(!state.session)main.innerHTML=renderLogin();else if(state.role==='coach')main.innerHTML=renderCoach();else if(state.role==='admin')main.innerHTML=renderAdmin();else main.innerHTML=renderAthlete()}
render();
</script>
